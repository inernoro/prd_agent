services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -lc "npx --yes serve -s . -l $$PORT"
    ports:
      - "4173:4173"
    volumes:
      - ./frontend:/app
    environment:
      PORT: "4173"
    labels:
      cds.path-prefix: /
      cds.readiness-path: /

  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -lc "npm install --no-audit --no-fund && node server.js"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    environment:
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    labels:
      cds.path-prefix: /api/
      cds.readiness-path: /api/health

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

x-cds-project:
  name: 运营管理台 Demo (Postgres + Redis)
  description: 前后端分离的管理后台演示，后端用 Postgres 持久化数据、Redis 计数访问量，纯 image + command + bind-mount 一键部署。

x-cds-env:
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: apppass2026
  POSTGRES_DB: admindemo
  DATABASE_URL: postgresql://appuser:apppass2026@postgres:5432/admindemo
  REDIS_PASSWORD: redispass2026
  REDIS_URL: redis://:redispass2026@redis:6379/0

x-cds-env-meta:
  POSTGRES_USER:
    kind: infra-derived
    hint: Postgres 用户名。
  POSTGRES_PASSWORD:
    kind: secret
    hint: Postgres 密码（演示值，生产请改为 CDS 项目环境变量注入）。
  POSTGRES_DB:
    kind: infra-derived
    hint: 默认数据库名。
  DATABASE_URL:
    kind: infra-derived
    hint: 后端读取的 Postgres 连接串。
  REDIS_PASSWORD:
    kind: secret
    hint: Redis 密码（演示值，生产请改为 CDS 项目环境变量注入）。
  REDIS_URL:
    kind: infra-derived
    hint: 后端读取的 Redis 连接串（含密码）。
