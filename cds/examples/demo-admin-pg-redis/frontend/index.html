<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>运营管理台 - Admin Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">CDS</span>
          <span class="brand-name">运营管理台</span>
        </div>
        <nav class="nav">
          <a class="nav-item active" href="#">概览</a>
          <a class="nav-item" href="#">服务清单</a>
          <a class="nav-item" href="#">访问统计</a>
          <a class="nav-item" href="#">系统设置</a>
        </nav>
        <div class="sidebar-foot">
          <span class="dot" id="conn-dot"></span>
          <span id="conn-text">连接检测中</span>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1>概览</h1>
            <p class="subtitle">Postgres 持久化 · Redis 计数 · 一键部署演示</p>
          </div>
          <button class="btn-refresh" id="refresh-btn" type="button">刷新数据</button>
        </header>

        <section class="stats">
          <div class="stat-card">
            <div class="stat-label">服务条目</div>
            <div class="stat-value" id="stat-items">--</div>
            <div class="stat-meta">来自 Postgres items 表</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">运行中</div>
            <div class="stat-value" id="stat-active">--</div>
            <div class="stat-meta">status = active</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">累计访问</div>
            <div class="stat-value" id="stat-visits">--</div>
            <div class="stat-meta">来自 Redis 计数器</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">后端状态</div>
            <div class="stat-value" id="stat-health">--</div>
            <div class="stat-meta" id="stat-health-meta">/api/health</div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>服务清单</h2>
            <form class="add-form" id="add-form">
              <input
                class="input"
                id="new-name"
                type="text"
                placeholder="新增服务名称"
                autocomplete="off"
              />
              <select class="input select" id="new-status">
                <option value="active">active</option>
                <option value="paused">paused</option>
              </select>
              <button class="btn-primary" type="submit">新增</button>
            </form>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th class="col-id">ID</th>
                <th>名称</th>
                <th class="col-status">状态</th>
                <th class="col-time">创建时间</th>
              </tr>
            </thead>
            <tbody id="items-body">
              <tr>
                <td colspan="4" class="empty">加载中</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
