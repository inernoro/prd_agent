<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDS Fullstack Infra Smoke</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1117;
        color: #f7f8fb;
      }
      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      p {
        color: #a8adbb;
      }
      button {
        height: 40px;
        border: 1px solid #3b4252;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        padding: 0 16px;
        cursor: pointer;
      }
      pre {
        overflow: auto;
        border: 1px solid #2d3340;
        border-radius: 8px;
        background: #171b24;
        padding: 16px;
        line-height: 1.5;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin: 24px 0;
      }
      .card {
        border: 1px solid #2d3340;
        border-radius: 8px;
        background: #171b24;
        padding: 16px;
      }
      .label {
        color: #a8adbb;
        font-size: 13px;
      }
      .value {
        margin-top: 8px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CDS 全栈基础设施冒烟样例</h1>
      <p>这个页面用于验证 CDS 能同时创建前端、后端、MySQL、Redis 和 RabbitMQ，并完成前端到后端的健康检查链路。</p>
      <button id="refresh">重新检查</button>
      <div class="grid" id="cards"></div>
      <pre id="output">等待检查结果...</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
