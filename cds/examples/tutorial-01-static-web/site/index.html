<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CDS 教程 01 - 静态网页托管</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 64px auto; padding: 0 16px; }
      h1 { font-size: 22px; }
      code { background: #f1eae4; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>CDS 教程 01 - 静态网页托管</h1>
    <p>这是最简单的 CDS 场景：把一个纯前端目录托管成可访问的站点。</p>
    <p>没有后端、没有数据库，只有一个 <code>site/index.html</code> 被 <code>serve</code> 托管。</p>
    <p>如果你能看到这行字，说明 CDS 已经把这个静态站点部署成功。</p>
  </body>
</html>
