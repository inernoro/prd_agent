<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Cloud Development Suite</title>
  <script>document.write('<link rel="stylesheet" href="style.css?t='+Date.now()+'">');</script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1><span class="title-static">Cloud Dev Suite</span><span class="title-rotating" id="titleRotating"></span></h1>
        <span class="header-subtitle" id="branchCount"></span>
      </div>
      <div class="header-actions">
        <button id="globalRefreshBtn" class="icon-btn" onclick="checkAllUpdates()" title="检查远程更新">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2.5a5.487 5.487 0 00-4.131 1.869l1.204 1.204A.25.25 0 014.896 6H1.25A.25.25 0 011 5.75V2.104a.25.25 0 01.427-.177l1.38 1.38A7.002 7.002 0 0115 8a.75.75 0 01-1.5 0A5.5 5.5 0 008 2.5zM2.5 8a.75.75 0 00-1.5 0 7.002 7.002 0 0012.023 4.87l1.38 1.38a.25.25 0 00.427-.177V10.5a.25.25 0 00-.25-.25h-3.646a.25.25 0 00-.177.427l1.204 1.204A5.5 5.5 0 012.5 8z"/></svg>
        </button>
        <button class="icon-btn" id="settingsBtn" onclick="toggleSettingsMenu(event)" title="设置">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M7.429 1.525a3.5 3.5 0 011.142 0 .75.75 0 01.57.63l.185 1.29a.25.25 0 00.35.193l1.178-.592a.75.75 0 01.808.098 3.5 3.5 0 01.571.571.75.75 0 01.098.808l-.592 1.178a.25.25 0 00.193.35l1.29.185a.75.75 0 01.63.57 3.5 3.5 0 010 1.142.75.75 0 01-.63.57l-1.29.185a.25.25 0 00-.193.35l.592 1.178a.75.75 0 01-.098.808 3.5 3.5 0 01-.571.571.75.75 0 01-.808.098l-1.178-.592a.25.25 0 00-.35.193l-.185 1.29a.75.75 0 01-.57.63 3.5 3.5 0 01-1.142 0 .75.75 0 01-.57-.63l-.185-1.29a.25.25 0 00-.35-.193l-1.178.592a.75.75 0 01-.808-.098 3.5 3.5 0 01-.571-.571.75.75 0 01-.098-.808l.592-1.178a.25.25 0 00-.193-.35l-1.29-.185a.75.75 0 01-.63-.57 3.5 3.5 0 010-1.142.75.75 0 01.63-.57l1.29-.185a.25.25 0 00.193-.35l-.592-1.178a.75.75 0 01.098-.808 3.5 3.5 0 01.571-.571.75.75 0 01.808-.098l1.178.592a.25.25 0 00.35-.193l.185-1.29a.75.75 0 01.57-.63zM8 6a2 2 0 100 4 2 2 0 000-4z"/></svg>
        </button>
      </div>
    </header>

    <!-- Worker status bar -->
    <div class="gateway-bar">
      <div class="gateway-left">
        <span class="gateway-dot active" id="workerDot"></span>
        <span class="gateway-label" id="workerLabel">Worker</span>
      </div>
      <div class="gateway-right">
        <svg class="inline-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 3.25a2.25 2.25 0 113 2.122V6A2.5 2.5 0 0110 8.5H6a1 1 0 00-1 1v1.128a2.251 2.251 0 11-1.5 0V5.372a2.25 2.25 0 111.5 0v1.836A2.493 2.493 0 016 7h4a1 1 0 001-1v-.628A2.25 2.25 0 019.5 3.25z"/></svg>
        <select id="defaultBranch" onchange="setDefaultBranch(this.value)">
          <option value="">无默认</option>
        </select>
        <span class="gateway-hint" id="routingHint">X-Branch / 路由规则</span>
      </div>
    </div>

    <!-- Quickstart banner (shown when no profiles) -->
    <div id="quickstartBanner" class="quickstart-banner hidden">
      <div class="quickstart-content">
        <strong>尚未配置构建配置。</strong>
        <span>是否加载此项目的默认配置？</span>
      </div>
      <button class="primary sm" onclick="runQuickstart()">快速开始</button>
    </div>

    <!-- Branch picker -->
    <section class="branch-picker-section">
      <div class="branch-picker">
        <div class="branch-picker-input-wrap">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 7a4.499 4.499 0 11-8.998 0A4.499 4.499 0 0111.5 7zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"/></svg>
          <input id="branchSearch" type="text" placeholder="搜索远程分支..." autocomplete="off">
          <button id="refreshRemoteBtn" class="icon-btn sm" onclick="refreshRemoteBranches()" title="刷新">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2.5a5.487 5.487 0 00-4.131 1.869l1.204 1.204A.25.25 0 014.896 6H1.25A.25.25 0 011 5.75V2.104a.25.25 0 01.427-.177l1.38 1.38A7.002 7.002 0 0115 8a.75.75 0 01-1.5 0A5.5 5.5 0 008 2.5zM2.5 8a.75.75 0 00-1.5 0 7.002 7.002 0 0012.023 4.87l1.38 1.38a.25.25 0 00.427-.177V10.5a.25.25 0 00-.25-.25h-3.646a.25.25 0 00-.177.427l1.204 1.204A5.5 5.5 0 012.5 8z"/></svg>
          </button>
        </div>
        <div id="branchDropdown" class="branch-dropdown hidden"></div>
      </div>
    </section>

    <!-- Branch list -->
    <section id="branchList" class="branch-list">
      <div class="empty-state">暂无分支，请在上方搜索并添加。</div>
    </section>

    <div id="toast" class="toast hidden"></div>
  </div>

  <!-- Log modal -->
  <div id="logModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeLogModal()"></div>
    <div class="modal-dialog">
      <div class="modal-header">
        <h2 id="logModalTitle">日志</h2>
        <button class="modal-close" onclick="closeLogModal()">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
        </button>
      </div>
      <div id="logModalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Config modal (shared for env, routing, profiles) -->
  <div id="configModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeConfigModal()"></div>
    <div class="modal-dialog config-modal-dialog">
      <div class="modal-header">
        <h2 id="configModalTitle"></h2>
        <button class="modal-close" onclick="closeConfigModal()">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
        </button>
      </div>
      <div id="configModalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Dropdown portal: all popover menus render here, outside card stacking contexts -->
  <div id="dropdownPortal"></div>

  <script>document.write('<scr'+'ipt src="app.js?t='+Date.now()+'"></scr'+'ipt>');</script>
</body>
</html>
