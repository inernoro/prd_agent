<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 2026-04-22：移除 maximum-scale/user-scalable，允许用户双指缩放（可访问性）。
       iOS Safari focus input 时的自动放大已在 CSS 里用 font-size:16px 规避。 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>分支列表 · CDS</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
  <link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    // Apply theme BEFORE CSS loads to prevent dark→light flash
    (function(){var t=localStorage.getItem('cds_theme');if(t==='light')document.documentElement.dataset.theme='light';})();
    // Set page title based on entry path (/branch-list vs /branch-panel)
    document.title = (location.pathname === '/branch-panel' ? '分支面板' : '分支列表') + ' · CDS';
    document.write('<link rel="stylesheet" href="style.css?t='+Date.now()+'">');
  </script>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <a href="/project-list" class="projects-back-link" title="返回项目列表 / 切换项目" style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;margin-right:10px;border:1px solid var(--card-border);border-radius:6px;color:var(--text-secondary);text-decoration:none;font-size:12px;background:var(--bg-card);transition:background 120ms ease,border-color 120ms ease" onmouseover="this.style.background='var(--bg-elevated)';this.style.borderColor='var(--accent-border)'" onmouseout="this.style.background='var(--bg-card)';this.style.borderColor='var(--card-border)'">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M7.78 12.53a.75.75 0 01-1.06 0L2.47 8.28a.75.75 0 010-1.06l4.25-4.25a.751.751 0 011.154.114.75.75 0 01-.094.946L4.81 7h7.44a.75.75 0 010 1.5H4.81l2.97 2.97a.75.75 0 010 1.06z"/></svg>
          <span id="cdsCurrentProjectLabel">项目</span>
        </a>
        <h1><span class="title-static">Cloud Dev Suite</span><span class="title-rotating" id="titleRotating"></span><code id="cdsCommitHash" style="font-size:12px;margin-left:8px;opacity:0.5;font-weight:normal"></code><!-- 2026-04-22：合并 capacity + host-pulse 为一个胶囊容器 --><span class="host-combined-badge hidden" id="hostCombinedBadge"><span id="capacityBadge" class="capacity-badge" title="宿主机剩余容量 — 点击查看调度器状态" onclick="showCapacityDetails(event)"></span><span class="host-combined-divider" aria-hidden="true"></span><span id="hostPulseBadge" class="host-pulse-badge" title="宿主机实时 MEM/CPU — 点击查看详情" onclick="showHostStatsDetails(event)"></span></span></h1>
      </div>
      <div class="header-actions">
        <!-- AI Pairing Indicator (inline, before buttons) -->
        <div id="aiPairingIndicator" class="ai-pairing-indicator hidden" onclick="showAiPairingPanel()">
          <span class="ai-pulse"></span>
          <span class="ai-label">AI</span>
        </div>
        <!-- View mode toggle — 2026-04-22 用户反馈：列表/拓扑的 segmented toggle
             在 header 里太抢眼、和整体风格不协调。隐藏 UI 但保留 DOM（setViewMode
             仍可被 settings 菜单或 URL 路径 /branch-panel 触发）。默认视图已改为拓扑。 -->
        <div id="viewModeToggle" class="view-mode-toggle" role="tablist" aria-label="视图模式" style="display:none">
          <button type="button" class="view-mode-btn" data-view-mode="list" role="tab" aria-selected="false" onclick="setViewMode('list')" title="列表视图">列表</button>
          <button type="button" class="view-mode-btn active" data-view-mode="topology" role="tab" aria-selected="true" onclick="setViewMode('topology')" title="拓扑视图">拓扑</button>
        </div>
        <!-- P2.5 GitHub auth widget (populated by bootstrapAuthWidget in app.js) -->
        <div id="cdsAuthWidget" class="cds-auth-widget hidden" style="display:none;align-items:center;gap:8px;padding:3px 4px 3px 10px;background:var(--bg-card);border:1px solid var(--card-border);border-radius:999px;margin-right:6px">
          <img id="cdsAuthAvatar" alt="" style="width:22px;height:22px;border-radius:50%;object-fit:cover;display:none">
          <span id="cdsAuthLogin" style="font-size:12px;color:var(--text-secondary);font-weight:500;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
          <button id="cdsAuthLogoutBtn" class="icon-btn xs" title="登出" style="padding:3px 4px;margin-left:2px" onclick="cdsLogout()">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M2 2.75C2 1.784 2.784 1 3.75 1h2.5a.75.75 0 010 1.5h-2.5a.25.25 0 00-.25.25v10.5c0 .138.112.25.25.25h2.5a.75.75 0 010 1.5h-2.5A1.75 1.75 0 012 13.25V2.75zm10.44 4.5L10.97 5.78a.75.75 0 111.06-1.06l2.75 2.75a.75.75 0 010 1.06l-2.75 2.75a.75.75 0 11-1.06-1.06l1.47-1.47H6.75a.75.75 0 010-1.5h5.69z"/></svg>
          </button>
        </div>
        <!-- 2026-04-22：
             - 移除 selfUpdateBtn（自动更新入口已在 ⚙ 菜单，不再单独占位）。
             - Agent Key 按钮从 🔑 emoji 换为 stroke SVG，和其他 icon-btn 一致。 -->
        <!-- 🔍 转发日志：专门排查「页面正常但 API 502 没日志」的情况 -->
        <button class="icon-btn" id="proxyLogBtn" onclick="window.openProxyLogModal && window.openProxyLogModal()" title="查看转发日志（代理 502/未命中路由等）">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>
        </button>
        <!-- 🕐 历史版本 & 紧急还原 -->
        <button class="icon-btn" id="historyBtn" onclick="window.openHistoryModal && window.openHistoryModal()" title="历史版本 & 紧急还原（配置快照 + 破坏性操作撤销）">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M1.643 3.143 .427 1.927A.25.25 0 0 0 0 2.104V5.75a.25.25 0 0 0 .25.25h3.646a.25.25 0 0 0 .177-.427L2.715 4.215a6.5 6.5 0 1 1-1.18 4.458.75.75 0 1 0-1.493.154 8.001 8.001 0 1 0 1.6-5.684zM7.75 4a.75.75 0 0 1 .75.75v2.992l2.028.812a.75.75 0 0 1-.557 1.392l-2.5-1A.751.751 0 0 1 7 8.25v-3.5A.75.75 0 0 1 7.75 4z"/></svg>
        </button>
        <!-- 🔧 全局构建命令：一次定义，按镜像类型批量覆盖所有 profile -->
        <button class="icon-btn" id="globalCmdBtn" onclick="window.openGlobalBuildCommandPanel && window.openGlobalBuildCommandPanel()" title="全局构建命令（按镜像类型一键改所有服务）">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M9.06 2.358a4.5 4.5 0 0 1 5.852 5.852L9.06 14.06l-1.06-1.06 5.66-5.66a3 3 0 1 0-4.24-4.24L3.76 8.762l-1.06-1.06 5.36-5.343zM6.06 4.94l4.95 4.95-1.06 1.06-4.95-4.95L6.06 4.94zM3.5 8.5l4.95 4.95-1.06 1.06L2.44 9.56 3.5 8.5z"/></svg>
        </button>
        <button class="icon-btn" id="agentKeyBtn" onclick="window.cdsOpenAgentKeyModal(typeof CURRENT_PROJECT_ID !== 'undefined' ? CURRENT_PROJECT_ID : 'default')" title="授权 Agent 操作本项目">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M10.5 0a5.499 5.499 0 1 1-1.288 10.848l-.932.932a.749.749 0 0 1-.53.22H7v.75a.749.749 0 0 1-.22.53l-.5.5a.749.749 0 0 1-.53.22H5v.75a.749.749 0 0 1-.22.53l-.5.5a.749.749 0 0 1-.53.22h-2A1.75 1.75 0 0 1 0 14.25v-2c0-.199.079-.389.22-.53l4.932-4.932A5.5 5.5 0 0 1 10.5 0Zm0 1.5a4.002 4.002 0 0 0-3.923 4.802.75.75 0 0 1-.206.701L1.5 12.561v1.689c0 .138.112.25.25.25h1.689l.31-.31V13a.75.75 0 0 1 .75-.75h1.19l.31-.31V11a.75.75 0 0 1 .75-.75h1.19l1.371-1.371a.751.751 0 0 1 .701-.206A4 4 0 1 0 10.5 1.5Zm1 2.5a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"/></svg>
        </button>
        <button id="themeToggleBtn" class="icon-btn" onclick="toggleTheme(event)" title="切换主题">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/></svg>
        </button>
        <button class="icon-btn" id="settingsBtn" onclick="toggleSettingsMenu(event)" title="项目设置">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M7.429 1.525a3.5 3.5 0 011.142 0 .75.75 0 01.57.63l.185 1.29a.25.25 0 00.35.193l1.178-.592a.75.75 0 01.808.098 3.5 3.5 0 01.571.571.75.75 0 01.098.808l-.592 1.178a.25.25 0 00.193.35l1.29.185a.75.75 0 01.63.57 3.5 3.5 0 010 1.142.75.75 0 01-.63.57l-1.29.185a.25.25 0 00-.193.35l.592 1.178a.75.75 0 01-.098.808 3.5 3.5 0 01-.571.571.75.75 0 01-.808.098l-1.178-.592a.25.25 0 00-.35.193l-.185 1.29a.75.75 0 01-.57.63 3.5 3.5 0 01-1.142 0 .75.75 0 01-.57-.63l-.185-1.29a.25.25 0 00-.35-.193l-1.178.592a.75.75 0 01-.808-.098 3.5 3.5 0 01-.571-.571.75.75 0 01-.098-.808l.592-1.178a.25.25 0 00-.193-.35l-1.29-.185a.75.75 0 01-.63-.57 3.5 3.5 0 010-1.142.75.75 0 01.63-.57l1.29-.185a.25.25 0 00.193-.35l-.592-1.178a.75.75 0 01.098-.808 3.5 3.5 0 01.571-.571.75.75 0 01.808-.098l1.178.592a.25.25 0 00.35-.193l.185-1.29a.75.75 0 01.57-.63zM8 6a2 2 0 100 4 2 2 0 000-4z"/></svg>
        </button>
        <!-- 2026-04-22 手机端 ☰ 菜单（只在 ≤640px 显示）：打开 settings menu 做次要操作入口。
             桌面端默认 display:none（见 @media），不占位。 -->
        <button class="icon-btn cds-header-menu-btn" id="cdsHeaderMenuBtn" onclick="toggleSettingsMenu(event)" title="菜单">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M1 2.75A.75.75 0 011.75 2h12.5a.75.75 0 010 1.5H1.75A.75.75 0 011 2.75zm0 5A.75.75 0 011.75 7h12.5a.75.75 0 010 1.5H1.75A.75.75 0 011 7.75zM1.75 12a.75.75 0 000 1.5h12.5a.75.75 0 000-1.5H1.75z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Quickstart banner (shown when no profiles) -->
    <div id="quickstartBanner" class="quickstart-banner hidden">
      <div class="quickstart-content">
        <strong>尚未初始化构建配置</strong>
        <span id="quickstartBannerHint">优先读取项目仓库下的 <code>cds-compose.yaml</code>；否则使用内置 api/admin 模板</span>
      </div>
      <button class="primary sm" onclick="runQuickstart()">初始化构建配置</button>
    </div>

    <!-- Branch picker -->
    <section class="branch-picker-section">
      <div class="branch-picker">
        <div class="branch-picker-input-wrap">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 7a4.499 4.499 0 11-8.998 0A4.499 4.499 0 0111.5 7zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"/></svg>
          <input id="branchSearch" type="text" placeholder="搜索或粘贴分支名,按 Enter 添加" autocomplete="off">
          <button id="refreshRemoteBtn" class="icon-btn sm" onclick="refreshAll()" title="刷新分支">
            <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2.5a5.487 5.487 0 00-4.131 1.869l1.204 1.204A.25.25 0 014.896 6H1.25A.25.25 0 011 5.75V2.104a.25.25 0 01.427-.177l1.38 1.38A7.002 7.002 0 0115 8a.75.75 0 01-1.5 0A5.5 5.5 0 008 2.5zM2.5 8a.75.75 0 00-1.5 0 7.002 7.002 0 0012.023 4.87l1.38 1.38a.25.25 0 00.427-.177V10.5a.25.25 0 00-.25-.25h-3.646a.25.25 0 00-.177.427l1.204 1.204A5.5 5.5 0 012.5 8z"/></svg>
          </button>
        </div>
        <div id="branchDropdown" class="branch-dropdown hidden"></div>
      </div>
    </section>

    <!-- Executor panel (visible in scheduler mode) -->
    <div id="executorPanel" class="executor-panel hidden"></div>

    <!-- Tag filter bar -->
    <div id="tagFilterBar" class="tag-filter-bar hidden"></div>

    <!-- Branch list -->
    <section id="branchList" class="branch-list">
      <div class="cds-loading-state" id="cdsInitLoader">
        <div class="cds-loading-glow"></div>
        <div class="cds-loading-letters">
          <span class="cds-letter" style="--delay:0ms;--color:var(--accent, #e8e8ec)">C</span>
          <span class="cds-letter" style="--delay:120ms;--color:var(--text-secondary, #a0a0b0)">D</span>
          <span class="cds-letter" style="--delay:240ms;--color:var(--text-muted, #78788a)">S</span>
        </div>
        <div class="cds-loading-bar"></div>
        <div class="cds-loading-hint">加载中</div>
      </div>
    </section>

    <!-- Topology canvas view (hidden unless 拓扑 mode) -->
    <section id="topologyView" class="topology-view hidden"></section>

    <div id="toast" class="toast hidden"></div>
  </div>

  <!-- Log modal (with tabs: logs / terminal) -->
  <div id="logModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeLogModal()"></div>
    <div class="modal-dialog">
      <div class="modal-header">
        <h2 id="logModalTitle">日志</h2>
        <button id="copyErrorBtn" class="copy-error-btn hidden" onclick="copyErrorForLLM()" title="复制错误日志，粘贴给 AI 排错">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"/></svg>
          一键复制错误给大模型排错
        </button>
        <div id="logModalTabs" class="log-modal-tabs hidden">
          <button class="log-tab active" data-tab="logs" onclick="switchLogTab('logs')">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.75C1 1.784 1.784 1 2.75 1h10.5c.966 0 1.75.784 1.75 1.75v7.5A1.75 1.75 0 0113.25 12H9.06l-2.573 2.573A1.458 1.458 0 014 13.543V12H2.75A1.75 1.75 0 011 10.25v-7.5zm1.5 0a.25.25 0 01.25-.25h10.5a.25.25 0 01.25.25v7.5a.25.25 0 01-.25.25h-4.5a.75.75 0 00-.75.75v2.19l-2.72-2.72a.75.75 0 00-.53-.22H2.75a.25.25 0 01-.25-.25v-7.5z"/></svg>
            日志
          </button>
          <button class="log-tab" data-tab="terminal" onclick="switchLogTab('terminal')">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0114.25 15H1.75A1.75 1.75 0 010 13.25V2.75zm1.75-.25a.25.25 0 00-.25.25v10.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V2.75a.25.25 0 00-.25-.25H1.75zM7.25 8a.75.75 0 01-.22.53l-2.25 2.25a.75.75 0 11-1.06-1.06L5.44 8 3.72 6.28a.75.75 0 011.06-1.06l2.25 2.25c.141.14.22.331.22.53zm1.5 1.5a.75.75 0 000 1.5h3a.75.75 0 000-1.5h-3z"/></svg>
            终端
          </button>
        </div>
        <button class="modal-close" onclick="closeLogModal()">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
        </button>
      </div>
      <div id="logModalBody" class="modal-body"></div>
      <div id="terminalBody" class="modal-body hidden">
        <div id="terminalOutput" class="terminal-output"></div>
        <div class="terminal-input-row">
          <span class="terminal-prompt">$</span>
          <input id="terminalInput" type="text" class="terminal-input" placeholder="输入命令..." autocomplete="off"
            onkeydown="if(event.key==='Enter')execTerminalCmd()">
          <button class="terminal-send-btn" onclick="execTerminalCmd()" title="执行">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M.989 2.94a.75.75 0 011.034-.656l12 4.5a.75.75 0 010 1.423l-12 4.5a.75.75 0 01-1.034-.656v-3.18a.75.75 0 01.635-.74L7.025 8l-5.4-.63a.75.75 0 01-.636-.74V2.94z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Config modal (shared for env, routing, profiles) -->
  <div id="configModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeConfigModal()"></div>
    <div class="modal-dialog config-modal-dialog">
      <div class="modal-header">
        <h2 id="configModalTitle"></h2>
        <button class="modal-close" onclick="closeConfigModal()">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
        </button>
      </div>
      <div id="configModalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Dropdown portal: all popover menus render here, outside card stacking contexts -->
  <div id="dropdownPortal"></div>

  <!-- P4 Part 11: Cmd+K command palette overlay (modeled after Railway's What can we help with?) -->
  <div id="cmdkPalette" class="cmdk-overlay hidden" onclick="closeCmdkPalette(event)">
    <div class="cmdk-dialog" onclick="event.stopPropagation()">
      <div class="cmdk-search-row">
        <svg class="cmdk-search-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 7a4.499 4.499 0 11-8.998 0A4.499 4.499 0 0111.5 7zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"/></svg>
        <input id="cmdkSearch" class="cmdk-search-input" placeholder="What can we help with?" autocomplete="off" oninput="filterCmdkPalette(this.value)" onkeydown="cmdkOnKey(event)">
        <span class="cmdk-search-hint">ESC</span>
      </div>
      <div id="cmdkResults" class="cmdk-results"></div>
      <div class="cmdk-footer">
        <span><kbd>↑↓</kbd> 选择</span>
        <span><kbd>↵</kbd> 打开</span>
        <span><kbd>ESC</kbd> 关闭</span>
        <span style="margin-left:auto;opacity:0.5">⌘K / Ctrl+K 召唤</span>
      </div>
    </div>
  </div>

  <!-- Host stats pulse (floating bottom-right, above Activity Monitor) -->
  <!-- Real-time mem+cpu indicator, complements the header's container capacity badge -->
  <div id="hostStatsWidget" class="host-stats hidden" title="宿主机实时负载 — 点击查看详情" onclick="showHostStatsDetails(event)">
    <div class="host-stats-row">
      <span class="host-stats-icon" aria-hidden="true">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3a1 1 0 011-1h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3zm2 2v6h8V5H4z"/></svg>
      </span>
      <span class="host-stats-label">MEM</span>
      <span class="host-stats-bar"><span class="host-stats-bar-fill" id="hsMemFill"></span></span>
      <span class="host-stats-value" id="hsMemValue">--</span>
    </div>
    <div class="host-stats-row">
      <span class="host-stats-icon" aria-hidden="true">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M5 0a.75.75 0 01.75.75V2h1.5V.75a.75.75 0 011.5 0V2h1.5V.75a.75.75 0 011.5 0V2h.25A1.75 1.75 0 0114 3.75V4h1.25a.75.75 0 010 1.5H14v1.5h1.25a.75.75 0 010 1.5H14v1.5h1.25a.75.75 0 010 1.5H14v.25A1.75 1.75 0 0112.25 14H12v1.25a.75.75 0 01-1.5 0V14H9v1.25a.75.75 0 01-1.5 0V14H6v1.25a.75.75 0 01-1.5 0V14h-.25A1.75 1.75 0 012.5 12.25V12H.75a.75.75 0 010-1.5H2.5V9H.75a.75.75 0 010-1.5H2.5V6H.75a.75.75 0 010-1.5H2.5v-.25A1.75 1.75 0 014.25 2.5H4.5V.75A.75.75 0 015 0zm-.75 4v8.25c0 .138.112.25.25.25h8.25a.25.25 0 00.25-.25V4.25a.25.25 0 00-.25-.25H4.5a.25.25 0 00-.25.25z"/></svg>
      </span>
      <span class="host-stats-label">CPU</span>
      <span class="host-stats-bar"><span class="host-stats-bar-fill" id="hsCpuFill"></span></span>
      <span class="host-stats-value" id="hsCpuValue">--</span>
    </div>
  </div>

  <!-- API Activity Monitor (floating bottom-right) -->
  <div id="activityMonitor" class="activity-monitor collapsed">
    <div class="activity-header" onclick="toggleActivityMonitor()">
      <!-- 2026-04-22：删除 "Activity" 文字（冗余），只留指示灯 + 计数 -->
      <div class="activity-title">
        <span class="activity-dot"></span>
        <span class="activity-count" id="activityCount">0</span>
      </div>
      <div class="activity-roller" id="activityRoller"></div>
      <div class="activity-actions">
        <svg class="activity-chevron" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M12.78 5.22a.75.75 0 010 1.06l-4.25 4.25a.75.75 0 01-1.06 0L3.22 6.28a.75.75 0 011.06-1.06L8 8.94l3.72-3.72a.75.75 0 011.06 0z"/></svg>
      </div>
    </div>
    <div class="activity-tabs">
      <button class="activity-tab active" data-tab="cds" onclick="switchActivityTab('cds')">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.75a.75.75 0 00-1.5 0v12.5c0 .414.336.75.75.75h14.5a.75.75 0 000-1.5H1.5V1.75zm14.28 2.53a.75.75 0 00-1.06-1.06L10 7.94 7.53 5.47a.75.75 0 00-1.06 0L2.22 9.72a.75.75 0 001.06 1.06L7 7.06l2.47 2.47a.75.75 0 001.06 0l5.25-5.25z"/></svg>
        CDS
        <span class="activity-tab-count" id="cdsTabCount">0</span>
      </button>
      <button class="activity-tab" data-tab="web" onclick="switchActivityTab('web')">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M0 8a8 8 0 1116 0A8 8 0 010 8zm7.5-6.923c-.67.204-1.335.82-1.887 1.855A7.97 7.97 0 005.145 4H7.5V1.077zM4.09 4a9.27 9.27 0 01.64-1.539 6.7 6.7 0 01.597-.933A6.536 6.536 0 002.535 4H4.09zm-.582 3.5c.03-.877.138-1.718.312-2.5H1.674a6.958 6.958 0 00-.656 2.5H3.508zM7.5 11H5.145a7.97 7.97 0 00.468 1.068c.552 1.035 1.218 1.65 1.887 1.855V11zm1 2.923c.67-.204 1.335-.82 1.887-1.855A7.97 7.97 0 0010.855 11H8.5v2.923zM11.91 11a9.27 9.27 0 00.64 1.539 6.7 6.7 0 00.597.933A6.536 6.536 0 0015.465 11H11.91zm.582-1.5c.03-.877.138-1.718.312-2.5h2.49a6.958 6.958 0 01.656 2.5h-3.458z"/></svg>
        Web
        <span class="activity-tab-count" id="webTabCount">0</span>
      </button>
    </div>
    <div class="activity-body" id="activityBody"></div>
    <div class="activity-body" id="webActivityBody" style="display:none"></div>
    <!-- Resize handles -->
    <div class="activity-resize-handle activity-resize-n" data-direction="n"></div>
    <div class="activity-resize-handle activity-resize-w" data-direction="w"></div>
    <div class="activity-resize-handle activity-resize-nw" data-direction="nw"></div>
  </div>

  <!-- AI Pairing Panel (modal) -->
  <div id="aiPairingPanel" class="modal hidden">
    <div class="modal-backdrop" onclick="closeAiPairingPanel()"></div>
    <div class="modal-dialog" style="max-width:480px">
      <div class="modal-header">
        <h2>AI 连接请求</h2>
        <button class="modal-close" onclick="closeAiPairingPanel()">
          <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
        </button>
      </div>
      <div class="modal-body" id="aiPairingBody" style="padding:16px">
        <div style="color:var(--text-muted);font-size:13px">暂无待处理的请求</div>
      </div>
    </div>
  </div>

  <script>document.write('<scr'+'ipt src="agent-key-modal.js?t='+Date.now()+'"></scr'+'ipt>');</script>
  <script>document.write('<scr'+'ipt src="self-update.js?t='+Date.now()+'"></scr'+'ipt>');</script>
  <script>document.write('<scr'+'ipt src="proxy-log-modal.js?t='+Date.now()+'"></scr'+'ipt>');</script>
  <script>document.write('<scr'+'ipt src="snapshot-modal.js?t='+Date.now()+'"></scr'+'ipt>');</script>
  <script>document.write('<scr'+'ipt src="global-cmd-modal.js?t='+Date.now()+'"></scr'+'ipt>');</script>
  <script>document.write('<scr'+'ipt src="app.js?t='+Date.now()+'"></scr'+'ipt>');</script>
</body>
</html>
