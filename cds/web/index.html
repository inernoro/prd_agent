<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cloud Development Suite</title>
  <link rel="stylesheet" href="style.css?v=20260312a">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1><span class="title-static">Cloud Dev Suite</span><span class="title-rotating" id="titleRotating"></span></h1>
        <span class="header-subtitle" id="branchCount"></span>
      </div>
      <div class="header-actions">
        <button class="icon-btn labeled" onclick="openEnvModal()" title="环境变量">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2.5 2a.5.5 0 00-.5.5v11a.5.5 0 00.5.5h11a.5.5 0 00.5-.5v-11a.5.5 0 00-.5-.5h-11zM1 2.5A1.5 1.5 0 012.5 1h11A1.5 1.5 0 0115 2.5v11a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 011 13.5v-11zM4 5h2v1H4V5zm3 0h5v1H7V5zM4 8h2v1H4V8zm3 0h5v1H7V8zM4 11h2v1H4v-1zm3 0h5v1H7v-1z"/></svg>
          <span class="icon-btn-label">变量</span>
        </button>
        <button class="icon-btn labeled" onclick="openRoutingModal()" title="路由规则">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 0113 0h-2.1a8.3 8.3 0 00-.4-2.2 9 9 0 00-1-1.9A4.5 4.5 0 017 7.5H4.5A8.3 8.3 0 001.5 8zm5.5 5.5a6.5 6.5 0 01-5.4-3h2.3c.3 1.2.8 2.2 1.5 3H7zm1-5.5a7.8 7.8 0 014-3.8c.5.6.9 1.2 1.2 1.8H8zm0 1h5.4a8.3 8.3 0 01-.3 2H8.9 8V9zm0 3h3.8c-.6 1.3-1.5 2.4-2.8 3A6.5 6.5 0 018 9z"/></svg>
          <span class="icon-btn-label">路由</span>
        </button>
        <button class="icon-btn labeled" onclick="openProfileModal()" title="构建配置">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M7.429 1.525a3.5 3.5 0 011.142 0 .75.75 0 01.57.63l.185 1.29a.25.25 0 00.35.193l1.178-.592a.75.75 0 01.808.098 3.5 3.5 0 01.571.571.75.75 0 01.098.808l-.592 1.178a.25.25 0 00.193.35l1.29.185a.75.75 0 01.63.57 3.5 3.5 0 010 1.142.75.75 0 01-.63.57l-1.29.185a.25.25 0 00-.193.35l.592 1.178a.75.75 0 01-.098.808 3.5 3.5 0 01-.571.571.75.75 0 01-.808.098l-1.178-.592a.25.25 0 00-.35.193l-.185 1.29a.75.75 0 01-.57.63 3.5 3.5 0 01-1.142 0 .75.75 0 01-.57-.63l-.185-1.29a.25.25 0 00-.35-.193l-1.178.592a.75.75 0 01-.808-.098 3.5 3.5 0 01-.571-.571.75.75 0 01-.098-.808l.592-1.178a.25.25 0 00-.193-.35l-1.29-.185a.75.75 0 01-.63-.57 3.5 3.5 0 010-1.142.75.75 0 01.63-.57l1.29-.185a.25.25 0 00.193-.35l-.592-1.178a.75.75 0 01.098-.808 3.5 3.5 0 01.571-.571.75.75 0 01.808-.098l1.178.592a.25.25 0 00.35-.193l.185-1.29a.75.75 0 01.57-.63zM8 6a2 2 0 100 4 2 2 0 000-4z"/></svg>
          <span class="icon-btn-label">配置</span>
        </button>
        <button id="cleanupBtn" class="icon-btn labeled danger-icon" onclick="cleanupAll()" disabled title="清理所有非默认分支">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6.5 1.75a.25.25 0 01.25-.25h2.5a.25.25 0 01.25.25V3h-3V1.75zM11 3V1.75A1.75 1.75 0 009.25 0h-2.5A1.75 1.75 0 005 1.75V3H2.75a.75.75 0 000 1.5h.3l.8 8.2A1.75 1.75 0 005.6 14.5h4.8a1.75 1.75 0 001.75-1.8l.8-8.2h.3a.75.75 0 000-1.5H11z"/></svg>
          <span class="icon-btn-label">清理</span>
        </button>
        <span class="header-divider"></span>
        <button class="icon-btn labeled logout-btn" onclick="doLogout()" title="退出登录">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.75C2 1.784 2.784 1 3.75 1h2.5a.75.75 0 010 1.5h-2.5a.25.25 0 00-.25.25v10.5c0 .138.112.25.25.25h2.5a.75.75 0 010 1.5h-2.5A1.75 1.75 0 012 13.25V2.75zm10.44 4.5H6.75a.75.75 0 000 1.5h5.69l-1.97 1.97a.749.749 0 101.06 1.06l3.25-3.25a.749.749 0 000-1.06l-3.25-3.25a.749.749 0 10-1.06 1.06l1.97 1.97z"/></svg>
          <span class="icon-btn-label">退出</span>
        </button>
      </div>
    </header>

    <!-- Worker status bar -->
    <div class="gateway-bar">
      <div class="gateway-left">
        <span class="gateway-dot active" id="workerDot"></span>
        <span class="gateway-label" id="workerLabel">Worker</span>
      </div>
      <div class="gateway-right">
        <svg class="inline-icon" width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 3.25a2.25 2.25 0 113 2.122V6A2.5 2.5 0 0110 8.5H6a1 1 0 00-1 1v1.128a2.251 2.251 0 11-1.5 0V5.372a2.25 2.25 0 111.5 0v1.836A2.493 2.493 0 016 7h4a1 1 0 001-1v-.628A2.25 2.25 0 019.5 3.25z"/></svg>
        <select id="defaultBranch" onchange="setDefaultBranch(this.value)">
          <option value="">无默认</option>
        </select>
        <span class="gateway-hint" id="routingHint">X-Branch / 路由规则</span>
      </div>
    </div>

    <!-- Quickstart banner (shown when no profiles) -->
    <div id="quickstartBanner" class="quickstart-banner hidden">
      <div class="quickstart-content">
        <strong>尚未配置构建配置。</strong>
        <span>是否加载此项目的默认配置？</span>
      </div>
      <button class="primary sm" onclick="runQuickstart()">快速开始</button>
    </div>

    <!-- Branch picker -->
    <section class="branch-picker-section">
      <div class="branch-picker">
        <div class="branch-picker-input-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 7a4.499 4.499 0 11-8.998 0A4.499 4.499 0 0111.5 7zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"/></svg>
          <input id="branchSearch" type="text" placeholder="搜索远程分支..." autocomplete="off">
          <button id="refreshRemoteBtn" class="icon-btn sm" onclick="refreshRemoteBranches()" title="刷新">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2.5a5.487 5.487 0 00-4.131 1.869l1.204 1.204A.25.25 0 014.896 6H1.25A.25.25 0 011 5.75V2.104a.25.25 0 01.427-.177l1.38 1.38A7.002 7.002 0 0115 8a.75.75 0 01-1.5 0A5.5 5.5 0 008 2.5zM2.5 8a.75.75 0 00-1.5 0 7.002 7.002 0 0012.023 4.87l1.38 1.38a.25.25 0 00.427-.177V10.5a.25.25 0 00-.25-.25h-3.646a.25.25 0 00-.177.427l1.204 1.204A5.5 5.5 0 012.5 8z"/></svg>
          </button>
        </div>
        <div id="branchDropdown" class="branch-dropdown hidden"></div>
      </div>
    </section>

    <!-- Branch list -->
    <section id="branchList" class="branch-list">
      <div class="empty-state">暂无分支，请在上方搜索并添加。</div>
    </section>

    <div id="toast" class="toast hidden"></div>
  </div>

  <!-- Log modal -->
  <div id="logModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeLogModal()"></div>
    <div class="modal-dialog">
      <div class="modal-header">
        <h2 id="logModalTitle">日志</h2>
        <button class="modal-close" onclick="closeLogModal()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
        </button>
      </div>
      <div id="logModalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Config modal (shared for env, routing, profiles) -->
  <div id="configModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeConfigModal()"></div>
    <div class="modal-dialog config-modal-dialog">
      <div class="modal-header">
        <h2 id="configModalTitle"></h2>
        <button class="modal-close" onclick="closeConfigModal()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
        </button>
      </div>
      <div id="configModalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Dropdown portal: all popover menus render here, outside card stacking contexts -->
  <div id="dropdownPortal"></div>

  <script src="app.js?v=20260312a"></script>
</body>
</html>
