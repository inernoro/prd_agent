<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cloud Dev Suite — 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      background: #0a0c10;
      color: #e4e8ef;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .login-card {
      width: 380px;
      max-width: calc(100vw - 32px);
      padding: 36px;
      background: #13161d;
      border: 1px solid #252a35;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-card h1 {
      font-size: 22px; font-weight: 700; margin-bottom: 4px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e4e8ef 0%, #8f96a3 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .rotating-subtitle {
      height: 22px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .rotating-text {
      display: inline-block;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #00f0ff 0%, #7c3aed 50%, #f43f5e 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: opacity 0.3s, transform 0.3s;
    }
    .rotating-text.out {
      opacity: 0;
      transform: translateY(8px);
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 13px; color: #8f96a3; margin-bottom: 7px;
      font-weight: 500;
    }
    .field input {
      width: 100%; padding: 11px 14px;
      background: #0d0f14; border: 1px solid #252a35; border-radius: 8px;
      color: #e4e8ef; font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: #5c9eff;
      box-shadow: 0 0 0 3px rgba(92, 158, 255, 0.1);
    }
    .field input::placeholder { color: #5c6370; }
    .error-msg {
      font-size: 13px; color: #ef5350; margin-bottom: 14px; display: none;
      padding: 8px 12px; background: rgba(239, 83, 80, 0.08);
      border: 1px solid rgba(239, 83, 80, 0.2); border-radius: 7px;
    }
    button {
      width: 100%; padding: 11px;
      background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
      border: 1px solid rgba(46, 160, 67, 0.4); border-radius: 8px;
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.02em;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    button:hover {
      background: linear-gradient(135deg, #2ea043 0%, #3bb553 100%);
      box-shadow: 0 4px 16px rgba(46, 160, 67, 0.3);
      transform: translateY(-1px);
    }
    button:active { transform: scale(0.98) translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Cloud Dev Suite</h1>
    <div class="rotating-subtitle">
      <span class="rotating-text" id="rotatingText">重塑创作</span>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <form onsubmit="doLogin(event)">
      <div class="field">
        <label for="username">用户名</label>
        <input id="username" type="text" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="loginBtn">登录</button>
    </form>
  </div>
  <script>
    // Rotating text animation
    (function() {
      const texts = ['重塑创作', '提升效率', '释放潜能', '驱动创新'];
      let index = 0;
      const el = document.getElementById('rotatingText');
      setInterval(() => {
        el.classList.add('out');
        setTimeout(() => {
          index = (index + 1) % texts.length;
          el.textContent = texts[index];
          el.classList.remove('out');
        }, 300);
      }, 3000);
    })();

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      btn.disabled = true;
      err.style.display = 'none';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '登录失败');
        location.href = '/';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
