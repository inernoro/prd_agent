<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cloud Dev Suite — 登录</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
  <link href="https://fonts.loli.net/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=VT323&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Cloud Dev Suite · Login
       风格：Linear × Retro-Futurism
       规则源：doc/rule.landing-visual-style.md (prd_agent repo)
       - R1 签名渐变 HERO_GRADIENT
       - R2 六层静态背景 StaticBackdrop (纯 CSS)
       - R3 字体三件套 Space Grotesk / Inter / VT323
       - R5 HUD chip eyebrow
       - R6 对称 CTA pill h-12 rounded-full
       - R7 hero h1 neon pulse
       - R9 玻璃卡片 rgba(10,14,22,0.72)+blur(14px)+22px radius
       ============================================================ */

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --c-bg:        #030306;
      --c-ink:       #ffffff;
      --c-muted:     rgba(255, 255, 255, 0.58);
      --c-dim:       rgba(255, 255, 255, 0.42);
      --c-faint:     rgba(255, 255, 255, 0.30);
      --c-border:    rgba(255, 255, 255, 0.12);
      --c-glass:     rgba(10, 14, 22, 0.72);
      --c-err:       #fca5a5;
      --c-err-bg:    rgba(244, 63, 94, 0.08);
      --c-err-brd:   rgba(244, 63, 94, 0.35);
      --hero-grad:   linear-gradient(135deg, #00f0ff 0%, #7c3aed 50%, #f43f5e 100%);
      --font-display: 'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      --font-body:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      --font-mono:    'VT323', 'Share Tech Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: var(--font-body);
      background: var(--c-bg);
      color: var(--c-ink);
      height: 100dvh;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ────────────── Layer 0 · Static Backdrop (六层 CSS) ────────────── */
    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background: #050510;
    }
    /* 1 · 顶部点阵网格 */
    .backdrop::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
      background-size: 36px 36px;
      -webkit-mask-image: radial-gradient(ellipse 85% 55% at 50% 10%, black 0%, black 40%, transparent 85%);
      mask-image:         radial-gradient(ellipse 85% 55% at 50% 10%, black 0%, black 40%, transparent 85%);
    }
    /* 2 · 顶部冷白径向光晕（Linear 签名 · 去紫版） */
    .backdrop::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 95% 65% at 50% -5%,
          rgba(203, 213, 225, 0.28) 0%,
          rgba(148, 163, 184, 0.10) 22%,
          rgba(14, 116, 144, 0.05)  45%,
          transparent 70%);
    }
    /* 3 · CRT 横向扫描线 overlay */
    .backdrop-scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(180deg,
        rgba(255, 255, 255, 0.022) 0px,
        rgba(255, 255, 255, 0.022) 1px,
        transparent 1px, transparent 3px);
      mix-blend-mode: overlay;
    }
    /* 4 · 细噪点 (SVG data URI) */
    .backdrop-noise {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    /* 5 · 顶栏下暗渐变 */
    .backdrop-top-fade {
      position: absolute;
      inset: 0 0 auto 0;
      height: 160px;
      background: linear-gradient(180deg, rgba(5, 5, 16, 0.9) 0%, rgba(5, 5, 16, 0) 100%);
    }

    /* ────────────── Layer 1 · Retro horizon (局部装饰) ────────────── */
    .retro {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    /* Synthwave 地平线光带 */
    .retro-line {
      position: absolute;
      left: 0; right: 0;
      top: 72vh;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(244, 63, 94, 0.5) 30%,
        rgba(226, 232, 240, 0.9) 50%,
        rgba(0, 240, 255, 0.5) 70%,
        transparent 100%);
      box-shadow: 0 0 28px rgba(226, 232, 240, 0.5),
                  0 -1px 40px rgba(244, 63, 94, 0.3);
    }
    /* 合成太阳半圆 */
    .retro-sun {
      position: absolute;
      top: 72vh;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(360px, 34vw, 560px);
      height: clamp(360px, 34vw, 560px);
      background: radial-gradient(circle at center,
        rgba(244, 63, 94, 0.32) 0%,
        rgba(203, 213, 225, 0.15) 35%,
        rgba(0, 240, 255, 0.05) 60%,
        transparent 75%);
      filter: blur(6px);
    }
    /* Tron 透视地板 */
    .retro-floor {
      position: absolute;
      left: 0; right: 0;
      top: 72vh; bottom: 0;
      perspective: 420px;
      perspective-origin: 50% 0%;
    }
    .retro-floor-grid {
      position: absolute;
      top: 0; bottom: 0;
      left: -35%; right: -35%;
      background:
        repeating-linear-gradient(180deg,
          transparent 0, transparent 43px,
          rgba(203, 213, 225, 0.38) 43px,
          rgba(203, 213, 225, 0.38) 44px),
        repeating-linear-gradient(90deg,
          transparent 0, transparent 43px,
          rgba(0, 240, 255, 0.38) 43px,
          rgba(0, 240, 255, 0.38) 44px);
      transform: rotateX(62deg);
      transform-origin: 50% 0%;
      -webkit-mask-image: linear-gradient(180deg, transparent 0%, black 38%, black 100%);
      mask-image:         linear-gradient(180deg, transparent 0%, black 38%, black 100%);
    }

    /* ────────────── Layer 2 · Centered card ────────────── */
    .stage {
      position: relative;
      z-index: 10;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      padding: 38px 36px 34px;
      background: var(--c-glass);
      border: 1px solid var(--c-border);
      border-radius: 22px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 18px 54px rgba(0, 0, 0, 0.55),
        inset 0 0 10px rgba(148, 163, 184, 0.04);
      animation: card-rise 900ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
    }
    @keyframes card-rise {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Brand row */
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--hero-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow:
        0 0 28px rgba(124, 58, 237, 0.30),
        0 0 54px rgba(0, 240, 255, 0.16);
    }
    .brand-mark svg { width: 22px; height: 22px; color: #fff; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.45)); }
    .brand-text { min-width: 0; }
    .brand-name {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--c-ink);
      line-height: 1.2;
    }
    .brand-sub {
      font-size: 12.5px;
      color: var(--c-muted);
      margin-top: 2px;
    }

    /* HUD chip eyebrow */
    .hud {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding: 8px 14px;
      border-radius: 6px;
      font-family: var(--font-mono);
      background: rgba(10, 14, 22, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.30);
      box-shadow:
        0 0 22px rgba(148, 163, 184, 0.18),
        inset 0 0 10px rgba(148, 163, 184, 0.04);
      animation: hud-pulse 4s ease-in-out infinite;
    }
    @keyframes hud-pulse {
      0%, 100% {
        box-shadow: 0 0 22px rgba(148, 163, 184, 0.18),
                    inset 0 0 10px rgba(148, 163, 184, 0.04);
      }
      50% {
        box-shadow: 0 0 32px rgba(203, 213, 225, 0.28),
                    inset 0 0 14px rgba(203, 213, 225, 0.08);
      }
    }
    .hud-dot {
      position: relative;
      width: 8px;
      height: 8px;
    }
    .hud-dot::before, .hud-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: #34d399;
    }
    .hud-dot::before {
      box-shadow: 0 0 10px #34d399;
    }
    .hud-dot::after {
      opacity: 0.7;
      animation: ping 1.4s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping {
      75%, 100% { transform: scale(2); opacity: 0; }
    }
    .hud-text {
      font-size: 13px;
      color: #6ee7b7;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(52, 211, 153, 0.6);
    }
    .hud-sep {
      display: inline-block;
      width: 1px;
      height: 14px;
      background: rgba(255, 255, 255, 0.15);
    }
    .hud-sub {
      font-size: 13px;
      color: #e2e8f0;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(203, 213, 225, 0.5);
    }

    /* Hero title + neon pulse */
    h1 {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: clamp(1.75rem, 3vw, 2.125rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--c-ink);
      animation: title-pulse 5s ease-in-out infinite;
    }
    @keyframes title-pulse {
      0%, 100% {
        text-shadow:
          0 0 28px rgba(203, 213, 225, 0.30),
          0 0 80px rgba(0, 240, 255, 0.20),
          0 0 120px rgba(124, 58, 237, 0.10);
      }
      50% {
        text-shadow:
          0 0 38px rgba(226, 232, 240, 0.44),
          0 0 100px rgba(0, 240, 255, 0.28),
          0 0 150px rgba(124, 58, 237, 0.16);
      }
    }
    .subtitle {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.65;
      color: var(--c-muted);
    }

    /* Form */
    form {
      margin-top: 26px;
      display: grid;
      gap: 16px;
    }
    .field {
      display: block;
    }
    .field-label {
      display: block;
      margin-bottom: 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
    }
    .field-wrap {
      position: relative;
      display: flex;
      align-items: center;
      border-radius: 12px;
      background: rgba(10, 14, 22, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }
    .field-wrap:focus-within {
      border-color: rgba(255, 255, 255, 0.35);
      box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.12);
    }
    .field-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      color: rgba(255, 255, 255, 0.45);
      flex-shrink: 0;
    }
    .field-icon svg { width: 16px; height: 16px; }
    .field-wrap input {
      flex: 1;
      height: 46px;
      padding: 0 16px 0 4px;
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 14.5px;
      color: var(--c-ink);
      caret-color: #00f0ff;
    }
    .field-wrap input::placeholder { color: var(--c-faint); }

    /* Error bar */
    .error-msg {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--c-err-bg);
      border: 1px solid var(--c-err-brd);
      color: var(--c-err);
      font-size: 13px;
      line-height: 1.5;
      box-shadow: 0 0 24px rgba(244, 63, 94, 0.12);
    }
    .error-msg.show { display: block; animation: fade-in 200ms ease both; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    /* Primary pill CTA */
    .btn-primary {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 48px;
      padding: 0 28px;
      margin-top: 6px;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 14.5px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #fff;
      background: var(--hero-grad);
      box-shadow:
        0 0 48px rgba(124, 58, 237, 0.35),
        0 0 100px rgba(0, 240, 255, 0.2),
        0 10px 32px rgba(0, 0, 0, 0.5);
      transition: transform 180ms ease, filter 180ms ease;
    }
    .btn-primary:hover:not(:disabled) { transform: scale(1.01); filter: brightness(1.08); }
    .btn-primary:active:not(:disabled) { transform: scale(0.98); }
    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn-primary svg { width: 16px; height: 16px; }
    .btn-primary .arrow { transition: transform 180ms ease; }
    .btn-primary:hover:not(:disabled) .arrow { transform: translateX(2px); }
    .btn-primary .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 800ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Terminal-style footer hint */
    .footer-hint {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 11.5px;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.42);
    }
    .footer-hint svg { width: 12px; height: 12px; }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .card, h1, .hud, .hud-dot::after { animation: none !important; }
      .btn-primary { transition: none; }
    }
  </style>
</head>
<body>
  <!-- Layer 0 · StaticBackdrop -->
  <div class="backdrop" aria-hidden="true">
    <div class="backdrop-scanlines"></div>
    <div class="backdrop-noise"></div>
    <div class="backdrop-top-fade"></div>
  </div>

  <!-- Layer 1 · Retro horizon -->
  <div class="retro" aria-hidden="true">
    <div class="retro-line"></div>
    <div class="retro-sun"></div>
    <div class="retro-floor"><div class="retro-floor-grid"></div></div>
  </div>

  <!-- Layer 2 · Glass card -->
  <main class="stage">
    <section class="card" aria-labelledby="loginTitle">
      <!-- Brand row -->
      <div class="brand">
        <div class="brand-mark">
          <!-- Stylized cloud-dev mark (cloud + terminal chevron) -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.6 1.5A4 4 0 0 0 6.5 19z"/>
            <polyline points="9 13 11 15 9 17"/>
            <line x1="12.5" y1="17" x2="15" y2="17"/>
          </svg>
        </div>
        <div class="brand-text">
          <div class="brand-name">Cloud Dev Suite</div>
          <div class="brand-sub">Branch · Build · Preview · Ship</div>
        </div>
      </div>

      <!-- HUD eyebrow -->
      <div class="hud">
        <span class="hud-dot" aria-hidden="true"></span>
        <span class="hud-text">SECURE TUNNEL</span>
        <span class="hud-sep"></span>
        <span class="hud-sub">READY</span>
      </div>

      <!-- Hero title -->
      <h1 id="loginTitle">进入控制面板</h1>
      <p class="subtitle">请输入凭据以访问 Cloud Dev Suite。登录后可浏览分支、触发构建并打开预览。</p>

      <!-- Form -->
      <form onsubmit="doLogin(event)" autocomplete="on" novalidate>
        <label class="field" for="username">
          <span class="field-label">USERNAME</span>
          <span class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input id="username" type="text" placeholder="admin" autocomplete="username" autofocus required>
          </span>
        </label>

        <label class="field" for="password">
          <span class="field-label">PASSWORD</span>
          <span class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
          </span>
        </label>

        <div class="error-msg" id="errorMsg" role="alert" aria-live="polite"></div>

        <button type="submit" id="loginBtn" class="btn-primary">
          <span id="btnIconDefault" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </span>
          <span id="btnIconSpin" class="spinner" hidden aria-hidden="true"></span>
          <span id="btnLabel">进入控制面板</span>
          <span class="arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </span>
        </button>

        <!-- Terminal-style key hint -->
        <div class="footer-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
          <span>↵ ENTER TO AUTHENTICATE · SECURE COOKIE · 30 DAYS</span>
        </div>
      </form>
    </section>
  </main>

  <script>
    // ------------------------------------------------------------
    // 业务逻辑 — 与原版一致，仅保留 UI 状态切换
    // POST /api/login { username, password }
    //   → 200 { success: true }         → 跳转 /
    //   → 401 { error: '...' }          → 显示错误
    // ------------------------------------------------------------
    async function doLogin(e) {
      e.preventDefault();
      const btn        = document.getElementById('loginBtn');
      const err        = document.getElementById('errorMsg');
      const iconDef    = document.getElementById('btnIconDefault');
      const iconSpin   = document.getElementById('btnIconSpin');
      const label      = document.getElementById('btnLabel');

      btn.disabled = true;
      err.classList.remove('show');
      err.textContent = '';
      iconDef.hidden = true;
      iconSpin.hidden = false;
      label.textContent = '认证中…';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '登录失败');
        label.textContent = '已认证，跳转中…';
        location.href = '/';
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.add('show');
        btn.disabled = false;
        iconDef.hidden = false;
        iconSpin.hidden = true;
        label.textContent = '进入控制面板';
      }
    }
  </script>
</body>
</html>
