<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Projects · Cloud Development Suite</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
  <link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    // Apply theme BEFORE CSS loads to prevent dark→light flash
    (function(){var t=localStorage.getItem('cds_theme');if(t==='light')document.documentElement.dataset.theme='light';})();
    document.write('<link rel="stylesheet" href="style.css?t='+Date.now()+'">');
  </script>
  <style>
    /*
     * Projects page — Railway-inspired shell.
     *
     * Layout: fixed-width left sidebar (260px) + main content (flex 1).
     * Dark palette reuses the Dashboard's existing CSS variables
     * (--bg-primary / --bg-card / --accent etc.) so the two pages feel
     * like the same product. New tokens below are additive and only
     * used on this page.
     */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ───── Global shell ───── */
    .cds-shell {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    /* ───── Sidebar ───── */
    .cds-sidebar {
      background: var(--bg-primary);
      border-right: 1px solid var(--border, rgba(255,255,255,0.08));
      display: flex;
      flex-direction: column;
      padding: 18px 14px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .cds-logo-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px 16px;
      border-bottom: 1px solid var(--border-light, rgba(255,255,255,0.04));
      margin-bottom: 10px;
    }
    .cds-logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .cds-logo-mark {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--blue, #38bdf8) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
    }

    /* Workspace switcher pill */
    .cds-workspace {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      background: var(--bg-card);
      border: 1px solid var(--card-border, rgba(255,255,255,0.12));
      border-radius: 10px;
      cursor: default;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .cds-workspace:hover { background: var(--bg-elevated); }
    .cds-workspace-avatar {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .cds-workspace-meta {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .cds-workspace-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cds-workspace-sub {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .cds-workspace-chevron { opacity: 0.4; flex-shrink: 0; }

    /* Nav groups */
    .cds-nav { display: flex; flex-direction: column; gap: 2px; margin-top: 14px; }
    .cds-nav-divider {
      height: 1px;
      background: var(--border-light);
      margin: 10px 8px;
    }
    .cds-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: background 120ms ease, color 120ms ease;
      cursor: pointer;
    }
    .cds-nav-item:hover {
      background: var(--bg-hover, rgba(255,255,255,0.04));
      color: var(--text-primary);
    }
    .cds-nav-item.active {
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-weight: 600;
    }
    .cds-nav-item.disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }
    .cds-nav-item .ext {
      margin-left: auto;
      opacity: 0.4;
    }

    /* User card (sticky bottom) */
    .cds-user-card {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-top: 1px solid var(--border-light);
      padding-top: 14px;
    }
    .cds-user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fb7185 0%, #f59e0b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .cds-user-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .cds-user-name {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ───── Main content ───── */
    .cds-main {
      padding: 36px 40px 60px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .cds-main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 12px;
    }
    .cds-main-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }
    .cds-main-actions { display: flex; gap: 10px; align-items: center; }

    .btn-primary-solid {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
      box-shadow: 0 1px 0 rgba(0,0,0,0.2), 0 4px 10px rgba(16, 185, 129, 0.15);
    }
    .btn-primary-solid:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    /* Toolbar */
    .cds-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .cds-toolbar-left { display: flex; align-items: center; gap: 14px; }
    .cds-toolbar-right { display: flex; gap: 4px; }
    .cds-view-toggle {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: 7px;
      padding: 2px;
    }
    .cds-view-toggle button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 5px;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }
    .cds-view-toggle button.active {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    /* Project grid */
    .cds-project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .cds-project-card {
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 22px 22px 18px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: transform 200ms cubic-bezier(0.4, 0, 0.2, 1),
                  border-color 200ms ease,
                  background 200ms ease,
                  box-shadow 200ms ease;
    }
    .cds-project-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent-border, rgba(16,185,129,0.3));
      background: var(--bg-elevated);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    .cds-project-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .cds-project-card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .cds-legacy-badge {
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: 5px;
      color: var(--accent);
    }

    /* Service icon strip (3×dotted background like Railway) */
    .cds-service-strip {
      background: var(--bg-primary);
      border: 1px dashed var(--border-light);
      border-radius: 10px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .cds-service-strip::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 14px 14px;
      pointer-events: none;
    }
    .cds-service-tile {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .cds-service-tile svg { width: 22px; height: 22px; }
    .cds-service-tile.more {
      background: transparent;
      border-style: dashed;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
    }
    .cds-service-empty {
      font-size: 11px;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
    }

    /* Card footer (env + count + delete) */
    .cds-project-card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .cds-env-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .cds-env-dot::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green, #10b981);
      box-shadow: 0 0 8px rgba(16,185,129,0.6);
    }
    .cds-service-count {
      color: var(--text-secondary);
    }
    .cds-service-count strong { color: var(--green); font-weight: 700; }
    .cds-project-card-delete {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 28px;
      height: 28px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.25);
      color: var(--red, #f43f5e);
      cursor: pointer;
      transition: background 120ms ease;
    }
    .cds-project-card:hover .cds-project-card-delete { display: flex; }
    .cds-project-card-delete:hover { background: rgba(244, 63, 94, 0.22); }

    /* Empty / loading states */
    .cds-grid-state {
      grid-column: 1 / -1;
      padding: 80px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .cds-grid-state strong { color: var(--text-primary); }
    .cds-grid-state.error { color: var(--red); }

    /* Modal (shared with create flow) */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(3, 7, 18, 0.68);
      backdrop-filter: blur(6px);
      z-index: 9000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal-backdrop.visible { display: flex; }
    .modal-dialog {
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 32px 32px 26px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .modal-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .form-row { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .form-label .opt { font-weight: 400; color: var(--text-muted); margin-left: 6px; }
    .form-input {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--card-border);
      border-radius: 9px;
      padding: 10px 12px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
    }
    .form-error {
      font-size: 11px;
      color: var(--red);
      margin-top: 6px;
      min-height: 14px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-ghost, .btn-primary {
      padding: 9px 18px;
      border-radius: 9px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
    }
    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--card-border); }
    .btn-ghost:hover { background: var(--bg-elevated); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-elevated);
      color: var(--text-primary);
      padding: 12px 20px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      font-size: 13px;
      z-index: 10000;
      box-shadow: 0 16px 44px rgba(0,0,0,0.5);
    }
    .toast.hidden { display: none; }

    /* Responsive: collapse sidebar on narrow screens */
    @media (max-width: 900px) {
      .cds-shell { grid-template-columns: 1fr; }
      .cds-sidebar {
        position: relative;
        height: auto;
        padding: 14px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .cds-main { padding: 24px 20px 40px; }
    }
  </style>
</head>
<body>
  <div class="cds-shell">
    <!-- ───── Sidebar ───── -->
    <aside class="cds-sidebar">
      <div class="cds-logo-row">
        <div class="cds-logo">
          <div class="cds-logo-mark">C</div>
          <span>Cloud Dev Suite</span>
        </div>
      </div>

      <div class="cds-workspace" title="团队 workspace 将在 P5 上线">
        <div class="cds-workspace-avatar" id="wsAvatar">S</div>
        <div class="cds-workspace-meta">
          <span class="cds-workspace-name" id="wsName">System</span>
          <span class="cds-workspace-sub">Personal</span>
        </div>
        <svg class="cds-workspace-chevron" width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4.22 6.22a.75.75 0 011.06 0L8 8.94l2.72-2.72a.75.75 0 111.06 1.06l-3.25 3.25a.75.75 0 01-1.06 0L4.22 7.28a.75.75 0 010-1.06z"/></svg>
      </div>

      <nav class="cds-nav">
        <a class="cds-nav-item active" href="projects.html">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0114.25 15H1.75A1.75 1.75 0 010 13.25V2.75C0 1.784.784 1 1.75 1zM1.5 2.75v10.5c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V2.75a.25.25 0 00-.25-.25H1.75a.25.25 0 00-.25.25z"/></svg>
          <span>Projects</span>
        </a>
        <a class="cds-nav-item disabled" title="P6 手动项目模板 (未上线)">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.75A.75.75 0 012.75 2H6.5v4.5H2v-3.75zM9.5 2h3.75a.75.75 0 01.75.75V6H9.5V2zM9.5 7.5H14v5.75a.75.75 0 01-.75.75H9.5v-6.5zM2 7.5h4.5V14H2.75a.75.75 0 01-.75-.75V7.5z"/></svg>
          <span>Templates</span>
        </a>
        <div class="cds-nav-divider"></div>
        <a class="cds-nav-item disabled" title="P5 使用统计 (未上线)">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1.75a.75.75 0 00-1.5 0v12.5c0 .414.336.75.75.75h14.5a.75.75 0 000-1.5H1.5V1.75zm14.28 2.53a.75.75 0 00-1.06-1.06L10 7.94 7.53 5.47a.75.75 0 00-1.06 0L2.22 9.72a.75.75 0 001.06 1.06L7 7.06l2.47 2.47a.75.75 0 001.06 0l5.25-5.25z"/></svg>
          <span>Usage</span>
        </a>
        <a class="cds-nav-item disabled" title="P5 成员管理 (未上线)">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 3.5a2.5 2.5 0 115 0 2.5 2.5 0 01-5 0zM8 0a3.5 3.5 0 00-1.04 6.84A5 5 0 003 12v.5A1.5 1.5 0 004.5 14h7a1.5 1.5 0 001.5-1.5V12a5 5 0 00-3.96-4.16A3.5 3.5 0 008 0z"/></svg>
          <span>People</span>
        </a>
        <a class="cds-nav-item" href="index.html">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 0110.65-5.003.75.75 0 00.959-1.153 8 8 0 102.592 8.33.75.75 0 00-1.444-.407A6.5 6.5 0 011.5 8z"/></svg>
          <span>Dashboard</span>
        </a>
        <div class="cds-nav-divider"></div>
        <a class="cds-nav-item" href="https://github.com/inernoro/prd_agent/blob/main/doc/plan.cds-multi-project-phases.md" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75A.75.75 0 01.75 1h4.253c1.227 0 2.317.59 3 1.501A3.744 3.744 0 0111.006 1h4.245a.75.75 0 01.75.75v10.5a.75.75 0 01-.75.75h-4.507a2.25 2.25 0 00-1.591.659l-.622.621a.75.75 0 01-1.06 0l-.622-.621A2.25 2.25 0 005.258 13H.75a.75.75 0 01-.75-.75V1.75z"/></svg>
          <span>Plan · 7 Phases</span>
          <svg class="ext" width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M3.75 2h3.5a.75.75 0 010 1.5h-3.5a.25.25 0 00-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 00.25-.25v-3.5a.75.75 0 011.5 0v3.5A1.75 1.75 0 0112.25 14h-8.5A1.75 1.75 0 012 12.25v-8.5C2 2.784 2.784 2 3.75 2zm6.854-1h4.146a.25.25 0 01.25.25v4.146a.25.25 0 01-.427.177L13.03 4.03 9.28 7.78a.75.75 0 01-1.06-1.06l3.75-3.75-1.543-1.543A.25.25 0 0110.604 1z"/></svg>
        </a>
      </nav>

      <div class="cds-user-card">
        <div class="cds-user-avatar" id="userAvatar">?</div>
        <span class="cds-user-name" id="userName">未登录</span>
      </div>
    </aside>

    <!-- ───── Main content ───── -->
    <main class="cds-main">
      <div class="cds-main-header">
        <h1 class="cds-main-title">Projects</h1>
        <div class="cds-main-actions">
          <button class="btn-primary-solid" onclick="handleNewProject()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M7.75 2a.75.75 0 01.75.75V7h4.25a.75.75 0 010 1.5H8.5v4.25a.75.75 0 01-1.5 0V8.5H2.75a.75.75 0 010-1.5H7V2.75A.75.75 0 017.75 2z"/></svg>
            New
          </button>
        </div>
      </div>

      <div class="cds-toolbar">
        <div class="cds-toolbar-left">
          <span><strong id="projectCount" style="color:var(--text-secondary)">…</strong> Projects</span>
          <span style="opacity:0.4">|</span>
          <span>Sort by: Recent Activity</span>
        </div>
        <div class="cds-toolbar-right">
          <div class="cds-view-toggle">
            <button class="active" title="Grid view" aria-label="Grid view">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M1.75 1h5.5c.414 0 .75.336.75.75v5.5A.75.75 0 017.25 8h-5.5A.75.75 0 011 7.25v-5.5C1 1.336 1.336 1 1.75 1zm7 0h5.5c.414 0 .75.336.75.75v5.5a.75.75 0 01-.75.75h-5.5A.75.75 0 018 7.25v-5.5c0-.414.336-.75.75-.75zM1.75 8.75h5.5c.414 0 .75.336.75.75v5.5a.75.75 0 01-.75.75h-5.5a.75.75 0 01-.75-.75v-5.5c0-.414.336-.75.75-.75zm7 0h5.5c.414 0 .75.336.75.75v5.5a.75.75 0 01-.75.75h-5.5a.75.75 0 01-.75-.75v-5.5c0-.414.336-.75.75-.75z"/></svg>
            </button>
            <button title="List view (coming soon)" aria-label="List view" disabled style="opacity:0.4">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3.75a.75.75 0 01.75-.75h10.5a.75.75 0 010 1.5H2.75A.75.75 0 012 3.75zm0 4a.75.75 0 01.75-.75h10.5a.75.75 0 010 1.5H2.75A.75.75 0 012 7.75zM2.75 11a.75.75 0 000 1.5h10.5a.75.75 0 000-1.5H2.75z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div id="projectsGrid" class="cds-project-grid">
        <div class="cds-grid-state">正在加载项目列表…</div>
      </div>
    </main>
  </div>

  <!-- Create Project modal (P4 Part 2) -->
  <div id="createProjectModal" class="modal-backdrop" onclick="closeCreateProjectModal(event)">
    <div class="modal-dialog" onclick="event.stopPropagation()">
      <div class="modal-title">新建项目</div>
      <div class="modal-subtitle">每个项目拥有独立的 Docker 网络，分支和配置相互隔离</div>

      <form id="createProjectForm" onsubmit="handleCreateProjectSubmit(event)">
        <div class="form-row">
          <label class="form-label" for="cp-name">名称 <span class="opt">*</span></label>
          <input id="cp-name" class="form-input" type="text" maxlength="60" required placeholder="例如：my-api" autocomplete="off">
        </div>
        <div class="form-row">
          <label class="form-label" for="cp-slug">Slug <span class="opt">留空自动生成</span></label>
          <input id="cp-slug" class="form-input" type="text" maxlength="50" placeholder="lowercase-kebab" autocomplete="off">
        </div>
        <div class="form-row">
          <label class="form-label" for="cp-gitRepoUrl">Git 仓库 URL <span class="opt">可选</span></label>
          <input id="cp-gitRepoUrl" class="form-input" type="url" placeholder="https://github.com/your-org/repo.git" autocomplete="off">
        </div>
        <div class="form-row">
          <label class="form-label" for="cp-description">描述 <span class="opt">可选</span></label>
          <input id="cp-description" class="form-input" type="text" maxlength="200" placeholder="一句话介绍这个项目" autocomplete="off">
        </div>
        <div id="createProjectError" class="form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost" onclick="closeCreateProjectModal()">取消</button>
          <button type="submit" id="createProjectSubmitBtn" class="btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="projects.js?t=0"></script>
  <script>
    document.currentScript.previousElementSibling.src = 'projects.js?t=' + Date.now();
  </script>
</body>
</html>
