services:
  nginx:
    image: nginx:1.27-alpine
    container_name: __NGINX_CONTAINER__
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cds-nginx.conf:/etc/nginx/conf.d/cds.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./www:/var/www/html:rw
