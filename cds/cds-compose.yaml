# CDS Compose 配置 — 由 /cds-scan 自动生成
# 导入方式：CDS Dashboard → 设置 → 一键导入 → 粘贴此内容
# 敏感值通过 ${VAR} 从宿主机环境变量读取，无需明文写入

x-cds-project:
  name: prd_agent
  description: "PRD Agent 全栈项目 (.NET 8 + React 18 + Tauri 2.0)"
  repo: https://github.com/inernoro/prd_agent.git

# 全局共享环境变量 — CDS 自动注入所有容器
# ${VAR} 解析顺序：CDS 内部变量 → 宿主机 process.env → 空字符串
x-cds-env:
  ASSETS_PROVIDER: "${ASSETS_PROVIDER:-tencentCos}"
  TENCENT_COS_BUCKET: "${TENCENT_COS_BUCKET}"
  TENCENT_COS_REGION: "${TENCENT_COS_REGION}"
  TENCENT_COS_SECRET_ID: "${TENCENT_COS_SECRET_ID}"
  TENCENT_COS_SECRET_KEY: "${TENCENT_COS_SECRET_KEY}"
  TENCENT_COS_PUBLIC_BASE_URL: "${TENCENT_COS_PUBLIC_BASE_URL:-https://i.miduo.org}"
  TENCENT_COS_PREFIX: "${TENCENT_COS_PREFIX:-data}"
  JWT_SECRET: "${JWT_SECRET}"
  AI_ACCESS_KEY: "${AI_ACCESS_KEY}"

services:
  # ── App Services ──

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    volumes:
      - ./prd-api:/app
      - ./prd-video:/prd-video                 # 挂载 Remotion 项目供单镜渲染调用
      - prd-video-deps:/prd-video/node_modules # 缓存 node_modules 跨重启复用
      - prd-api-aptcache:/var/cache/apt        # 缓存 apt 包跨重启复用
      - .:/repo:ro
    ports:
      - "5000"
    # CDS api 容器是裸 dotnet/sdk:8.0，没有 Node.js / npx / Chromium。
    # 视频 Agent 的 Remotion 单镜渲染要 fork `npx remotion render`，必须先把
    # 这些依赖装上。用 marker 文件 + node_modules 检测避免每次重启重装。
    command: >-
      bash -lc "
      set -e;
      if [ ! -f /usr/bin/node ]; then
        echo '[init] installing Node.js 20 + Chromium for Remotion ...';
        apt-get update -qq;
        apt-get install -y -qq --no-install-recommends curl ca-certificates gnupg chromium fonts-noto;
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -;
        apt-get install -y -qq --no-install-recommends nodejs;
        npm install -g pnpm@9 --silent;
        printf '#!/bin/sh\\nexec /usr/bin/chromium --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage \"\\$@\"\\n' > /usr/local/bin/chromium-docker;
        chmod +x /usr/local/bin/chromium-docker;
      fi;
      if [ ! -d /prd-video/node_modules/remotion ]; then
        echo '[init] installing prd-video pnpm deps ...';
        cd /prd-video && pnpm install --frozen-lockfile;
      fi;
      cd /app;
      dotnet restore;
      dotnet build --no-restore;
      dotnet run --project src/PrdAgent.Api --urls http://0.0.0.0:5000
      "
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Changelog__RootPath: /repo
      MongoDB__ConnectionString: "mongodb://${CDS_HOST}:${CDS_MONGODB_PORT}"
      MongoDB__DatabaseName: prdagent
      Redis__ConnectionString: "${CDS_HOST}:${CDS_REDIS_PORT}"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: prdagent
      CHROMIUM_EXECUTABLE_PATH: /usr/local/bin/chromium-docker  # Remotion 4.x 走系统 Chromium
    labels:
      cds.path-prefix: "/api/"

  admin:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./prd-admin:/app
    ports:
      - "8000"
    command: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm exec vite --host 0.0.0.0 --port 8000
    labels:
      cds.path-prefix: "/"

  # ── Infrastructure Services ──

  mongodb:
    image: mongo:8.0
    ports:
      - "27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand({ping:1})" --quiet
      interval: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      retries: 3

volumes:
  mongodb-data:
  redis-data:
  prd-video-deps:    # /prd-video/node_modules 跨容器重启缓存
  prd-api-aptcache:  # /var/cache/apt 跨容器重启缓存（避免 nodejs/chromium 重下）
