# CDS Compose 配置 — 由 /cds-scan 自动生成
# 导入方式：CDS Dashboard → 设置 → 一键导入 → 粘贴此内容
# 敏感值通过 ${VAR} 从宿主机环境变量读取，无需明文写入

x-cds-project:
  name: prd_agent
  description: "PRD Agent 全栈项目 (.NET 8 + React 18 + Tauri 2.0)"
  repo: https://github.com/inernoro/prd_agent.git

# 全局共享环境变量 — CDS 自动注入所有容器
# ${VAR} 解析顺序：CDS 内部变量 → 宿主机 process.env → 空字符串
x-cds-env:
  ASSETS_PROVIDER: "${ASSETS_PROVIDER:-tencentCos}"
  TENCENT_COS_BUCKET: "${TENCENT_COS_BUCKET}"
  TENCENT_COS_REGION: "${TENCENT_COS_REGION}"
  TENCENT_COS_SECRET_ID: "${TENCENT_COS_SECRET_ID}"
  TENCENT_COS_SECRET_KEY: "${TENCENT_COS_SECRET_KEY}"
  TENCENT_COS_PUBLIC_BASE_URL: "${TENCENT_COS_PUBLIC_BASE_URL:-https://i.miduo.org}"
  TENCENT_COS_PREFIX: "${TENCENT_COS_PREFIX:-data}"
  JWT_SECRET: "${JWT_SECRET}"
  AI_ACCESS_KEY: "${AI_ACCESS_KEY}"

services:
  # ── App Services ──

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    volumes:
      - ./prd-api:/app
      - .:/repo:ro
    ports:
      - "5000"
    command: >-
      dotnet restore &&
      dotnet build --no-restore &&
      dotnet run --project src/PrdAgent.Api --urls http://0.0.0.0:5000
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Changelog__RootPath: /repo
      MongoDB__ConnectionString: "mongodb://${CDS_HOST}:${CDS_MONGODB_PORT}"
      MongoDB__DatabaseName: prdagent
      Redis__ConnectionString: "${CDS_HOST}:${CDS_REDIS_PORT}"
      Jwt__Secret: "${JWT_SECRET}"
      Jwt__Issuer: prdagent
      # Remotion 单镜渲染解耦到独立 video-renderer 容器，api 容器只发 HTTP 请求
      VideoRenderer__Url: "http://${CDS_HOST}:${CDS_VIDEO_RENDERER_PORT}"
    labels:
      cds.path-prefix: "/api/"

  admin:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./prd-admin:/app
    ports:
      - "8000"
    command: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm exec vite --host 0.0.0.0 --port 8000
    labels:
      cds.path-prefix: "/"

  # ── Remotion 单镜渲染微服务 ──
  # 把 Node + Chromium + Remotion 项目隔离到独立容器，api（dotnet）通过
  # HTTP POST /render/scene 调用。避免 dotnet 容器既要装 dotnet 又要装 Node 的混合架构。
  video-renderer:
    image: node:20-bullseye-slim
    working_dir: /renderer
    volumes:
      - ./prd-video-renderer:/renderer
      - ./prd-video:/prd-video
      - prd-video-renderer-deps:/renderer/node_modules
      - prd-video-deps:/prd-video/node_modules
      - video-renderer-aptcache:/var/cache/apt
    ports:
      - "5001"
    command: >-
      bash -lc "
      set -e;
      if [ ! -f /usr/bin/chromium ]; then
        echo '[init] installing Chromium + fonts ...';
        apt-get update -qq;
        apt-get install -y -qq --no-install-recommends chromium fonts-noto curl ca-certificates;
        printf '#!/bin/sh\\nexec /usr/bin/chromium --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage \"\\$@\"\\n' > /usr/local/bin/chromium-docker;
        chmod +x /usr/local/bin/chromium-docker;
      fi;
      if [ ! -d /prd-video/node_modules/remotion ]; then
        echo '[init] installing prd-video deps ...';
        cd /prd-video && corepack enable && pnpm install --frozen-lockfile;
      fi;
      cd /renderer;
      if [ ! -d /renderer/node_modules/express ]; then
        corepack enable && pnpm install --frozen-lockfile 2>/dev/null || pnpm install;
      fi;
      pnpm exec tsx watch src/server.ts
      "
    environment:
      NODE_ENV: development
      PORT: "5001"
      PRD_VIDEO_PATH: /prd-video
      CHROMIUM_EXECUTABLE_PATH: /usr/local/bin/chromium-docker
    labels:
      cds.path-prefix: "/render/"

  # ── Infrastructure Services ──

  mongodb:
    image: mongo:8.0
    ports:
      - "27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand({ping:1})" --quiet
      interval: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      retries: 3

volumes:
  mongodb-data:
  redis-data:
  prd-video-deps:               # /prd-video/node_modules 跨容器重启缓存
  prd-video-renderer-deps:      # /renderer/node_modules 跨容器重启缓存
  video-renderer-aptcache:      # video-renderer 容器 apt 缓存（chromium 重下慢）
