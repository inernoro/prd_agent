<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>登录 · Cloud Development Suite</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
  <link href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #131314;
      --bg-card: #1E1F20;
      --bg-elevated: #282A2C;
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #10b981;
      --accent-dim: #059669;
      --card-border: rgba(255, 255, 255, 0.12);
      --error: #f43f5e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--card-border);
      margin-bottom: 16px;
    }
    .login-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }
    .gh-button {
      width: 100%;
      padding: 13px 20px;
      background: #24292e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 120ms ease;
      text-decoration: none;
    }
    .gh-button:hover {
      background: #1a1e22;
    }
    .login-hint {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--card-border);
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
    }
    .login-hint strong {
      color: var(--text-secondary);
      font-weight: 600;
    }
    .error-banner {
      margin-bottom: 20px;
      padding: 12px 14px;
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 12px;
      line-height: 1.5;
    }
    .error-banner.hidden { display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <svg width="28" height="28" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </div>
      <h1 class="login-title">Cloud Development Suite</h1>
      <p class="login-subtitle">使用 GitHub 账号登录继续</p>
    </div>

    <div id="errorBanner" class="error-banner hidden"></div>

    <a id="loginBtn" href="/api/auth/github/login" class="gh-button">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      使用 GitHub 登录
    </a>

    <div class="login-hint">
      首次登录会自动创建个人 workspace。<br>
      仅限 <strong>CDS_ALLOWED_ORGS</strong> 白名单的组织成员。
    </div>
  </div>

  <script>
    (function () {
      // Pass ?redirect=... through to the OAuth start URL so /login-gh.html?redirect=/xyz
      // routes correctly after auth completes.
      var params = new URLSearchParams(location.search);
      var redirect = params.get('redirect');
      if (redirect) {
        var btn = document.getElementById('loginBtn');
        btn.href = '/api/auth/github/login?redirect=' + encodeURIComponent(redirect);
      }

      // If the server pushed an error back via ?error=... show it inline.
      var err = params.get('error');
      if (err) {
        var banner = document.getElementById('errorBanner');
        banner.textContent = decodeURIComponent(err);
        banner.classList.remove('hidden');
      }
    })();
  </script>
</body>
</html>
