<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">技术质量月报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
/* ============================================================
   CSS Variables & Reset
   ============================================================ */
:root {
  --bg-primary:    #0D1117;
  --bg-card:       #161B22;
  --bg-elevated:   #1C2128;
  --border:        #30363D;
  --text-primary:  #E6EDF3;
  --text-secondary:#7D8590;
  --accent-blue:   #1E6FD9;
  --accent-orange: #F5A623;
  --accent-green:  #27C97F;
  --accent-red:    #E84040;
  --accent-cyan:   #4ECDC4;
  --accent-deep-orange: #FF6B35;
  --font-display:  'Bebas Neue', 'DIN Alternate', monospace;
  --font-body:     'Noto Sans SC', sans-serif;
  --radius:        12px;
  --radius-sm:     8px;
  --transition:    0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   Scrollbar
   ============================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* ============================================================
   Layout
   ============================================================ */
.container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* ============================================================
   Sticky Navbar
   ============================================================ */
.navbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13, 17, 23, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.navbar-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.navbar-brand {
  display: flex; align-items: center; gap: 12px;
  font-weight: 700; font-size: 1.1rem; color: var(--text-primary);
}
.navbar-brand .logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 1.2rem; color: #fff;
}
.navbar-tabs {
  display: flex; gap: 4px; background: var(--bg-elevated);
  border-radius: var(--radius-sm); padding: 4px;
}
.tab-btn {
  padding: 8px 20px; border: none; background: none;
  color: var(--text-secondary); font-family: var(--font-body);
  font-size: 0.9rem; font-weight: 600;
  border-radius: 6px; cursor: pointer;
  transition: var(--transition);
}
.tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
.tab-btn.active {
  color: #fff; background: var(--accent-blue);
  box-shadow: 0 2px 8px rgba(30, 111, 217, 0.3);
}

/* ============================================================
   Section
   ============================================================ */
.section {
  padding: 48px 0;
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.section.visible { opacity: 1; transform: translateY(0); }
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 32px;
}
.section-icon {
  width: 40px; height: 40px;
  background: rgba(30, 111, 217, 0.15);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent-blue);
}
.section-title {
  font-size: 1.5rem; font-weight: 700;
  background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* ============================================================
   Hero KPI Cards
   ============================================================ */
.hero { padding: 40px 0 24px; }
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  position: relative; overflow: hidden;
  transition: var(--transition);
  cursor: pointer;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: var(--accent-blue);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.3s ease;
}
.kpi-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.kpi-card:hover::before { transform: scaleX(1); }
.kpi-label {
  font-size: 0.85rem; color: var(--text-secondary);
  margin-bottom: 8px; font-weight: 600;
}
.kpi-value {
  font-family: var(--font-display);
  font-size: 3rem; line-height: 1;
  letter-spacing: 1px;
}
.kpi-trend {
  margin-top: 8px; font-size: 0.8rem; font-weight: 600;
}
.kpi-trend.up { color: var(--accent-green); }
.kpi-trend.down { color: var(--accent-red); }
.kpi-trend.neutral { color: var(--text-secondary); }
.kpi-zero-badge {
  display: inline-block; margin-top: 8px;
  background: rgba(39, 201, 127, 0.15); color: var(--accent-green);
  padding: 2px 10px; border-radius: 12px;
  font-size: 0.75rem; font-weight: 600;
}

/* ============================================================
   Chart Cards
   ============================================================ */
.chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
  gap: 20px;
}
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  transition: var(--transition);
}
.chart-card:hover {
  border-color: rgba(30, 111, 217, 0.3);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.chart-title {
  font-size: 1rem; font-weight: 700;
  margin-bottom: 4px;
}
.chart-subtitle {
  font-size: 0.8rem; color: var(--text-secondary);
  margin-bottom: 16px;
}
.chart-container { position: relative; width: 100%; }
.chart-container canvas { width: 100% !important; }
.chart-note {
  margin-top: 12px; font-size: 0.75rem; color: var(--text-secondary);
  padding: 8px 12px; background: rgba(255,255,255,0.03);
  border-radius: 6px; border-left: 3px solid var(--accent-blue);
}

/* ============================================================
   Status Cards (Defect Processing)
   ============================================================ */
.status-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.status-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px; text-align: center;
  transition: var(--transition);
}
.status-card:hover { transform: translateY(-2px); }
.status-count {
  font-family: var(--font-display);
  font-size: 2rem; line-height: 1;
}
.status-label {
  font-size: 0.8rem; color: var(--text-secondary);
  margin-top: 4px;
}
.status-bar {
  height: 6px; border-radius: 3px;
  margin-top: 12px; background: var(--bg-elevated);
  overflow: hidden; display: flex;
}
.status-bar-segment { height: 100%; transition: width 0.6s ease; }

/* ============================================================
   Horizontal Bar Chart (Root Cause)
   ============================================================ */
.hbar-list { display: flex; flex-direction: column; gap: 12px; }
.hbar-item { display: flex; align-items: center; gap: 12px; }
.hbar-label {
  flex: 0 0 180px; font-size: 0.85rem;
  text-align: right; color: var(--text-secondary);
}
.hbar-track {
  flex: 1; height: 28px; background: var(--bg-elevated);
  border-radius: 4px; overflow: hidden; position: relative;
}
.hbar-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 8px; font-size: 0.75rem; font-weight: 700;
  color: rgba(255,255,255,0.9);
}

/* ============================================================
   Accordion (Defect Details)
   ============================================================ */
.accordion { display: flex; flex-direction: column; gap: 8px; }
.accordion-group {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.accordion-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer;
  transition: var(--transition);
  user-select: none;
}
.accordion-header:hover { background: rgba(255,255,255,0.03); }
.accordion-icon {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.accordion-category { font-weight: 600; font-size: 0.95rem; flex: 1; }
.accordion-badge {
  background: rgba(30, 111, 217, 0.15); color: var(--accent-blue);
  padding: 2px 10px; border-radius: 12px;
  font-size: 0.75rem; font-weight: 700;
}
.accordion-chevron {
  color: var(--text-secondary); transition: transform 0.3s ease;
}
.accordion-group.open .accordion-chevron { transform: rotate(180deg); }
.accordion-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease;
}
.accordion-group.open .accordion-body { max-height: 2000px; }
.defect-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 8px; }
.defect-item {
  display: flex; gap: 12px; padding: 12px;
  background: var(--bg-elevated); border-radius: 6px;
  border-left: 3px solid var(--accent-blue);
  font-size: 0.85rem; line-height: 1.5;
}
.defect-item .defect-index {
  flex-shrink: 0; width: 22px; height: 22px;
  background: rgba(30, 111, 217, 0.15); color: var(--accent-blue);
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 0.7rem; font-weight: 700;
}
.defect-item .defect-content { flex: 1; }
.defect-item .defect-desc { color: var(--text-primary); }
.defect-item .defect-cause {
  margin-top: 4px; font-size: 0.8rem;
  color: var(--accent-orange);
}
.defect-item .defect-handler {
  display: inline-block; margin-top: 4px;
  background: rgba(125, 133, 144, 0.15);
  color: var(--text-secondary);
  padding: 1px 8px; border-radius: 10px;
  font-size: 0.7rem;
}

/* ============================================================
   Alert Card (Critical Defects)
   ============================================================ */
.alert-card {
  background: rgba(232, 64, 64, 0.08);
  border: 1px solid rgba(232, 64, 64, 0.3);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 24px;
  display: flex; align-items: flex-start; gap: 16px;
}
.alert-icon {
  flex-shrink: 0; width: 40px; height: 40px;
  background: rgba(232, 64, 64, 0.15);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent-red);
}
.alert-title { font-weight: 700; color: var(--accent-red); margin-bottom: 4px; }
.alert-desc { font-size: 0.85rem; color: var(--text-secondary); }

/* ============================================================
   Summary Cards
   ============================================================ */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 16px;
}
.summary-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex; align-items: flex-start; gap: 16px;
  transition: var(--transition);
}
.summary-card:hover { border-color: rgba(30, 111, 217, 0.3); }
.summary-icon-wrap {
  flex-shrink: 0; width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}
.summary-text { font-size: 0.9rem; line-height: 1.6; }

/* ============================================================
   Improvement Plan (Todo List)
   ============================================================ */
.plan-list { display: flex; flex-direction: column; gap: 12px; }
.plan-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  display: flex; align-items: flex-start; gap: 14px;
  transition: var(--transition);
}
.plan-item:hover { border-color: rgba(30, 111, 217, 0.3); }
.plan-index {
  flex-shrink: 0; width: 28px; height: 28px;
  background: rgba(30, 111, 217, 0.15); color: var(--accent-blue);
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-family: var(--font-display);
  font-size: 1rem;
}
.plan-tag {
  display: inline-block; padding: 1px 8px;
  border-radius: 4px; font-size: 0.7rem; font-weight: 700;
  margin-right: 8px;
}
.plan-tag[data-priority="high"] { background: rgba(232, 64, 64, 0.15); color: var(--accent-red); }
.plan-tag[data-priority="medium"] { background: rgba(245, 166, 35, 0.15); color: var(--accent-orange); }
.plan-tag[data-priority="low"] { background: rgba(30, 111, 217, 0.15); color: var(--accent-blue); }
.plan-text { font-size: 0.9rem; line-height: 1.5; }

/* ============================================================
   Special Section (Links + Notes)
   ============================================================ */
.link-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.link-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: var(--transition);
  text-decoration: none; color: var(--text-primary);
}
.link-card:hover {
  border-color: var(--accent-blue);
  background: rgba(30, 111, 217, 0.05);
}
.link-icon {
  width: 36px; height: 36px;
  background: rgba(30, 111, 217, 0.15); color: var(--accent-blue);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.link-title { font-size: 0.9rem; font-weight: 600; }
.note-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.note-title { font-weight: 700; margin-bottom: 8px; }
.note-content { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7; }

/* ============================================================
   Footer
   ============================================================ */
.footer {
  text-align: center; padding: 32px 0;
  border-top: 1px solid var(--border);
  color: var(--text-secondary); font-size: 0.8rem;
}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 768px) {
  .navbar-inner { flex-direction: column; height: auto; padding: 12px 0; gap: 8px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .chart-grid { grid-template-columns: 1fr; }
  .chart-grid .chart-card { min-width: 0; }
  .hbar-label { flex: 0 0 100px; font-size: 0.75rem; }
  .summary-grid { grid-template-columns: 1fr; }
  .kpi-value { font-size: 2.2rem; }
}

/* ============================================================
   Animations
   ============================================================ */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in-up { animation: fadeInUp 0.5s ease forwards; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<!-- ============================================================
     NAVBAR
     ============================================================ -->
<nav class="navbar">
  <div class="navbar-inner">
    <div class="navbar-brand">
      <div class="logo-icon" id="logoIcon">Q</div>
      <span id="navTitle">技术质量月报</span>
    </div>
    <div class="navbar-tabs" id="monthTabs"></div>
  </div>
</nav>

<!-- ============================================================
     HERO: KPI Cards
     ============================================================ -->
<div class="hero">
  <div class="container">
    <div class="kpi-grid" id="kpiGrid"></div>
  </div>
</div>

<!-- ============================================================
     SECTION 1: Data Overview
     ============================================================ -->
<div class="section" id="sectionOverview">
  <div class="container">
    <div class="section-header">
      <div class="section-icon"><i data-lucide="bar-chart-3" style="width:20px;height:20px"></i></div>
      <h2 class="section-title" id="overviewTitle">数据概况</h2>
    </div>
    <div class="chart-grid" id="chartGrid"></div>
  </div>
</div>

<!-- ============================================================
     SECTION 2: Defect Analysis
     ============================================================ -->
<div class="section" id="sectionAnalysis">
  <div class="container">
    <div class="section-header">
      <div class="section-icon"><i data-lucide="search" style="width:20px;height:20px"></i></div>
      <h2 class="section-title" id="analysisTitle">缺陷分析</h2>
    </div>
    <!-- Critical Alerts -->
    <div id="alertContainer"></div>
    <!-- Status Overview -->
    <h3 style="font-size:1.1rem;margin-bottom:16px;color:var(--text-secondary)">处理状态总览</h3>
    <div id="statusGrid" class="status-grid"></div>
    <div id="statusBarContainer" style="margin-bottom:32px"></div>
    <!-- Root Cause Distribution -->
    <h3 style="font-size:1.1rem;margin:24px 0 16px;color:var(--text-secondary)">缺陷根因分布</h3>
    <div id="rootCauseChart"></div>
    <!-- Defect Details Accordion -->
    <h3 style="font-size:1.1rem;margin:32px 0 16px;color:var(--text-secondary)">典型缺陷详情</h3>
    <div class="accordion" id="defectAccordion"></div>
  </div>
</div>

<!-- ============================================================
     SECTION 3: Summary
     ============================================================ -->
<div class="section" id="sectionSummary">
  <div class="container">
    <div class="section-header">
      <div class="section-icon"><i data-lucide="clipboard-check" style="width:20px;height:20px"></i></div>
      <h2 class="section-title" id="summaryTitle">缺陷总结</h2>
    </div>
    <div class="summary-grid" id="summaryGrid"></div>
  </div>
</div>

<!-- ============================================================
     SECTION 4: Improvement Plan
     ============================================================ -->
<div class="section" id="sectionPlan">
  <div class="container">
    <div class="section-header">
      <div class="section-icon"><i data-lucide="list-checks" style="width:20px;height:20px"></i></div>
      <h2 class="section-title" id="planTitle">改进计划</h2>
    </div>
    <div class="plan-list" id="planList"></div>
  </div>
</div>

<!-- ============================================================
     SECTION 5: Special Content
     ============================================================ -->
<div class="section" id="sectionSpecial" style="display:none">
  <div class="container">
    <div class="section-header">
      <div class="section-icon"><i data-lucide="star" style="width:20px;height:20px"></i></div>
      <h2 class="section-title" id="specialTitle">专项内容</h2>
    </div>
    <div id="specialContent"></div>
  </div>
</div>

<!-- ============================================================
     FOOTER
     ============================================================ -->
<footer class="footer">
  <div class="container">
    <span id="footerText"></span>
  </div>
</footer>

<!-- ============================================================
     DATA CONFIGURATION
     ============================================================ -->

      type: 'line',
      note: '有效反馈：通过寻常业务逻辑无法解决，需技术或其他协助。无效反馈：通过业务逻辑能解决，如设置/操作不当。',

<script>
// ================================================================
// State
// ================================================================
let currentMonth = 0;
let chartInstances = {};

// ================================================================
// Utility: Resolve CSS variable colors for Chart.js
// ================================================================
function resolveColor(c) {
  if (!c || !c.startsWith('var(')) return c;
  const varName = c.replace('var(', '').replace(')', '');
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

// ================================================================
// Number animation
// ================================================================
function animateNumber(el, target, format, duration = 600) {
  const start = parseFloat(el.dataset.current || '0');
  const startTime = performance.now();

  function update(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic
    const current = start + (target - start) * eased;

    if (format === 'percent') {
      el.textContent = current.toFixed(current === Math.round(current) ? 0 : 2) + '%';
    } else {
      el.textContent = Math.round(current);
    }

    if (progress < 1) requestAnimationFrame(update);
    else el.dataset.current = target;
  }
  requestAnimationFrame(update);
}

// ================================================================
// Intersection Observer for sections
// ================================================================
function setupIntersectionObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.section').forEach(s => observer.observe(s));
}

// ================================================================
// Render: Month Tabs
// ================================================================
function renderTabs() {
  const container = document.getElementById('monthTabs');
  container.innerHTML = CONFIG.months.map((m, i) =>
    `<button class="tab-btn ${i === currentMonth ? 'active' : ''}" data-index="${i}">${m}</button>`
  ).join('');

  container.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentMonth = parseInt(btn.dataset.index);
      renderTabs();
      renderAll();
    });
  });
}

// ================================================================
// Render: KPI Cards
// ================================================================
function renderKPIs() {
  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = CONFIG.kpis.map((kpi, i) => {
    const val = kpi.values[currentMonth];
    const prevVal = currentMonth > 0 ? kpi.values[currentMonth - 1] : null;
    const color = typeof kpi.colorFn === 'function' ? kpi.colorFn(val) : 'var(--accent-blue)';

    let trendHtml = '';
    if (prevVal !== null && prevVal !== undefined) {
      const diff = val - prevVal;
      const sign = diff > 0 ? '+' : '';
      const cls = diff > 0
        ? (kpi.format === 'percent' || kpi.label.includes('修复') || kpi.label.includes('处理') ? 'up' : 'down')
        : diff < 0
          ? (kpi.format === 'percent' || kpi.label.includes('修复') || kpi.label.includes('处理') ? 'down' : 'up')
          : 'neutral';
      // For defect count, "up" means more defects = bad (down arrow color)
      const arrow = diff > 0 ? '\u2191' : diff < 0 ? '\u2193' : '\u2192';
      const displayDiff = kpi.format === 'percent' ? diff.toFixed(2) + ' pp' : Math.abs(diff);
      trendHtml = `<div class="kpi-trend ${cls}">${arrow} ${sign}${displayDiff} 较上月</div>`;
    }

    let zeroHtml = '';
    if (val === 0 && kpi.zeroBadge) {
      zeroHtml = `<div class="kpi-zero-badge">\u2713 ${kpi.zeroBadge}</div>`;
    }

    const displayVal = kpi.format === 'percent' ? val + '%' : val;

    return `
      <div class="kpi-card" style="--card-accent: ${color}">
        <div class="kpi-label">${kpi.label}</div>
        <div class="kpi-value" style="color: ${color}" data-target="${val}" data-format="${kpi.format}" data-kpi="${i}">${displayVal}</div>
        ${zeroHtml}
        ${trendHtml}
      </div>`;
  }).join('');

  // Animate numbers
  grid.querySelectorAll('.kpi-value').forEach(el => {
    animateNumber(el, parseFloat(el.dataset.target), el.dataset.format);
  });
}

// ================================================================
// Render: Charts
// ================================================================
function renderCharts() {
  const grid = document.getElementById('chartGrid');

  // Create chart cards if not yet created
  if (!grid.querySelector('.chart-card')) {
    grid.innerHTML = CONFIG.charts.map(chart => `
      <div class="chart-card">
        <div class="chart-title">${chart.title}</div>
        <div class="chart-subtitle">${chart.subtitle || ''}</div>
        <div class="chart-container"><canvas id="${chart.id}"></canvas></div>
        ${chart.note ? `<div class="chart-note">${chart.note}</div>` : ''}
      </div>
    `).join('');
  }

  CONFIG.charts.forEach(chartCfg => {
    const canvas = document.getElementById(chartCfg.id);
    if (!canvas) return;

    // Destroy existing chart instance
    if (chartInstances[chartCfg.id]) {
      chartInstances[chartCfg.id].destroy();
    }

    const ctx = canvas.getContext('2d');

    if (chartCfg.type === 'doughnut') {
      renderDoughnut(ctx, chartCfg);
    } else if (chartCfg.type === 'bar') {
      renderBar(ctx, chartCfg);
    } else {
      renderLine(ctx, chartCfg);
    }
  });
}

function renderLine(ctx, cfg) {
  const datasets = cfg.datasets.map(ds => ({
    label: ds.label,
    data: ds.data,
    borderColor: resolveColor(ds.borderColor),
    backgroundColor: resolveColor(ds.backgroundColor),
    fill: ds.fill || false,
    tension: 0.4,
    borderWidth: 2,
    pointRadius: 4,
    pointHoverRadius: 6,
    borderDash: ds.borderDash || [],
    spanGaps: ds.spanGaps || false,
  }));

  const plugins = [];
  const annotations = {};

  if (cfg.referenceLine) {
    annotations.refLine = {
      type: 'line',
      yMin: cfg.referenceLine.value,
      yMax: cfg.referenceLine.value,
      borderColor: resolveColor(cfg.referenceLine.color),
      borderDash: [6, 4],
      borderWidth: 1,
      label: {
        display: true,
        content: cfg.referenceLine.label,
        position: 'end',
      },
    };
  }

  chartInstances[cfg.id] = new Chart(ctx, {
    type: 'line',
    data: { labels: cfg.labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 2,
      animation: { duration: 800, easing: 'easeOutQuart' },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: resolveColor('var(--text-secondary)'), usePointStyle: true, padding: 16 } },
        tooltip: {
          backgroundColor: resolveColor('var(--bg-elevated)'),
          titleColor: resolveColor('var(--text-primary)'),
          bodyColor: resolveColor('var(--text-secondary)'),
          borderColor: resolveColor('var(--border)'),
          borderWidth: 1,
          padding: 12,
          cornerRadius: 8,
        },
      },
      scales: {
        x: {
          grid: { color: 'rgba(48,54,61,0.5)' },
          ticks: { color: resolveColor('var(--text-secondary)') },
        },
        y: {
          min: cfg.yMin,
          max: cfg.yMax,
          grid: { color: 'rgba(48,54,61,0.5)' },
          ticks: {
            color: resolveColor('var(--text-secondary)'),
            callback: cfg.yMax === 100 ? (v) => v + '%' : undefined,
          },
        },
      },
    },
  });
}

function renderDoughnut(ctx, cfg) {
  const monthData = cfg.datasetsPerMonth[currentMonth];
  const total = monthData.reduce((s, v) => s + v, 0);

  chartInstances[cfg.id] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: cfg.labels,
      datasets: [{
        data: monthData,
        backgroundColor: cfg.colors,
        borderColor: resolveColor('var(--bg-card)'),
        borderWidth: 3,
        hoverOffset: 8,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 1.5,
      cutout: '65%',
      animation: { duration: 800, easing: 'easeOutQuart' },
      plugins: {
        legend: {
          position: 'right',
          labels: { color: resolveColor('var(--text-secondary)'), usePointStyle: true, padding: 12 },
        },
        tooltip: {
          backgroundColor: resolveColor('var(--bg-elevated)'),
          titleColor: resolveColor('var(--text-primary)'),
          bodyColor: resolveColor('var(--text-secondary)'),
          borderColor: resolveColor('var(--border)'),
          borderWidth: 1,
        },
      },
    },
    plugins: [{
      id: 'centerText',
      afterDraw(chart) {
        const { width, height, ctx: c } = chart;
        c.save();
        const centerX = chart.chartArea.left + (chart.chartArea.right - chart.chartArea.left) / 2;
        const centerY = chart.chartArea.top + (chart.chartArea.bottom - chart.chartArea.top) / 2;

        c.textAlign = 'center';
        c.textBaseline = 'middle';

        c.font = `bold 2rem ${getComputedStyle(document.body).getPropertyValue('--font-display')}`;
        c.fillStyle = resolveColor('var(--text-primary)');
        c.fillText(total, centerX, centerY - 8);

        c.font = `0.75rem ${getComputedStyle(document.body).getPropertyValue('--font-body')}`;
        c.fillStyle = resolveColor('var(--text-secondary)');
        c.fillText('本月缺陷', centerX, centerY + 18);
        c.restore();
      }
    }],
  });
}

function renderBar(ctx, cfg) {
  const datasets = cfg.datasets.map(ds => ({
    label: ds.label,
    data: ds.data,
    backgroundColor: ds.backgroundColor,
    borderRadius: 4,
    barPercentage: 0.6,
  }));

  chartInstances[cfg.id] = new Chart(ctx, {
    type: 'bar',
    data: { labels: cfg.labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 2,
      animation: { duration: 800, easing: 'easeOutQuart' },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: resolveColor('var(--text-secondary)'), usePointStyle: true, padding: 16 } },
        tooltip: {
          backgroundColor: resolveColor('var(--bg-elevated)'),
          titleColor: resolveColor('var(--text-primary)'),
          bodyColor: resolveColor('var(--text-secondary)'),
          borderColor: resolveColor('var(--border)'),
          borderWidth: 1,
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: resolveColor('var(--text-secondary)') },
        },
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(48,54,61,0.5)' },
          ticks: { color: resolveColor('var(--text-secondary)'), stepSize: 1 },
        },
      },
    },
  });
}

// ================================================================
// Render: Processing Status
// ================================================================
function renderStatus() {
  const data = CONFIG.processingStatus[currentMonth];
  const statusDefs = [
    { key: 'fixed', label: '已修复', color: 'var(--accent-green)' },
    { key: 'tempFixed', label: '临时解决', color: 'var(--accent-orange)' },
    { key: 'inProgress', label: '处理中', color: 'var(--accent-blue)' },
    { key: 'suspended', label: '挂起', color: 'var(--text-secondary)' },
    { key: 'overdue', label: '逾期', color: 'var(--accent-red)' },
  ];
  const total = statusDefs.reduce((s, d) => s + (data[d.key] || 0), 0);

  document.getElementById('statusGrid').innerHTML = statusDefs.map(d => `
    <div class="status-card">
      <div class="status-count" style="color: ${d.color}">${data[d.key] || 0}</div>
      <div class="status-label">${d.label}</div>
    </div>
  `).join('');

  document.getElementById('statusBarContainer').innerHTML = `
    <div class="status-bar">
      ${statusDefs.map(d => {
        const pct = total > 0 ? (data[d.key] || 0) / total * 100 : 0;
        return `<div class="status-bar-segment" style="width:${pct}%;background:${d.color}" title="${d.label}: ${data[d.key] || 0}"></div>`;
      }).join('')}
    </div>
  `;
}

// ================================================================
// Render: Root Cause (Horizontal Bars)
// ================================================================
function renderRootCauses() {
  const causes = CONFIG.rootCauses[currentMonth];
  const max = Math.max(...causes.map(c => c.count));

  document.getElementById('rootCauseChart').innerHTML = `<div class="hbar-list">
    ${causes.map(c => `
      <div class="hbar-item">
        <div class="hbar-label">${c.name}</div>
        <div class="hbar-track">
          <div class="hbar-fill" style="width:${c.count / max * 100}%;background:${c.color}">${c.count}</div>
        </div>
      </div>
    `).join('')}
  </div>`;

  // Trigger animation
  setTimeout(() => {
    document.querySelectorAll('.hbar-fill').forEach(el => {
      const w = el.style.width;
      el.style.width = '0';
      requestAnimationFrame(() => { el.style.width = w; });
    });
  }, 100);
}

// ================================================================
// Render: Critical Alerts
// ================================================================
function renderAlerts() {
  const alerts = CONFIG.criticalAlerts[currentMonth];
  const container = document.getElementById('alertContainer');
  if (!alerts || alerts.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = alerts.map(a => `
    <div class="alert-card">
      <div class="alert-icon"><i data-lucide="alert-triangle" style="width:20px;height:20px"></i></div>
      <div>
        <div class="alert-title">${a.level}：${a.title}</div>
        <div class="alert-desc">${a.desc}</div>
      </div>
    </div>
  `).join('');
}

// ================================================================
// Render: Defect Accordion
// ================================================================
function renderAccordion() {
  const details = CONFIG.defectDetails[currentMonth];
  const container = document.getElementById('defectAccordion');

  container.innerHTML = details.map((group, gi) => `
    <div class="accordion-group" data-group="${gi}">
      <div class="accordion-header" onclick="toggleAccordion(${gi})">
        <div class="accordion-icon" style="background:${group.color}"></div>
        <div class="accordion-category">${group.category}</div>
        <div class="accordion-badge">${group.items.length}</div>
        <svg class="accordion-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="accordion-body">
        <div class="defect-list">
          ${group.items.map((item, ii) => `
            <div class="defect-item" style="border-left-color:${group.color}">
              <div class="defect-index">${ii + 1}</div>
              <div class="defect-content">
                <div class="defect-desc">${item.desc}</div>
                ${item.cause ? `<div class="defect-cause">${item.cause}</div>` : ''}
                ${item.handler ? `<span class="defect-handler">${item.handler}</span>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function toggleAccordion(index) {
  const group = document.querySelector(`.accordion-group[data-group="${index}"]`);
  group.classList.toggle('open');
}

// ================================================================
// Render: Summary
// ================================================================
function renderSummary() {
  const items = CONFIG.summaries[currentMonth];
  document.getElementById('summaryGrid').innerHTML = items.map(item => `
    <div class="summary-card">
      <div class="summary-icon-wrap" style="background:${item.color}22;color:${item.color}">
        <i data-lucide="${item.icon}" style="width:20px;height:20px"></i>
      </div>
      <div class="summary-text">${item.text}</div>
    </div>
  `).join('');
}

// ================================================================
// Render: Plans
// ================================================================
function renderPlans() {
  const items = CONFIG.plans[currentMonth];
  document.getElementById('planList').innerHTML = items.map((item, i) => `
    <div class="plan-item">
      <div class="plan-index">${i + 1}</div>
      <div>
        <span class="plan-tag" data-priority="${item.priority}">${item.tag}</span>
        <span class="plan-text">${item.text}</span>
      </div>
    </div>
  `).join('');
}

// ================================================================
// Render: Special Content
// ================================================================
function renderSpecial() {
  const data = CONFIG.specialContent[currentMonth];
  const section = document.getElementById('sectionSpecial');
  if (!data) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';

  let html = '';
  if (data.links && data.links.length > 0) {
    html += `<h3 style="font-size:1.1rem;margin-bottom:16px;color:var(--text-secondary)">运维总结报告</h3>`;
    html += `<div class="link-grid">`;
    html += data.links.map(l => `
      <div class="link-card">
        <div class="link-icon"><i data-lucide="${l.icon || 'file-text'}" style="width:18px;height:18px"></i></div>
        <div class="link-title">${l.title}</div>
      </div>
    `).join('');
    html += `</div>`;
  }

  if (data.notes && data.notes.length > 0) {
    html += data.notes.map(n => `
      <div class="note-card">
        <div class="note-title">${n.title}</div>
        <div class="note-content">${n.content}</div>
      </div>
    `).join('');
  }

  document.getElementById('specialContent').innerHTML = html;
}

// ================================================================
// Render All
// ================================================================
function renderAll() {
  renderKPIs();
  renderCharts();
  renderStatus();
  renderAlerts();
  renderRootCauses();
  renderAccordion();
  renderSummary();
  renderPlans();
  renderSpecial();

  // Re-init Lucide icons
  if (window.lucide) lucide.createIcons();
}

// ================================================================
// Init
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  // Set branding
  document.getElementById('pageTitle').textContent = CONFIG.shortTitle || CONFIG.title;
  document.getElementById('navTitle').textContent = CONFIG.title;
  document.getElementById('logoIcon').textContent = CONFIG.logoLetter;
  document.getElementById('footerText').textContent = CONFIG.footer;

  renderTabs();
  renderAll();
  setupIntersectionObserver();

  // Init Lucide icons
  if (window.lucide) lucide.createIcons();
});
</script>
