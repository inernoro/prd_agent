# CDS Compose 配置 — 由 /cds-scan 自动生成
# 导入方式：CDS Dashboard → 设置 → 一键导入 → 粘贴此内容

x-cds-project:
  name: prd_agent
  description: "PRD Agent 全栈项目 (.NET 8 + React 18 + Tauri 2.0)"
  repo: https://github.com/inernoro/prd_agent.git

# 全局共享环境变量 — CDS 自动注入所有容器，禁止在 services.*.environment 中重复
x-cds-env:
  # 资产存储（tencentCos / cloudflareR2 二选一）
  ASSETS_PROVIDER: tencentCos
  # --- Tencent COS ---
  TENCENT_COS_BUCKET: "TODO: 请填写实际值"
  TENCENT_COS_REGION: "TODO: 请填写实际值"
  TENCENT_COS_SECRET_ID: "TODO: 请填写实际值"
  TENCENT_COS_SECRET_KEY: "TODO: 请填写实际值"
  TENCENT_COS_PUBLIC_BASE_URL: "TODO: 请填写实际值"
  TENCENT_COS_PREFIX: data
  # --- Cloudflare R2（如使用 R2 则将 ASSETS_PROVIDER 改为 cloudflareR2）---
  # R2_ACCOUNT_ID: ""
  # R2_ACCESS_KEY_ID: ""
  # R2_SECRET_ACCESS_KEY: ""
  # R2_BUCKET: ""
  # R2_PUBLIC_BASE_URL: ""
  # R2_PREFIX: ""
  # R2_ENDPOINT: ""
  JWT_SECRET: "TODO: 请填写实际值"
  ApiKeyCrypto__Secret: "TODO: 请填写实际值"
  # 如需迁移旧平台密文，可临时填写旧数据加密密钥，多个用英文分号分隔；迁移完成后删除。
  # ApiKeyCrypto__LegacySecrets: ""
  AI_ACCESS_KEY: "TODO: 请填写实际值"

# 部署模式 — 每个服务可在 CDS 左侧面板下拉切换
# dev: 热重载开发模式（改代码自动刷新）
# static: 静态编译模式（一次编译、启动快）
x-cds-deploy-modes:
  api:
    dev:
      label: "开发模式 (热重载)"
      command: >-
        cd prd-api &&
        dotnet restore &&
        dotnet build --no-restore &&
        dotnet watch run --project src/PrdAgent.Api --urls http://0.0.0.0:5000
    static:
      label: "静态部署 (publish)"
      # 每次部署前清掉 bin/obj，强制干净编译：dotnet 增量构建在 CDS 共享 worktree 下偶发
      # "撒谎"（源码改了却复用旧 DLL），清空后从零编译可彻底避免发布出不含最新改动的二进制。
      command: >-
        cd prd-api &&
        rm -rf src/PrdAgent.Api/bin src/PrdAgent.Api/obj
        src/PrdAgent.Core/bin src/PrdAgent.Core/obj
        src/PrdAgent.Infrastructure/bin src/PrdAgent.Infrastructure/obj &&
        dotnet restore &&
        dotnet publish src/PrdAgent.Api -c Release -o /publish --no-restore &&
        dotnet /publish/PrdAgent.Api.dll --urls http://0.0.0.0:5000
      env:
        ASPNETCORE_ENVIRONMENT: Production
  admin:
    dev:
      label: "开发模式 (Vite HMR)"
      command: >-
        cd prd-admin &&
        corepack enable &&
        corepack prepare pnpm@10.28.2 --activate &&
        pnpm config set store-dir /pnpm/store &&
        pnpm install --frozen-lockfile &&
        pnpm exec vite --host 0.0.0.0 --port 8000
    static:
      label: "静态部署 (vite build+serve)"
      command: >-
        cd prd-admin &&
        corepack enable &&
        corepack prepare pnpm@10.28.2 --activate &&
        pnpm config set store-dir /pnpm/store &&
        pnpm install --frozen-lockfile &&
        sh scripts/cds-vite-build.sh &&
        pnpm exec serve -s dist -l tcp://0.0.0.0:8000
services:
  # ── App Services (有相对路径 volume mount) ──

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /repo
    volumes:
      - .:/repo
      - api-nuget-cache:/root/.nuget/packages
    ports:
      - "5000"
    command: >-
      cd prd-api &&
      rm -rf src/PrdAgent.Api/obj src/PrdAgent.Api/bin
      src/PrdAgent.Core/obj src/PrdAgent.Core/bin
      src/PrdAgent.Infrastructure/obj src/PrdAgent.Infrastructure/bin &&
      dotnet restore &&
      dotnet build --no-restore --no-incremental -c Debug &&
      dotnet run --project src/PrdAgent.Api --no-build -c Debug --urls http://0.0.0.0:5000
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      # 仅服务特有变量，全局变量已由 x-cds-env 注入
      ASPNETCORE_ENVIRONMENT: Development
      Changelog__RootPath: /repo
      Changelog__GitHubBranch: "${VITE_GIT_BRANCH:-main}"
      Changelog__GitHubToken: "${GITHUB_PAT:-}"
      MongoDB__ConnectionString: "mongodb://${CDS_HOST}:${CDS_MONGODB_PORT}"
      MongoDB__DatabaseName: prdagent
      Redis__ConnectionString: "${CDS_HOST}:${CDS_REDIS_PORT}"
      # Jwt__Secret 由全局 x-cds-env.JWT_SECRET 自动注入，不在此声明
      Jwt__Issuer: prdagent
      ClaudeSdkExecutor__Enabled: "true"
      ClaudeSdkExecutor__CallbackBaseUrl: "http://api-prd-agent:5000"
      # CDS Agent runtime 必须来自 shared-service discovery 或显式外部 sidecar。
      # 禁止把 claude-agent-sdk runtime 写成本应用分支 service，否则 main/业务分支会被 runtime 污染。
      ClaudeSdkExecutor__CdsDiscovery__EnablePairedInfraConnections: "true"
      ClaudeSdkExecutor__CdsDiscovery__SharedSidecarToken: "dev-skip"
      ClaudeSdkExecutor__CdsDiscovery__RefreshIntervalSeconds: "10"
      AGENT_WORKSPACE_ROOT: /repo
      AGENT_WORKSPACE_GITHUB_REPOSITORY: "inernoro/prd_agent"
      AGENT_WORKSPACE_GIT_REF: "${VITE_GIT_BRANCH:-main}"
    labels:
      cds.path-prefix: "/api/"
      cds.readiness-path: "/health"
      # static 模式下 API 需要 restore + publish 后再启动；冷启动常超过 CDS 默认就绪窗口。
      # 与 admin 的 1200s 保持一致，避免容器最终已监听但分支先被误判为 error。
      cds.readiness-timeout: "1200"
      cds.readiness-interval: "3"

  admin:
    image: node:20-slim
    working_dir: /repo
    volumes:
      # 挂载仓库根目录，确保 prd-admin/public 内指向仓库级资源的符号链接可解析。
      - .:/repo
      - admin-pnpm-store:/pnpm/store
    ports:
      - "8000"
    # 默认 dev：秒级就绪，避免 static 冷构建 OOM（exitCode=137）。需要 dist 时在 CDS 切 static 模式。
    command: >-
      cd prd-admin &&
      corepack enable &&
      corepack prepare pnpm@10.28.2 --activate &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --frozen-lockfile &&
      pnpm exec vite --host 0.0.0.0 --port 8000
    labels:
      cds.path-prefix: "/"
      cds.readiness-path: "/"
      # dev 模式 Vite 秒起；static 冷构建（pnpm install + vite build）实测约 320s，
      # 超过原 300s 就绪超时会被误判 error（容器其实已 Accepting connections）。
      # 按 base label 取两模式上限：static 冷构建留足余量，dev 秒起也不受影响。
      cds.readiness-timeout: "1200"
      cds.readiness-interval: "3"

  # ── Infrastructure Services (无相对路径 mount) ──

  mongodb:
    image: mongo:8.0
    ports:
      - "27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand({ping:1})" --quiet
      interval: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      retries: 3

volumes:
  api-nuget-cache:
  admin-pnpm-store:
  mongodb-data:
  redis-data:
