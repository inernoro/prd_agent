# CDS Infrastructure Services
# This file defines infrastructure services managed by CDS.
# Compatible with docker-compose — can also be used with `docker compose up`.
#
# CDS extension fields (ignored by docker-compose):
#   x-cds-inject: Environment variables to inject into all branch containers.
#                 Supports {{host}} (Docker host IP) and {{port}} (allocated host port).
#   x-cds-name:   Display name shown in CDS Dashboard.

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017"
    volumes:
      - cds-mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand({ping:1})" --quiet
      interval: 10s
      retries: 3
    x-cds-inject:
      MONGODB_HOST: "{{host}}:{{port}}"
      MongoDB__ConnectionString: "mongodb://{{host}}:{{port}}"

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    volumes:
      - cds-redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      retries: 3
    x-cds-inject:
      REDIS_HOST: "{{host}}:{{port}}"
      Redis__ConnectionString: "{{host}}:{{port}}"

volumes:
  cds-mongodb-data:
  cds-redis-data:
