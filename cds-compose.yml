# CDS Compose — Standard docker-compose format, zero custom extensions.
#
# Auto-detection rules (parsed by compose-parser.ts):
#   - Relative volume mounts (./xxx:/path) → app services (BuildProfile)
#   - Named volumes only → infra services
#   - labels.cds.path-prefix → proxy routing
#   - ${CDS_<SERVICE>_PORT} → dynamic port injection at runtime

services:
  # ── App Services ──

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    volumes:
      - ./prd-api:/app
    ports:
      - "8080"
    command: dotnet restore && dotnet build --no-restore && dotnet run --project src/PrdAgent.Api --urls http://0.0.0.0:8080
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: "mongodb://${CDS_HOST}:${CDS_MONGODB_PORT}"
      MongoDB__DatabaseName: prdagent
      Redis__ConnectionString: "${CDS_HOST}:${CDS_REDIS_PORT}"
    labels:
      cds.path-prefix: "/api/"

  admin:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./prd-admin:/app
    ports:
      - "5173"
    command: corepack enable && pnpm install && npx vite --host 0.0.0.0
    labels:
      cds.path-prefix: "/"

  # ── Infrastructure Services ──

  mongodb:
    image: mongo:7
    ports:
      - "27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand({ping:1})" --quiet
      interval: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      retries: 3

volumes:
  mongodb-data:
  redis-data:
