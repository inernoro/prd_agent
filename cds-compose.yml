# CDS Compose 配置 — 由 /cds-scan 自动生成
# 导入方式：CDS Dashboard → 设置 → 一键导入 → 粘贴此内容

x-cds-project:
  name: prd_agent
  description: "PRD Agent 全栈项目 (.NET 8 + React 18 + Tauri 2.0)"
  repo: https://github.com/inernoro/prd_agent.git

# 全局共享环境变量 — CDS 自动注入所有容器，禁止在 services.*.environment 中重复
x-cds-env:
  ASSETS_PROVIDER: tencentCos
  TENCENT_COS_BUCKET: "TODO: 请填写实际值"
  TENCENT_COS_REGION: "TODO: 请填写实际值"
  TENCENT_COS_SECRET_ID: "TODO: 请填写实际值"
  TENCENT_COS_SECRET_KEY: "TODO: 请填写实际值"
  TENCENT_COS_PUBLIC_BASE_URL: "TODO: 请填写实际值"
  TENCENT_COS_PREFIX: data
  JWT_SECRET: "TODO: 请填写实际值"
  AI_ACCESS_KEY: "TODO: 请填写实际值"

# 部署模式 — 每个服务可在 CDS 左侧面板下拉切换
# dev: 热重载开发模式（改代码自动刷新）
# static: 静态编译模式（一次编译、启动快）
x-cds-deploy-modes:
  api:
    dev:
      label: "开发模式 (热重载)"
      command: >-
        dotnet restore &&
        dotnet build --no-restore &&
        dotnet watch run --project src/PrdAgent.Api --urls http://0.0.0.0:5000
    static:
      label: "静态部署 (publish)"
      command: >-
        dotnet restore &&
        dotnet publish src/PrdAgent.Api -c Release -o /publish --no-restore &&
        dotnet /publish/PrdAgent.Api.dll --urls http://0.0.0.0:5000
      env:
        ASPNETCORE_ENVIRONMENT: Production
  admin:
    dev:
      label: "开发模式 (Vite HMR)"
      command: >-
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm exec vite --host 0.0.0.0 --port 8000
    static:
      label: "静态部署 (build+serve)"
      command: >-
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm run build &&
        npx -y serve -s dist -l 8000 --listen 0.0.0.0

services:
  # ── App Services (有相对路径 volume mount) ──

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    volumes:
      - ./prd-api:/app
      - api-nuget-cache:/root/.nuget/packages
    ports:
      - "5000"
    command: >-
      dotnet restore &&
      dotnet build --no-restore &&
      dotnet run --project src/PrdAgent.Api --no-build --urls http://0.0.0.0:5000
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      # 仅服务特有变量，全局变量已由 x-cds-env 注入
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: "mongodb://${CDS_HOST}:${CDS_MONGODB_PORT}"
      MongoDB__DatabaseName: prdagent
      Redis__ConnectionString: "${CDS_HOST}:${CDS_REDIS_PORT}"
      # Jwt__Secret 由全局 x-cds-env.JWT_SECRET 自动注入，不在此声明
      Jwt__Issuer: prdagent
    labels:
      cds.path-prefix: "/api/"

  admin:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./prd-admin:/app
    ports:
      - "8000"
    command: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm exec vite --host 0.0.0.0 --port 8000
    labels:
      cds.path-prefix: "/"

  # ── Gateway (本地端口模式统一入口，模拟线上子域名路由) ──

  gateway:
    image: nginx:alpine
    ports:
      - "80"
    environment:
      API_TARGET: "${CDS_HOST}:${CDS_API_PORT}"
      ADMIN_TARGET: "${CDS_HOST}:${CDS_ADMIN_PORT}"
    volumes:
      - ./deploy/nginx/nginx.gateway.conf.template:/etc/nginx/nginx.gateway.conf.template:ro
    command: >-
      /bin/sh -c "envsubst '$$API_TARGET $$ADMIN_TARGET' < /etc/nginx/nginx.gateway.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - api
      - admin

  # ── Infrastructure Services (无相对路径 mount) ──

  mongodb:
    image: mongo:8.0
    ports:
      - "27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand({ping:1})" --quiet
      interval: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      retries: 3

volumes:
  mongodb-data:
  redis-data:
  api-nuget-cache:
