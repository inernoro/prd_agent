# CDS Compose 配置 — 由 /cds-scan 自动生成
# 导入方式：CDS Dashboard → 设置 → 一键导入 → 粘贴此内容

x-cds-project:
  name: prd_agent
  description: "PRD Agent 全栈项目 (.NET 8 + React 18 + Tauri 2.0)"
  repo: https://github.com/inernoro/prd_agent.git

# 全局共享环境变量 — CDS 自动注入所有容器，禁止在 services.*.environment 中重复
x-cds-env:
  # 资产存储（tencentCos / cloudflareR2 二选一）
  ASSETS_PROVIDER: tencentCos
  # --- Tencent COS ---
  TENCENT_COS_BUCKET: "TODO: 请填写实际值"
  TENCENT_COS_REGION: "TODO: 请填写实际值"
  TENCENT_COS_SECRET_ID: "TODO: 请填写实际值"
  TENCENT_COS_SECRET_KEY: "TODO: 请填写实际值"
  TENCENT_COS_PUBLIC_BASE_URL: "TODO: 请填写实际值"
  TENCENT_COS_PREFIX: data
  # --- Cloudflare R2（如使用 R2 则将 ASSETS_PROVIDER 改为 cloudflareR2）---
  # R2_ACCOUNT_ID: ""
  # R2_ACCESS_KEY_ID: ""
  # R2_SECRET_ACCESS_KEY: ""
  # R2_BUCKET: ""
  # R2_PUBLIC_BASE_URL: ""
  # R2_PREFIX: ""
  # R2_ENDPOINT: ""
  JWT_SECRET: "TODO: 请填写实际值"
  AI_ACCESS_KEY: "TODO: 请填写实际值"

# 部署模式 — 每个服务可在 CDS 左侧面板下拉切换
# dev: 热重载开发模式（改代码自动刷新）
# static: 静态编译模式（一次编译、启动快）
x-cds-deploy-modes:
  api:
    dev:
      label: "开发模式 (热重载)"
      command: >-
        cd prd-api &&
        dotnet restore &&
        dotnet build --no-restore &&
        dotnet watch run --project src/PrdAgent.Api --urls http://0.0.0.0:5000
    static:
      label: "静态部署 (publish)"
      command: >-
        cd prd-api &&
        dotnet restore &&
        dotnet publish src/PrdAgent.Api -c Release -o /publish --no-restore &&
        dotnet /publish/PrdAgent.Api.dll --urls http://0.0.0.0:5000
      env:
        ASPNETCORE_ENVIRONMENT: Production
  admin:
    dev:
      label: "开发模式 (Vite HMR)"
      command: >-
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm exec vite --host 0.0.0.0 --port 8000
    static:
      label: "静态部署 (vite build+serve)"
      command: >-
        corepack enable &&
        pnpm install --frozen-lockfile &&
        pnpm exec vite build &&
        npx -y serve -s dist -l tcp://0.0.0.0:8000
services:
  # ── App Services (有相对路径 volume mount) ──

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /repo
    volumes:
      - .:/repo
      - api-nuget-cache:/root/.nuget/packages
    ports:
      - "5000"
    command: >-
      cd prd-api &&
      dotnet restore &&
      dotnet build --no-restore &&
      dotnet run --project src/PrdAgent.Api --no-build --urls http://0.0.0.0:5000
    depends_on:
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      # 仅服务特有变量，全局变量已由 x-cds-env 注入
      ASPNETCORE_ENVIRONMENT: Development
      Changelog__RootPath: /repo
      MongoDB__ConnectionString: "mongodb://${CDS_HOST}:${CDS_MONGODB_PORT}"
      MongoDB__DatabaseName: prdagent
      Redis__ConnectionString: "${CDS_HOST}:${CDS_REDIS_PORT}"
      # Jwt__Secret 由全局 x-cds-env.JWT_SECRET 自动注入，不在此声明
      Jwt__Issuer: prdagent
      ClaudeSdkExecutor__Enabled: "true"
      ClaudeSdkExecutor__CallbackBaseUrl: "http://api-prd-agent:5000"
      # Preview 内置 official SDK sidecar 旁路：共享 CDS discovery 为空时，MAP 仍能发现本分支 sidecar。
      # provider key 默认由 MAP runtime profile/request 按次下发，不要求 api 容器持有 ANTHROPIC_API_KEY。
      CLAUDE_SIDECAR_BASE_URL: "http://claude-agent-sdk-runtime-v2-prd-agent:7400"
      CLAUDE_SIDECAR_TOKEN: "dev-skip"
      ClaudeSdkExecutor__CdsDiscovery__EnablePairedInfraConnections: "true"
      ClaudeSdkExecutor__CdsDiscovery__SharedSidecarToken: "dev-skip"
      ClaudeSdkExecutor__CdsDiscovery__RefreshIntervalSeconds: "10"
      AGENT_WORKSPACE_ROOT: /repo
      AGENT_WORKSPACE_GITHUB_REPOSITORY: "inernoro/prd_agent"
      AGENT_WORKSPACE_GIT_REF: "${VITE_GIT_BRANCH:-main}"
    labels:
      cds.path-prefix: "/api/"
      cds.readiness-path: "/health"

  admin:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./prd-admin:/app
      # public/thirdparty/ref 是符号链接指向仓库根 thirdparty/ref（22+ 个 HTML 素材）。
      # 单挂 ./prd-admin 时 symlink 解析到 /thirdparty/ref 找不到目录，
      # vite build (static 模式) 的 copyPublicDir 步骤会报 ENOENT。
      - ./thirdparty:/thirdparty:ro
    ports:
      - "8000"
    command: >-
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm exec vite build &&
      npx -y serve -s dist -l tcp://0.0.0.0:8000
    labels:
      cds.path-prefix: "/"
      cds.readiness-path: "/"
      cds.readiness-timeout: "600"
      cds.readiness-interval: "3"

  claude-agent-sdk-runtime-v2:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./claude-sdk-sidecar:/app
    ports:
      - "7400"
    command: >-
      apt-get update &&
      apt-get install -y --no-install-recommends git curl ca-certificates &&
      rm -rf /var/lib/apt/lists/* &&
      pip install -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 7400 --no-server-header
    environment:
      SIDECAR_TOKEN: "dev-skip"
      SIDECAR_AGENT_ADAPTER: "claude-agent-sdk"
      SIDECAR_PROVIDER_KEY_MODE: "runtime-profile-or-env"
      SIDECAR_WORKSPACES_ROOT: "/tmp/claude-sidecar-workspaces"
      SIDECAR_VERSION: "cds-preview"
      SIDECAR_LOG_LEVEL: "INFO"
    labels:
      cds.readiness-path: "/readyz"
      cds.readiness-timeout: "600"
      cds.readiness-interval: "5"

  # ── Infrastructure Services (无相对路径 mount) ──

  mongodb:
    image: mongo:8.0
    ports:
      - "27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand({ping:1})" --quiet
      interval: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli ping
      interval: 10s
      retries: 3

volumes:
  api-nuget-cache:
  mongodb-data:
  redis-data:
