# llmgw/web 站点 nginx 配置：SPA 回退 + Console API 与四协议 Serving 入口反代。
# 监听 80（与 deploy/nginx/conf.d/branches/_standalone.conf 的 llmgw-web:80 反代约定一致）。
# rev: 2026-07-01 网关入口指向真实控制台（触碰 llmgw/web/** 触发 llmgw-web 镜像构建）
server {
    listen 80;
    server_name _;
    # vision 请求可能携带 base64 图片；与外层独立 GW server 保持同一上限，避免内层默认 1 MiB 返回 413。
    client_max_body_size 30m;
    root /usr/share/nginx/html;
    index index.html;

    # 四协议入口必须在 SPA fallback 和 Console /gw/* 之前转发到 serving。
    # 否则 POST 会被静态站点处理为 405，Quickstart 虽能生成 key 却无法完成第一条请求。
    location ^~ /gw/v1/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $llmgw_serving_upstream llmgw-serve;
        proxy_pass http://$llmgw_serving_upstream:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location ^~ /v1/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $llmgw_serving_upstream llmgw-serve;
        proxy_pass http://$llmgw_serving_upstream:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location ^~ /v1beta/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $llmgw_serving_upstream llmgw-serve;
        proxy_pass http://$llmgw_serving_upstream:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location ^~ /gemini/v1beta/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $llmgw_serving_upstream llmgw-serve;
        proxy_pass http://$llmgw_serving_upstream:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # 网关控制台 API：/gw/* 反代到 llmgw 容器（SSE 关闭缓冲 + 长超时）。
    # 用 Docker 内嵌 DNS(127.0.0.11) + 变量 upstream 做「每请求解析」：literal upstream
    # (proxy_pass http://llmgw:8090) 会在 worker 启动时解析一次并永久缓存 —— CDS 逐分支网络
    # 隔离下 llmgw 别名此刻可能尚未注册(nginx 报 host not found in upstream 直接拒启动)，且
    # llmgw 重部署换 IP 后 console 会持续 502。改为 set 变量 + resolver：nginx 在请求时经
    # resolver 解析，NXDOMAIN 时只对该请求返 502(而非启动失败)，IP 变更 10s 内自动跟随。
    location ^~ /gw/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $llmgw_upstream llmgw;
        proxy_pass http://$llmgw_upstream:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # SPA 回退：其余路由一律交给前端 React Router。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    # CDS 独立预览会直接访问 llmgw-web 容器，浏览器仍按正式公开 base 请求
    # /llmgw/assets/*；alias 保证独立域名与 MAP 子路径使用同一份不可变产物。
    location ^~ /llmgw/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
