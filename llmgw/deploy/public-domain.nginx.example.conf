# LLM Gateway 独立公网域名外层 Nginx 模板。
#
# 前提：
# 1. DNS 已把目标域名解析到本机。
# 2. docker-compose.yml 已运行，宿主机 127.0.0.1:8081 能访问 llmgw-web。
# 3. 证书已签发且路径已替换。不得复用只覆盖其他主机名的证书。

server {
    listen 80;
    listen [::]:80;
    server_name sirius.ebcone.net;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/sirius.ebcone.net;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sirius.ebcone.net;

    ssl_certificate /www/server/panel/vhost/cert/sirius.ebcone.net/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/sirius.ebcone.net/privkey.pem;

    client_max_body_size 30m;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }
}
