<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>个人任务树 · 探索原型 v4（精装）</title>
<style>
  :root{
    --bg-top:#0c0f15; --bg-bot:#0a0d13;
    --text:#edebe6; --text-dim:#8c919b;
    --panel:#12161e; --panel-2:#1a1f29; --border:rgba(255,255,255,0.07);
    --chip:rgba(255,255,255,0.05);
    --card-top:#222a37; --card-bot:#1a2029; --card-bd:rgba(255,255,255,0.10);
    --dot:rgba(255,255,255,0.022); --accent:#7c5cff; --accent-2:#a78bff;
  }
  [data-theme="light"]{
    --bg-top:#f7f3ec; --bg-bot:#eef2f6;
    --text:#262320; --text-dim:#7c786f;
    --panel:#fffefb; --panel-2:#f2ede5; --border:rgba(0,0,0,0.08);
    --chip:rgba(0,0,0,0.04);
    --card-top:#ffffff; --card-bot:#f5f1ea; --card-bd:rgba(0,0,0,0.08);
    --dot:rgba(0,0,0,0.028); --accent:#6d4bff; --accent-2:#8a6bff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--text);
    height:100vh;overflow:hidden;
    background:
      radial-gradient(1000px 520px at 50% -8%, rgba(124,92,255,.13), transparent 62%),
      radial-gradient(130% 120% at 50% 0%, var(--bg-top), var(--bg-bot));}
  .app{display:flex;flex-direction:column;height:100vh;min-height:0;}
  .top{display:flex;align-items:center;gap:14px;padding:13px 20px;flex-shrink:0;border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);}
  .brand b{font-size:15px;letter-spacing:.5px;} .brand span{font-size:11.5px;color:var(--text-dim);}
  .tabs{display:flex;gap:4px;background:var(--chip);padding:3px;border-radius:11px;}
  .tab{padding:7px 15px;border-radius:9px;font-size:13px;cursor:pointer;color:var(--text-dim);transition:.18s;}
  .tab.active{background:var(--panel-2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .spacer{flex:1;}
  select,.btn{background:var(--chip);color:var(--text);border:1px solid var(--border);border-radius:9px;padding:7px 11px;font-size:12.5px;cursor:pointer;transition:.15s;}
  .btn:hover{background:rgba(127,127,127,.16);}
  .lbl{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px;}
  .main{flex:1;display:flex;min-height:0;}
  .stage{flex:1;min-width:0;position:relative;overflow:hidden;
    background-image:radial-gradient(circle, var(--dot) 1px, transparent 1px);background-size:26px 26px;}
  svg{width:100%;height:100%;display:block;cursor:grab;}
  svg.grabbing{cursor:grabbing;}
  .side{width:332px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--border);padding:22px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}

  .glass{background:color-mix(in srgb, var(--panel) 78%, transparent);border:1px solid var(--border);border-radius:13px;backdrop-filter:blur(10px) saturate(1.2);box-shadow:0 8px 24px rgba(0,0,0,.18);}
  .legend{position:absolute;top:15px;left:15px;display:flex;gap:13px;padding:9px 14px;font-size:11.5px;}
  .legend .row{display:flex;align-items:center;gap:6px;} .legend .dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 8px currentColor;}
  .viewhint{position:absolute;bottom:15px;left:15px;font-size:11.5px;color:var(--text-dim);max-width:360px;line-height:1.6;padding:9px 13px;}
  .zoomctl{position:absolute;bottom:15px;right:15px;display:flex;gap:6px;}
  .zoomctl button{width:32px;height:32px;border-radius:9px;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;}

  .chat{flex-shrink:0;border-top:1px solid var(--border);padding:11px 20px;background:linear-gradient(0deg,rgba(255,255,255,.02),transparent);}
  .chatlog{max-height:76px;overflow-y:auto;font-size:12.5px;line-height:1.7;margin-bottom:8px;}
  .chatlog .u{color:var(--text);} .chatlog .a{color:var(--text-dim);} .chatlog .a b{color:var(--accent-2);}
  .chatrow{display:flex;gap:8px;}
  .chatrow input{flex:1;padding:12px 15px;border-radius:12px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);font-size:13.5px;outline:none;transition:.15s;}
  .chatrow input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,.18);}
  .chatrow input::placeholder{color:var(--text-dim);}

  .side h2{margin:0;font-size:16.5px;} .side .meta{font-size:12px;color:var(--text-dim);}
  .field{display:flex;flex-direction:column;gap:7px;} .field label{font-size:11px;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;}
  .statusrow{display:flex;gap:6px;flex-wrap:wrap;}
  .pill{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;opacity:.5;border:1px solid transparent;transition:.15s;}
  .pill:hover{opacity:.85;} .pill.active{opacity:1;border-color:currentColor;transform:scale(1.04);}
  .blocker{border:1px solid rgba(224,86,59,.5);background:rgba(224,86,59,.10);border-radius:11px;padding:11px 13px;font-size:13px;}
  .blocker .l{font-size:11px;color:#e0563b;font-weight:700;letter-spacing:.5px;}
  .chips .chip{display:inline-block;padding:5px 11px;margin:3px 5px 0 0;background:var(--chip);border-radius:9px;font-size:12px;cursor:pointer;transition:.15s;}
  .chips .chip:hover{background:rgba(127,127,127,.16);}
  .hint{color:var(--text-dim);font-size:13px;line-height:1.8;}

  .node{cursor:pointer;}
  .card{transition:transform .16s cubic-bezier(.34,1.4,.64,1);transform-box:fill-box;transform-origin:center;}
  .node:hover .card{transform:scale(1.05);}
  @keyframes grow{from{opacity:0;transform:scale(.55) translateY(12px);}to{opacity:1;transform:none;}}
  .card.grow{animation:grow .55s cubic-bezier(.34,1.55,.5,1) both;}
  @keyframes ringpulse{0%,100%{opacity:.45;transform:scale(1);}50%{opacity:.9;transform:scale(1.06);}}
  .rootring{animation:ringpulse 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
  @keyframes blockpulse{0%,100%{opacity:.35;}50%{opacity:.95;}}
  .blockdot{animation:blockpulse 1.5s ease-in-out infinite;}
  @keyframes flow{to{stroke-dashoffset:-22;}}
  .dep{fill:none;stroke:#e7b24a;stroke-width:1.6;stroke-dasharray:5 6;opacity:.6;animation:flow 1.1s linear infinite;}

  .wall{padding:28px;overflow-y:auto;height:100%;}
  .wall h1{font-size:18px;margin:0 0 4px;} .wall .sub{color:var(--text-dim);font-size:12.5px;margin-bottom:20px;}
  .wallgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:15px;}
  .bc{background:linear-gradient(180deg,var(--card-top),var(--card-bot));border:1px solid rgba(224,86,59,.38);border-left:4px solid #e0563b;border-radius:15px;padding:16px 17px;box-shadow:0 10px 26px rgba(0,0,0,.22);}
  .bc .t{display:flex;justify-content:space-between;align-items:baseline;}
  .bc .o{font-size:12px;color:var(--text-dim);} .bc .d{font-size:12px;font-weight:700;color:#e0563b;}
  .bc .ttl{font-size:15px;font-weight:600;margin:7px 0;} .bc .r{font-size:13px;line-height:1.65;}
  .bc .dn{margin-top:10px;font-size:11.5px;color:var(--text-dim);padding-top:9px;border-top:1px solid var(--border);}
</style>
</head>
<body data-theme="dark">
<div class="app">
  <div class="top">
    <div class="brand"><b>个人任务树</b>&nbsp;<span>注意力长在哪，卡点亮在哪</span></div>
    <div class="tabs"><div class="tab active" data-view="tree">成长树</div><div class="tab" data-view="wall">卡点墙</div></div>
    <div class="spacer"></div>
    <div class="lbl">布局 <select id="layoutSel"><option value="h">横向整齐</option><option value="r">径向生命树</option></select></div>
    <div class="lbl">视角 <select id="ownerSel"></select></div>
    <button class="btn" id="btnReplay">重新生长</button>
    <button class="btn" id="btnTheme">白天 / 夜晚</button>
  </div>
  <div class="main">
    <div class="stage">
      <svg id="svg" preserveAspectRatio="xMidYMid meet">
        <defs></defs>
        <g id="viewport"><g id="depLayer"></g><g id="linkLayer"></g><g id="nodeLayer"></g></g>
      </svg>
      <div class="wall" id="wall" style="display:none"></div>
      <div class="legend glass" id="legend"></div>
      <div class="viewhint glass" id="viewhint"></div>
      <div class="zoomctl">
        <button class="btn" id="zIn">+</button><button class="btn" id="zOut">&minus;</button><button class="btn" id="zFit">适配</button>
      </div>
    </div>
    <div class="side" id="side"></div>
  </div>
  <div class="chat">
    <div class="chatlog" id="chatlog"></div>
    <div class="chatrow"><input id="chatInput" placeholder="对话摘任务：例「这周要搞周报自动化，但卡在等模型池配额」" /><button class="btn" id="btnSend">摘出 →</button></div>
  </div>
</div>
<script>
(function(){
  "use strict";
  const NS="http://www.w3.org/2000/svg";
  const STATUS={idea:{label:"想法",color:"#a3ad7e"},planned:{label:"已规划",color:"#54bdaf"},
    building:{label:"进行中",color:"#e6ad42"},done:{label:"已完成",color:"#54b96d"},blocked:{label:"卡点",color:"#e0563b"}};
  const PEOPLE=[{id:"me",name:"我"},{id:"lin",name:"林"},{id:"zhao",name:"赵"}];
  let TASKS=[
    {id:"me0",owner:"me",title:"2026 Q2 主线",status:"building",parent:null},
    {id:"a",owner:"me",title:"任务树智能体 v1",status:"building",parent:"me0"},
    {id:"a1",owner:"me",title:"对话摘取任务",status:"building",parent:"a"},
    {id:"a2",owner:"me",title:"可视化框架选型",status:"done",parent:"a"},
    {id:"a3",owner:"me",title:"卡点上报视图",status:"idea",parent:"a",deps:["a2"]},
    {id:"b",owner:"me",title:"周报自动化",status:"planned",parent:"me0"},
    {id:"b1",owner:"me",title:"数据源接入",status:"planned",parent:"b",deps:["lin1"]},
    {id:"b2",owner:"me",title:"LLM 生成草稿",status:"blocked",parent:"b",deps:["b1"],blocker:"等待模型池配额审批，无法压测长上下文",stuck:5},
    {id:"c",owner:"me",title:"缺陷分享 Agent",status:"done",parent:"me0"},
    {id:"c1",owner:"me",title:"外部 Agent 鉴权",status:"done",parent:"c"},
    {id:"c2",owner:"me",title:"验收回流",status:"building",parent:"c"},
    {id:"c21",owner:"me",title:"复测报告模板",status:"idea",parent:"c2"},
    {id:"lin0",owner:"lin",title:"数据平台",status:"building",parent:null},
    {id:"lin1",owner:"lin",title:"数据 API 网关",status:"building",parent:"lin0"},
    {id:"lin2",owner:"lin",title:"埋点 SDK",status:"blocked",parent:"lin0",blocker:"前端埋点方案未定，等设计评审拍板",stuck:8},
    {id:"zhao0",owner:"zhao",title:"增长实验",status:"building",parent:null},
    {id:"zhao1",owner:"zhao",title:"AB 测试框架",status:"done",parent:"zhao0"},
    {id:"zhao2",owner:"zhao",title:"实验看板",status:"blocked",parent:"zhao0",deps:["lin1"],blocker:"缺数据源，依赖林的「数据 API 网关」尚未就绪",stuck:3},
  ];

  const svg=document.getElementById("svg"),vp=document.getElementById("viewport"),
    depLayer=document.getElementById("depLayer"),linkLayer=document.getElementById("linkLayer"),nodeLayer=document.getElementById("nodeLayer"),
    wallEl=document.getElementById("wall"),side=document.getElementById("side"),log=document.getElementById("chatlog");
  const CW=182,CH=56,ROWGAP=34,COLGAP=244;
  let view="tree",layout="h",owner="me",selectedId=null,idSeq=200;
  const newIds=new Set();
  let cam={x:0,y:0,w:1000,h:700};

  const el=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  const get=id=>TASKS.find(t=>t.id===id);
  const kidsOf=id=>TASKS.filter(t=>t.parent===id);
  const rootOf=o=>TASKS.find(t=>t.owner===o&&t.parent===null);
  const css=v=>getComputedStyle(document.body).getPropertyValue(v).trim();
  const name=id=>(PEOPLE.find(p=>p.id===id)||{}).name||id;

  // ---- tidy layout (leaf-slot + parent-average) ----
  function tidy(){const pos={};let leaf=0;
    (function w(id,d){const ks=kidsOf(id);let y;
      if(!ks.length){y=leaf*(CH+ROWGAP);leaf++;}else{const ys=ks.map(k=>w(k.id,d+1));y=(ys[0]+ys[ys.length-1])/2;}
      pos[id]={depth:d,x:d*COLGAP,y,cx:d*COLGAP+CW/2,cy:y+CH/2};return y;})(rootOf(owner).id,0);
    return pos;}
  function radial(){const t=tidy();let mY=0;Object.values(t).forEach(n=>mY=Math.max(mY,n.y));
    const RING=172,pos={};
    Object.keys(t).forEach(id=>{const n=t[id];
      const ang=(mY?n.y/mY:0)*Math.PI*1.5 - Math.PI*0.75 - Math.PI/2;
      const r=n.depth*RING,x=Math.cos(ang)*r,y=Math.sin(ang)*r;
      pos[id]={depth:n.depth,cx:x,cy:y,x:x-CW/2,y:y-CH/2};});
    return pos;}
  function curveH(a,b){const x1=a.cx+CW/2,y1=a.cy,x2=b.cx-CW/2,y2=b.cy,dx=Math.max((x2-x1)/2,30);
    return`M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`;}
  function curveR(a,b){return`M ${a.cx} ${a.cy} Q ${(a.cx+b.cx)/2*0.72} ${(a.cy+b.cy)/2*0.72} ${b.cx} ${b.cy}`;}

  // ---- defs (theme-aware gradients + filters) ----
  function ensureDefs(){
    const defs=svg.querySelector("defs");defs.innerHTML="";
    const cg=el("linearGradient",{id:"cardGrad",x1:"0",y1:"0",x2:"0",y2:"1"});
    cg.appendChild(el("stop",{offset:"0%","stop-color":css("--card-top")}));
    cg.appendChild(el("stop",{offset:"100%","stop-color":css("--card-bot")}));defs.appendChild(cg);
    const rg=el("linearGradient",{id:"rootGrad",x1:"0",y1:"0",x2:"0",y2:"1"});
    rg.appendChild(el("stop",{offset:"0%","stop-color":css("--accent-2")}));
    rg.appendChild(el("stop",{offset:"100%","stop-color":css("--accent")}));defs.appendChild(rg);
    const lg=el("linearGradient",{id:"linkGrad",x1:"0",y1:"0",x2:"1",y2:"0"});
    lg.appendChild(el("stop",{offset:"0%","stop-color":css("--accent"),"stop-opacity":".05"}));
    lg.appendChild(el("stop",{offset:"100%","stop-color":css("--text-dim"),"stop-opacity":".38"}));defs.appendChild(lg);
    const sh=document.body.dataset.theme==="light"?"rgba(70,60,50,.18)":"rgba(0,0,0,.45)";
    const f=el("filter",{id:"cardShadow",x:"-30%",y:"-30%",width:"160%",height:"170%"});
    f.appendChild(el("feDropShadow",{dx:"0",dy:"5","stdDeviation":"7","flood-color":sh}));defs.appendChild(f);
    const gl=el("filter",{id:"glow",x:"-60%",y:"-60%",width:"220%",height:"220%"});
    gl.appendChild(el("feGaussianBlur",{stdDeviation:"6",result:"b"}));
    const me=el("feMerge",{});me.appendChild(el("feMergeNode",{in:"b"}));me.appendChild(el("feMergeNode",{in:"SourceGraphic"}));gl.appendChild(me);defs.appendChild(gl);
  }

  // ---- camera ----
  function applyCam(){svg.setAttribute("viewBox",`${cam.x} ${cam.y} ${cam.w} ${cam.h}`);}
  function fitTo(bb){const r=svg.getBoundingClientRect();const asp=r.width/Math.max(r.height,1);
    let bw=(bb.maxX-bb.minX)||CW,bh=(bb.maxY-bb.minY)||CH;const cxp=(bb.minX+bb.maxX)/2,cyp=(bb.minY+bb.maxY)/2;
    bw*=1.16;bh*=1.16;let w,h;if(bw/bh>asp){w=bw;h=bw/asp;}else{h=bh;w=bh*asp;}
    cam={x:cxp-w/2,y:cyp-h/2,w,h};applyCam();}
  let lastBB=null;
  function zoomAt(cx,cy,f){const r=svg.getBoundingClientRect();
    const wx=cam.x+(cx-r.left)/r.width*cam.w, wy=cam.y+(cy-r.top)/r.height*cam.h;
    const nw=Math.min(Math.max(cam.w*f,260),9000),nh=nw*(cam.h/cam.w);
    cam.x=wx-(wx-cam.x)*(nw/cam.w);cam.y=wy-(wy-cam.y)*(nh/cam.h);cam.w=nw;cam.h=nh;applyCam();}

  function render(animate,fit){
    depLayer.innerHTML="";linkLayer.innerHTML="";nodeLayer.innerHTML="";
    const pos=layout==="r"?radial():tidy();const ids=Object.keys(pos);
    let bb={minX:1e9,minY:1e9,maxX:-1e9,maxY:-1e9};
    ids.forEach(id=>{const p=pos[id];bb.minX=Math.min(bb.minX,p.x);bb.minY=Math.min(bb.minY,p.y);bb.maxX=Math.max(bb.maxX,p.x+CW);bb.maxY=Math.max(bb.maxY,p.y+CH);});
    lastBB=bb;if(fit)fitTo(bb);

    TASKS.filter(t=>pos[t.id]&&t.parent&&pos[t.parent]).forEach(t=>{
      const a=pos[t.parent],b=pos[t.id],w=Math.max(5.5-b.depth*0.95,1.7);
      const p=el("path",{fill:"none",stroke:"url(#linkGrad)","stroke-linecap":"round","stroke-width":w,d:layout==="r"?curveR(a,b):curveH(a,b)});
      linkLayer.appendChild(p);
      if(!animate||newIds.has(t.id)){const tl=p.getTotalLength();p.style.strokeDasharray=tl;p.style.strokeDashoffset=tl;
        p.style.transition="stroke-dashoffset .5s ease-out";p.style.transitionDelay=(b.depth*.26)+"s";
        requestAnimationFrame(()=>requestAnimationFrame(()=>p.style.strokeDashoffset=0));}
    });
    TASKS.filter(t=>t.owner===owner&&t.deps).forEach(t=>t.deps.forEach(dp=>{if(pos[dp]&&pos[t.id]){
      const a=pos[dp],b=pos[t.id];depLayer.appendChild(el("path",{class:"dep",d:`M ${a.cx} ${a.cy} Q ${(a.cx+b.cx)/2} ${(a.cy+b.cy)/2-50} ${b.cx} ${b.cy}`}));}}));

    ids.forEach(id=>{const t=get(id),st=STATUS[t.status],p=pos[id],isRoot=p.depth===0;
      const g=el("g",{class:"node",transform:`translate(${p.x} ${p.y})`});
      const card=el("g",{class:"card"+(((!animate||newIds.has(id)))?" grow":"")});
      if((!animate||newIds.has(id)))card.style.animationDelay=(p.depth*.26+.3)+"s";
      if(isRoot){const ring=el("rect",{class:"rootring",x:-5,y:-5,width:CW+10,height:CH+10,rx:18,fill:"none",stroke:"var(--accent)","stroke-width":2});ring.setAttribute("filter","url(#glow)");card.appendChild(ring);}
      const rect=el("rect",{x:0,y:0,width:CW,height:CH,rx:15,fill:"url(#cardGrad)",
        stroke:t.id===selectedId?"var(--accent)":(t.status==="blocked"?"#e0563b":"var(--card-bd)"),"stroke-width":t.id===selectedId?2:1.2,filter:"url(#cardShadow)"});
      card.appendChild(rect);
      card.appendChild(el("rect",{x:0,y:9,width:5,height:CH-18,rx:2.5,fill:isRoot?"url(#rootGrad)":st.color}));
      card.appendChild(el("circle",{cx:20,cy:21,r:4,fill:isRoot?"var(--accent-2)":st.color}));
      const ttl=el("text",{x:32,y:25,fill:"var(--text)","font-size":13.5,"font-weight":600});
      ttl.textContent=(isRoot?"创世支柱":t.title);if(ttl.textContent.length>11)ttl.textContent=ttl.textContent.slice(0,11);card.appendChild(ttl);
      const sub=el("text",{x:18,y:44,fill:isRoot?"var(--accent-2)":st.color,"font-size":11});
      sub.textContent=isRoot?t.title:(st.label+(t.status==="blocked"?(" · 卡 "+(t.stuck||"?")+" 天"):""));
      if(sub.textContent.length>15)sub.textContent=sub.textContent.slice(0,15);card.appendChild(sub);
      if(t.status==="blocked")card.appendChild(el("circle",{class:"blockdot",cx:CW-14,cy:15,r:5,fill:"#e0563b"}));
      g.appendChild(card);
      g.addEventListener("click",e=>{e.stopPropagation();selectNode(id);});
      nodeLayer.appendChild(g);});
    newIds.clear();
  }

  function renderWall(){
    const blocked=TASKS.filter(t=>t.status==="blocked").sort((a,b)=>(b.stuck||0)-(a.stuck||0));
    const downs=t=>TASKS.filter(x=>(x.deps||[]).includes(t.id)).map(x=>name(x.owner)+"·"+x.title);
    let h=`<h1>卡点墙 · 给老板的一眼</h1><div class="sub">全员卡点按卡住时长排序，最久的在前。共 ${blocked.length} 个。</div><div class="wallgrid">`;
    if(!blocked.length)h+=`<div class="hint">当前没有卡点，一切顺畅。</div>`;
    blocked.forEach(t=>{const d=downs(t);h+=`<div class="bc"><div class="t"><span class="o">${name(t.owner)}</span><span class="d">卡 ${t.stuck||"?"} 天</span></div><div class="ttl">${t.title}</div><div class="r">${t.blocker||""}</div>${d.length?`<div class="dn">阻塞了：${d.join("、")}</div>`:""}</div>`;});
    wallEl.innerHTML=h+"</div>";
  }

  function selectNode(id){selectedId=id;if(view==="tree")render(false,false);renderSide(id);}
  function renderSide(id){
    if(view==="wall"){side.innerHTML=`<div class="hint">卡点墙是只读上报视图：把所有人的卡点聚到一起按时长排序，并标出每个卡点<b>下游阻塞了谁</b>。老板一眼知道谁卡了、卡多久、连累了谁。</div>`;return;}
    const t=id&&get(id);
    if(!t){side.innerHTML=`<div class="hint">点一个节点看详情。<br/><br/>卡片=任务，左侧色条=进度，<span style="color:#e0563b">红点闪烁</span>=卡点。实线=父子（被依赖→下一步），<span style="color:#e7b24a">黄色流动虚线</span>=跨枝/跨人依赖。<br/><br/>画布可<b>拖拽平移</b>、<b>滚轮 / 触控板缩放</b>。右上切两种布局，底部对话摘任务。</div>`;return;}
    let h=`<h2>${t.title}</h2><div class="meta">${t.parent?("属于："+get(t.parent).title):"创世支柱（根任务）"}</div>`;
    h+=`<div class="field"><label>进度</label><div class="statusrow" id="sr"></div></div>`;
    if(t.status==="blocked")h+=`<div class="blocker"><div class="l">卡点</div>${t.blocker||"（补充）"}${t.stuck?` · 已卡 ${t.stuck} 天`:""}</div>`;
    const ks=kidsOf(t.id);
    h+=`<div class="field"><label>${ks.length?"下一个任务（枝干）":"下一步"}</label><div class="chips" id="kids"></div></div>`;
    const deps=(t.deps||[]).map(get).filter(Boolean);
    if(deps.length)h+=`<div class="field"><label>依赖（前置）</label><div class="chips" id="deps"></div></div>`;
    side.innerHTML=h;
    const sr=side.querySelector("#sr");
    Object.keys(STATUS).forEach(k=>{const p=document.createElement("span");p.className="pill"+(k===t.status?" active":"");
      p.textContent=STATUS[k].label;p.style.background=STATUS[k].color+"2e";p.style.color=STATUS[k].color;
      p.onclick=()=>{t.status=k;if(k!=="blocked"){delete t.blocker;delete t.stuck;}rerender();renderSide(id);};sr.appendChild(p);});
    const kc=side.querySelector("#kids");
    if(ks.length)ks.forEach(c=>{const ch=document.createElement("span");ch.className="chip";ch.style.borderLeft="3px solid "+STATUS[c.status].color;ch.textContent=c.title;ch.onclick=()=>selectNode(c.id);kc.appendChild(ch);});
    else kc.innerHTML=`<span class="hint">末梢任务，可在下方摘出下一步。</span>`;
    const dc=side.querySelector("#deps");
    if(dc)deps.forEach(d=>{const ch=document.createElement("span");ch.className="chip";ch.style.borderLeft="3px solid #e7b24a";ch.textContent=(d.owner!==owner?(name(d.owner)+"·"):"")+d.title;ch.onclick=()=>{if(d.owner!==owner){owner=d.owner;document.getElementById("ownerSel").value=owner;}selectNode(d.id);};dc.appendChild(ch);});
  }

  function logLine(c,html){const d=document.createElement("div");d.className=c;d.innerHTML=html;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
  function infer(x){if(/卡|阻塞|堵|block|等待|配额|审批|没排上/.test(x))return"blocked";if(/完成|做完|搞定|done|上线|发布/.test(x))return"done";if(/在做|进行|开始|开发中/.test(x))return"building";if(/计划|准备|规划|排期|下周|要搞|打算/.test(x))return"planned";return"idea";}
  function sendChat(){const inp=document.getElementById("chatInput"),text=inp.value.trim();if(!text)return;inp.value="";
    logLine("u","你："+text);const a=logLine("a","<b>任务树</b>：正在分析…");
    const status=infer(text),st=STATUS[status];
    const title=text.replace(/[，,。.；;].*$/,"").replace(/^(这周|本周|下周|我?要|打算|准备)/,"").slice(0,12)||"新任务";
    const blocker=status==="blocked"?text:null;
    const parent=selectedId&&get(selectedId)&&get(selectedId).owner===owner?get(selectedId):rootOf(owner);
    const full=`解析为任务「${title}」｜进度：${st.label}${blocker?"｜识别到卡点":""}｜建议挂到「${parent.title}」下，正在生长…`;
    let i=0;const tm=setInterval(()=>{i+=2;a.innerHTML="<b>任务树</b>："+full.slice(0,i);log.scrollTop=log.scrollHeight;
      if(i>=full.length){clearInterval(tm);const id="n"+(idSeq++);const node={id,owner,title,status,parent:parent.id};if(blocker){node.blocker=blocker;node.stuck=0;}TASKS.push(node);newIds.add(id);
        if(view!=="tree"){view="tree";switchView();}render(true,true);setTimeout(()=>selectNode(id),650);}},22);}

  function rerender(){if(view==="tree")render(false,false);else renderWall();}
  function switchView(){
    document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===view));
    svg.style.display=view==="wall"?"none":"block";wallEl.style.display=view==="wall"?"block":"none";
    ["legend","viewhint"].forEach(i=>document.getElementById(i).style.display=view==="wall"?"none":"block");
    document.querySelector(".zoomctl").style.display=view==="wall"?"none":"flex";
    document.getElementById("legend").style.display=view==="wall"?"none":"flex";
    document.getElementById("viewhint").textContent=layout==="r"
      ?"径向生命树：创世支柱在中心，枝桠向四周放射生长。拖拽平移、滚轮缩放。黄色流动虚线=依赖。"
      :"横向整齐树：tidy 自动布局永不重叠。拖拽平移、滚轮缩放。左色条=进度，红点=卡点，黄虚线=依赖。";
    if(view==="tree")render(true,true);else renderWall();
    renderSide(selectedId);
  }
  function drawLegend(){const l=document.getElementById("legend");l.innerHTML="";Object.keys(STATUS).forEach(k=>{const r=document.createElement("div");r.className="row";const d=document.createElement("span");d.className="dot";d.style.background=STATUS[k].color;d.style.color=STATUS[k].color;const t=document.createElement("span");t.textContent=STATUS[k].label;r.appendChild(d);r.appendChild(t);l.appendChild(r);});}
  function fillOwners(){const s=document.getElementById("ownerSel");PEOPLE.forEach(p=>{const o=document.createElement("option");o.value=p.id;o.textContent=p.name;s.appendChild(o);});s.value=owner;}
  function markNew(){TASKS.filter(t=>t.owner===owner).forEach(t=>newIds.add(t.id));}

  // events
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{view=t.dataset.view;switchView();});
  document.getElementById("layoutSel").onchange=e=>{layout=e.target.value;markNew();switchView();};
  document.getElementById("ownerSel").onchange=e=>{owner=e.target.value;selectedId=null;markNew();switchView();};
  document.getElementById("btnReplay").onclick=()=>{markNew();view="tree";switchView();};
  document.getElementById("btnTheme").onclick=()=>{document.body.dataset.theme=document.body.dataset.theme==="dark"?"light":"dark";ensureDefs();rerender();};
  document.getElementById("btnSend").onclick=sendChat;
  document.getElementById("chatInput").addEventListener("keydown",e=>{if(e.key==="Enter")sendChat();});
  document.getElementById("zIn").onclick=()=>{const r=svg.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,0.82);};
  document.getElementById("zOut").onclick=()=>{const r=svg.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,1.22);};
  document.getElementById("zFit").onclick=()=>{if(lastBB)fitTo(lastBB);};

  // pan + zoom (gesture-unification: 两指拖动=平移, ⌘/Ctrl+滚轮 or pinch=缩放)
  svg.addEventListener("wheel",e=>{e.preventDefault();
    if(e.ctrlKey||e.metaKey){zoomAt(e.clientX,e.clientY,e.deltaY>0?1.1:0.9);}
    else{cam.x+=e.deltaX*cam.w/svg.getBoundingClientRect().width;cam.y+=e.deltaY*cam.h/svg.getBoundingClientRect().height;applyCam();}},{passive:false});
  let drag=null;
  svg.addEventListener("pointerdown",e=>{drag={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y};svg.setPointerCapture(e.pointerId);svg.classList.add("grabbing");});
  svg.addEventListener("pointermove",e=>{if(!drag)return;const r=svg.getBoundingClientRect();
    cam.x=drag.cx-(e.clientX-drag.x)*cam.w/r.width;cam.y=drag.cy-(e.clientY-drag.y)*cam.h/r.height;applyCam();});
  svg.addEventListener("pointerup",e=>{const moved=drag&&(Math.abs(e.clientX-drag.x)+Math.abs(e.clientY-drag.y))>4;drag=null;svg.classList.remove("grabbing");if(!moved){selectedId=null;rerender();renderSide(null);}});
  window.addEventListener("resize",()=>{if(view==="tree"&&lastBB)fitTo(lastBB);});

  ensureDefs();drawLegend();fillOwners();markNew();switchView();
})();
</script>
</body>
</html>
