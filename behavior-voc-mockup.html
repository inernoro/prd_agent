<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>团队动态 · 用户体验之声 VOC（痛点雷达）</title>
<style>
  :root {
    --bg-primary:#0e0f10; --bg-card:#1a1b1d; --bg-card-2:#202123; --bg-elevated:#26282b;
    --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.13);
    --text-1:#ececef; --text-2:rgba(236,236,239,0.62); --text-3:rgba(236,236,239,0.40);
    --teal:#2dd4bf; --red:#f8717a; --amber:#fbbf24; --green:#34d399; --violet:#a78bfa; --blue:#60a5fa;
    --shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,rgba(167,139,250,0.06),transparent 60%),
      radial-gradient(900px 500px at -5% 10%,rgba(45,212,191,0.05),transparent 55%),var(--bg-primary);
    color:var(--text-1); padding:24px 30px 60px; min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:1320px; margin:0 auto; }
  .page-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .page-head .titles { display:flex; flex-direction:column; gap:4px; }
  .page-head h1 { font-size:19px; font-weight:650; }
  .page-head .sub { font-size:12.5px; color:var(--text-3); }
  .range-pills { display:inline-flex; gap:6px; }
  .range-pills button { border:1px solid var(--border); background:var(--bg-card); color:var(--text-2); font-size:12px; padding:6px 13px; border-radius:8px; cursor:pointer; }
  .range-pills button.active { background:rgba(167,139,250,0.13); border-color:rgba(167,139,250,0.4); color:var(--violet); }

  /* hero */
  .hero { display:grid; grid-template-columns:1fr 380px; gap:16px; margin-bottom:18px; }
  .card { background:linear-gradient(180deg,var(--bg-card),#161718); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow); position:relative; overflow:hidden; }
  .card-h { display:flex; align-items:center; justify-content:space-between; padding:15px 18px 4px; }
  .card-h .t { font-size:13px; font-weight:650; color:var(--text-1); display:flex; align-items:center; gap:8px; }
  .card-h .t .live { font-size:11px; color:var(--teal); display:inline-flex; align-items:center; gap:6px; font-weight:500; }
  .card-h .t .live .blip { width:7px; height:7px; border-radius:50%; background:var(--teal); animation:blink 1.3s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.3)} }
  .card-h .legend { display:flex; gap:13px; }
  .card-h .legend span { font-size:11px; color:var(--text-2); display:inline-flex; align-items:center; gap:6px; }
  .card-h .legend i { width:8px; height:8px; border-radius:50%; }

  /* radar */
  .radar-wrap { display:flex; align-items:center; justify-content:center; padding:6px 10px 16px; }
  .radar { width:100%; max-width:520px; height:auto; }
  .ring { fill:none; stroke:rgba(255,255,255,0.06); }
  .ring.core { stroke:rgba(248,113,122,0.18); }
  .spoke { stroke:rgba(255,255,255,0.04); }
  .zone-lbl { fill:var(--text-3); font-size:9px; }
  .quad-lbl { font-size:10.5px; font-weight:600; }
  @keyframes sweepRot { to { transform:rotate(360deg); } }
  @keyframes blipIn { from { opacity:0; transform:scale(0); } to { opacity:1; transform:scale(1); } }
  @keyframes pulseR { 0%{ opacity:.5; } 100%{ transform:scale(2.4); opacity:0; } }
  .blip-g { cursor:pointer; }
  .blip-g:hover .blip-core { filter:brightness(1.3); }
  .blip-lbl { font-size:9.5px; fill:var(--text-2); pointer-events:none; }

  /* right column */
  .rcol { display:flex; flex-direction:column; gap:16px; }
  .gauge-card { padding:16px 18px 18px; display:flex; flex-direction:column; align-items:center; }
  .gauge-card .gt { font-size:12.5px; color:var(--text-2); align-self:flex-start; font-weight:600; }
  .gauge-svg { width:240px; height:150px; margin-top:4px; }
  .gauge-num { font-size:46px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; transition:color .8s; }
  .gauge-sub { font-size:11.5px; color:var(--green); margin-top:2px; }
  .mini-kpis { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; width:100%; margin-top:14px; }
  .mk { background:var(--bg-card-2); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
  .mk .v { font-size:20px; font-weight:750; font-variant-numeric:tabular-nums; }
  .mk .l { font-size:10px; color:var(--text-3); margin-top:3px; }

  /* filters */
  .filters { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  .filters .grp { display:inline-flex; gap:6px; align-items:center; }
  .filters .gl { font-size:11px; color:var(--text-3); margin-right:2px; }
  .chip { border:1px solid var(--border); background:var(--bg-card); color:var(--text-2); font-size:12px; padding:6px 12px; border-radius:8px; cursor:pointer; transition:all .15s; }
  .chip:hover { border-color:var(--border-strong); color:var(--text-1); }
  .chip.active { background:rgba(45,212,191,0.13); border-color:rgba(45,212,191,0.4); color:var(--teal); }
  .filters .sep { width:1px; height:20px; background:var(--border); margin:0 4px; }

  .section-h { display:flex; align-items:center; gap:10px; margin:6px 2px 12px; }
  .section-h .t { font-size:14px; font-weight:650; }
  .section-h .ln { flex:1; height:1px; background:var(--border); }
  .section-h .crumb { font-size:12px; color:var(--text-3); }

  /* pain cards */
  .pain { display:grid; grid-template-columns:60px 1fr 108px auto; gap:16px; align-items:center;
    background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; margin-bottom:9px; transition:border-color .15s, transform .15s, box-shadow .3s; }
  .pain:hover { border-color:var(--border-strong); transform:translateX(2px); }
  .pain.flash { box-shadow:0 0 0 2px var(--teal); }
  .pain.hot { border-left:3px solid var(--red); } .pain.warm { border-left:3px solid var(--amber); }
  .pain.corro { box-shadow:0 0 0 1px rgba(167,139,250,0.25) inset; }
  .score-ring { position:relative; width:52px; height:52px; }
  .score-ring svg { transform:rotate(-90deg); }
  .score-ring .sn { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; font-variant-numeric:tabular-nums; }
  .pmain { min-width:0; }
  .prow1 { display:flex; align-items:center; gap:8px; margin-bottom:5px; flex-wrap:wrap; }
  .ptitle { font-size:13.5px; font-weight:600; }
  .badge { font-size:10.5px; padding:2px 7px; border-radius:5px; font-weight:600; white-space:nowrap; }
  .b-behavior { background:rgba(96,165,250,0.13); color:var(--blue); }
  .b-user { background:rgba(167,139,250,0.14); color:var(--violet); }
  .b-err { background:rgba(248,113,122,0.13); color:var(--red); }
  .b-slow { background:rgba(251,191,36,0.13); color:var(--amber); }
  .b-churn { background:rgba(248,113,122,0.13); color:var(--red); }
  .b-fb { background:rgba(167,139,250,0.13); color:var(--violet); }
  .b-corro { background:linear-gradient(90deg,rgba(96,165,250,0.18),rgba(167,139,250,0.18)); color:#cbb6ff; border:1px solid rgba(167,139,250,0.4); }
  .psub { font-size:12px; color:var(--text-2); line-height:1.4; }
  .psub .code { font-family:ui-monospace,Menlo,monospace; font-size:11.5px; color:var(--text-3); }
  .pmeta { font-size:11.5px; color:var(--text-3); margin-top:4px; } .pmeta b { color:var(--text-1); }
  .ptrend { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .ptrend .tl { font-size:10.5px; }
  .ptrend .tl.up { color:var(--red); } .ptrend .tl.down { color:var(--green); } .ptrend .tl.flat { color:var(--text-3); }
  .pright { display:flex; flex-direction:column; align-items:flex-end; gap:8px; min-width:150px; }
  .status { font-size:11.5px; padding:4px 10px; border-radius:7px; font-weight:600; white-space:nowrap; }
  .s-todo { background:rgba(248,113,122,0.13); color:var(--red); }
  .s-defect { background:rgba(167,139,250,0.13); color:var(--violet); }
  .s-fixing { background:rgba(96,165,250,0.13); color:var(--blue); }
  .acts { display:flex; gap:6px; }
  .acts button { font-size:11px; padding:4px 9px; border-radius:6px; cursor:pointer; border:1px solid var(--border); background:var(--bg-card-2); color:var(--text-2); transition:all .15s; }
  .acts button.primary { background:rgba(251,191,36,0.13); border-color:rgba(251,191,36,0.35); color:var(--amber); }
  .acts button:hover { color:var(--text-1); border-color:var(--border-strong); }

  /* closed loop */
  .loop { background:linear-gradient(180deg,var(--bg-card),var(--bg-card-2)); border:1px solid var(--border); border-radius:14px; padding:6px 16px; }
  .loop-item { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; padding:13px 4px; }
  .loop-item + .loop-item { border-top:1px solid var(--border); }
  .loop-item .lt { font-size:12.5px; font-weight:600; } .loop-item .ls { font-size:11.5px; color:var(--text-3); margin-top:3px; }
  .ba { display:flex; align-items:center; gap:10px; }
  .ba .b-before { font-size:13px; color:var(--red); font-weight:700; text-decoration:line-through; opacity:.65; }
  .ba .arrow { color:var(--text-3); }
  .ba .b-after { font-size:15px; color:var(--green); font-weight:800; }
  .ba .drop { font-size:11px; color:var(--green); background:rgba(52,211,153,0.13); padding:2px 7px; border-radius:5px; }
  @media (max-width:960px){ .hero { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">

  <div class="page-head">
    <div class="titles">
      <h1>用户体验之声 · VOC</h1>
      <span class="sub">用户没说出口的痛，雷达替他扫出来——并盯着你修完。行为之声 + 用户之声 双声道。</span>
    </div>
    <div class="range-pills">
      <button>今天</button><button>本周</button><button class="active">本月</button><button>季度</button>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="card">
      <div class="card-h">
        <span class="t">痛点雷达<span class="live"><span class="blip"></span>实时扫描</span></span>
        <div class="legend">
          <span><i style="background:var(--red)"></i>报错</span>
          <span><i style="background:var(--amber)"></i>等待</span>
          <span><i style="background:var(--red)"></i>流失</span>
          <span><i style="background:var(--violet)"></i>吐槽</span>
        </div>
      </div>
      <div class="radar-wrap">
        <svg class="radar" id="radar" viewBox="0 0 400 400"></svg>
      </div>
    </div>

    <div class="rcol">
      <div class="card gauge-card">
        <span class="gt">体验痛点指数</span>
        <svg class="gauge-svg" id="gauge" viewBox="0 0 240 150"></svg>
        <div class="gauge-sub" id="gaugeSub">↓ 9% · 本月修复见效，痛点在回落</div>
        <div class="mini-kpis">
          <div class="mk"><div class="v" style="color:var(--red)" id="mkOpen">0</div><div class="l">待解决</div></div>
          <div class="mk"><div class="v" style="color:var(--green)" id="mkClosed">0</div><div class="l">已闭环</div></div>
          <div class="mk"><div class="v" id="mkUsers">0</div><div class="l">受影响人</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- filters -->
  <div class="filters" id="filters">
    <div class="grp"><span class="gl">声道</span>
      <button class="chip active" data-f="src" data-v="all">全部</button>
      <button class="chip" data-f="src" data-v="behavior">行为之声</button>
      <button class="chip" data-f="src" data-v="user">用户之声</button>
    </div>
    <span class="sep"></span>
    <div class="grp"><span class="gl">维度</span>
      <button class="chip active" data-f="dim" data-v="all">全部</button>
      <button class="chip" data-f="dim" data-v="ai">AI</button>
      <button class="chip" data-f="dim" data-v="api">接口</button>
      <button class="chip" data-f="dim" data-v="user">用户行为</button>
    </div>
  </div>

  <div class="section-h">
    <span class="t">痛点优先级榜</span><span class="ln"></span>
    <span class="crumb">影响分 = 影响人数 × 严重度 × 频次 × 趋势 · <span id="cnt"></span></span>
  </div>
  <div id="painList"></div>

  <div class="section-h" style="margin-top:24px">
    <span class="t">本月已闭环（修复证据）</span><span class="ln"></span>
    <span class="crumb">痛点修复后的真实回落</span>
  </div>
  <div class="loop" id="loop"></div>

</div>

<script>
(function(){
  const NS='http://www.w3.org/2000/svg';
  const C={ red:'#f8717a', amber:'#fbbf24', green:'#34d399', violet:'#a78bfa', blue:'#60a5fa', teal:'#2dd4bf' };
  const CHCOL={ err:C.red, slow:C.amber, churn:C.red, feedback:C.violet };
  const CH_LABEL={ err:'报错', slow:'等待', churn:'流失', feedback:'吐槽' };
  const CH_CLASS={ err:'b-err', slow:'b-slow', churn:'b-churn', feedback:'b-fb' };

  function spark(pts,color,w=96,h=30){
    const max=Math.max(...pts),min=Math.min(...pts),rng=(max-min)||1,step=w/(pts.length-1);
    const d=pts.map((p,i)=>`${(i*step).toFixed(1)},${(h-4-((p-min)/rng)*(h-8)).toFixed(1)}`).join(' ');
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${d}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  const PAINS=[
    { id:'p1', score:980, sev:'hot', corro:true, src:'behavior', src2:'user', channel:'churn', dim:'ai',
      title:'批量生图 卡顿 / 经常生成失败', sub:'视觉创作 · <span class="code">visual-agent.image-gen.batch-generate::generation</span>',
      meta:'行为：报错率 9.1% + 提交→成功流失 31% · 用户：9 人反馈"卡住不动"',
      people:31, trend:'up', spark:[8,10,12,18,24,33], status:'todo' },
    { id:'p2', score:910, sev:'hot', src:'behavior', channel:'err', dim:'api',
      title:'周报「标记已读」频繁 403', sub:'<span class="code">POST /api/weekly-posters/:id/mark-seen</span> · PERMISSION_DENIED',
      meta:'28 人撞到 · 316 次 · 疑似权限校验过严', people:28, trend:'up', spark:[5,9,14,16,22,28], status:'defect', statusInfo:'已转缺陷 #412' },
    { id:'p3', score:640, sev:'hot', src:'behavior', channel:'err', dim:'api',
      title:'视觉创作 文章标记接口报错', sub:'<span class="code">PATCH /api/visual-agent/.../markers/:id</span> · INVALID_FORMAT',
      meta:'7 人遇到 · 507 次 · 建议格式校验前移到前端', people:7, trend:'flat', spark:[40,42,41,43,40,42], status:'todo' },
    { id:'p4', score:560, sev:'warm', src:'user', channel:'feedback', dim:'user',
      title:'知识库搜索结果不准', sub:'用户主动反馈 · 缺陷管理 3 条同类',
      meta:'3 人提过 · "搜不到想要的文档"', people:3, trend:'up', spark:[1,1,2,2,3,3], status:'todo' },
    { id:'p5', score:480, sev:'warm', src:'behavior', channel:'slow', dim:'api',
      title:'更新中心拉取 GitHub 日志慢', sub:'<span class="code">GET /api/changelog/github-logs</span> · 均值 36.1s',
      meta:'10 人等待过 · 已在改后台同步入库', people:10, trend:'down', spark:[20,22,18,14,9,6], status:'fixing', statusInfo:'修复中' },
    { id:'p6', score:430, sev:'warm', src:'behavior', channel:'err', dim:'ai',
      title:'缺陷分析「选 A 给 B」+ 报错偏高', sub:'<span class="code">defect-agent.review.analyze::chat</span> · ExpectedModel ≠ Model',
      meta:'声明 deepseek-r1 实际命中 fallback · 报错率 14.2%', people:5, trend:'up', spark:[6,8,9,11,13,14], status:'todo' },
    { id:'p7', score:360, sev:'warm', src:'behavior', channel:'slow', dim:'api',
      title:'AI 资讯加载等待过久', sub:'<span class="code">GET /api/ai-news/latest</span> · 均值 63.6s',
      meta:'根因在背后视频生成调用 · 建议异步 + 流式', people:8, trend:'flat', spark:[60,62,61,64,63,64], status:'todo' },
    { id:'p8', score:300, sev:'warm', src:'user', channel:'feedback', dim:'user',
      title:'周报海报导出后水印位置错乱', sub:'用户主动反馈 · 缺陷管理',
      meta:'5 人提过 · 已建缺陷跟进', people:5, trend:'flat', spark:[2,3,2,2,3,2], status:'defect', statusInfo:'已转缺陷 #408' },
  ];
  const CLOSED=[
    { title:'会话列表偶发报错', detail:'分页优化上线 · 影响 14 人', before:'报错 220 次', after:'12 次', drop:'-95%' },
    { title:'桌面端更新提示不弹', detail:'版本检测修复 · 影响 30+ 人', before:'0 次触达', after:'按版本一次', drop:'已修复' },
    { title:'文档预览偶尔白屏', detail:'UTF-16 BOM 兼容 · 影响 6 人', before:'白屏 38 次', after:'0 次', drop:'-100%' },
  ];

  // ---------- RADAR ----------
  const radar=document.getElementById('radar');
  const cx=200, cy=200, maxR=170;
  // quadrant base angle (deg, 0=right, clockwise positive in screen coords)
  const QUAD={ err:-50, slow:50, churn:130, feedback:-130 };
  function buildRadar(){
    radar.innerHTML='';
    // rings
    [0.28,0.52,0.76,1].forEach((f,i)=>{
      const r=document.createElementNS(NS,'circle');
      r.setAttribute('cx',cx); r.setAttribute('cy',cy); r.setAttribute('r',maxR*f);
      r.setAttribute('class','ring'+(i===0?' core':''));
      radar.appendChild(r);
    });
    // spokes
    [45,135,225,315].forEach(a=>{
      const rad=a*Math.PI/180;
      const l=document.createElementNS(NS,'line');
      l.setAttribute('x1',cx); l.setAttribute('y1',cy);
      l.setAttribute('x2',cx+Math.cos(rad)*maxR); l.setAttribute('y2',cy+Math.sin(rad)*maxR);
      l.setAttribute('class','spoke'); radar.appendChild(l);
    });
    // zone label
    const zl=document.createElementNS(NS,'text');
    zl.setAttribute('class','zone-lbl'); zl.setAttribute('x',cx+4); zl.setAttribute('y',cy-4); zl.textContent='最紧急';
    radar.appendChild(zl);
    // quadrant labels
    const qlabels=[['报错',-50,C.red],['等待',50,C.amber],['流失',130,C.red],['吐槽',-130,C.violet]];
    qlabels.forEach(([txt,ang,col])=>{
      const rad=ang*Math.PI/180;
      const t=document.createElementNS(NS,'text');
      t.setAttribute('class','quad-lbl'); t.setAttribute('fill',col);
      t.setAttribute('x',cx+Math.cos(rad)*(maxR+2)); t.setAttribute('y',cy+Math.sin(rad)*(maxR+2));
      t.setAttribute('text-anchor', Math.cos(rad)<-0.3?'end':Math.cos(rad)>0.3?'start':'middle');
      t.textContent=txt; radar.appendChild(t);
    });

    // sweep (rotating wedge + leading line)
    const sweep=document.createElementNS(NS,'g');
    sweep.style.transformOrigin=`${cx}px ${cy}px`;
    sweep.style.animation='sweepRot 5s linear infinite';
    const grad=document.createElementNS(NS,'defs');
    grad.innerHTML=`<linearGradient id="sw" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${C.teal}" stop-opacity="0.0"/><stop offset="1" stop-color="${C.teal}" stop-opacity="0.16"/></linearGradient>`;
    radar.appendChild(grad);
    const a0=0, a1=-58;
    const p0={x:cx+Math.cos(a0*Math.PI/180)*maxR, y:cy+Math.sin(a0*Math.PI/180)*maxR};
    const p1={x:cx+Math.cos(a1*Math.PI/180)*maxR, y:cy+Math.sin(a1*Math.PI/180)*maxR};
    const wedge=document.createElementNS(NS,'path');
    wedge.setAttribute('d',`M${cx} ${cy} L${p0.x} ${p0.y} A${maxR} ${maxR} 0 0 0 ${p1.x} ${p1.y} Z`);
    wedge.setAttribute('fill','url(#sw)');
    sweep.appendChild(wedge);
    const lead=document.createElementNS(NS,'line');
    lead.setAttribute('x1',cx); lead.setAttribute('y1',cy);
    lead.setAttribute('x2',p0.x); lead.setAttribute('y2',p0.y);
    lead.setAttribute('stroke',C.teal); lead.setAttribute('stroke-width','1.5'); lead.setAttribute('stroke-opacity','0.5');
    sweep.appendChild(lead);
    radar.appendChild(sweep);

    // blips: radius inverse to score (higher score → closer to center)
    const minS=300,maxS=980;
    PAINS.forEach((p,i)=>{
      const norm=(p.score-minS)/(maxS-minS); // 0..1
      const rr=maxR*(0.92-norm*0.66); // near center when score high
      const jitter=((i*53)%70)-35;
      const ang=(QUAD[p.channel]+jitter)*Math.PI/180;
      const x=cx+Math.cos(ang)*rr, y=cy+Math.sin(ang)*rr;
      const size=6+Math.sqrt(p.people)*1.7;
      const col=CHCOL[p.channel];
      const g=document.createElementNS(NS,'g');
      g.setAttribute('class','blip-g'); g.dataset.id=p.id;
      g.style.opacity=0;
      g.style.animation=`blipIn .5s ease ${0.3+i*0.18}s forwards`;

      if(p.score>=640){ // pulse hottest
        const ring=document.createElementNS(NS,'circle');
        ring.setAttribute('cx',x); ring.setAttribute('cy',y); ring.setAttribute('r',size);
        ring.setAttribute('fill','none'); ring.setAttribute('stroke',col); ring.setAttribute('stroke-width',1.5);
        ring.style.transformOrigin=`${x}px ${y}px`;
        ring.style.animation=`pulseR 2.4s ease-out ${i*0.3}s infinite`;
        g.appendChild(ring);
      }
      if(p.corro){ // 说做互证: double glow ring blue+violet
        const cr=document.createElementNS(NS,'circle');
        cr.setAttribute('cx',x); cr.setAttribute('cy',y); cr.setAttribute('r',size+5);
        cr.setAttribute('fill','none'); cr.setAttribute('stroke',C.violet); cr.setAttribute('stroke-width',1.6); cr.setAttribute('stroke-opacity',.8);
        g.appendChild(cr);
      }
      const halo=document.createElementNS(NS,'circle');
      halo.setAttribute('cx',x); halo.setAttribute('cy',y); halo.setAttribute('r',size);
      halo.setAttribute('fill',col); halo.setAttribute('fill-opacity','0.22');
      g.appendChild(halo);
      const core=document.createElementNS(NS,'circle');
      core.setAttribute('class','blip-core');
      core.setAttribute('cx',x); core.setAttribute('cy',y); core.setAttribute('r',size*0.42);
      core.setAttribute('fill',col);
      g.appendChild(core);

      g.addEventListener('click',()=>{
        const row=document.querySelector(`.pain[data-id="${p.id}"]`);
        if(row){ row.scrollIntoView({behavior:'smooth',block:'center'}); row.classList.add('flash'); setTimeout(()=>row.classList.remove('flash'),1400); }
      });
      radar.appendChild(g);
    });
    // center dot
    const cd=document.createElementNS(NS,'circle');
    cd.setAttribute('cx',cx); cd.setAttribute('cy',cy); cd.setAttribute('r',3); cd.setAttribute('fill',C.teal);
    radar.appendChild(cd);
  }

  // ---------- GAUGE ----------
  function buildGauge(){
    const g=document.getElementById('gauge');
    const gcx=120, gcy=130, R=100;
    const start=Math.PI, end=0; // semicircle
    function pt(ang){ return {x:gcx+Math.cos(ang)*R, y:gcy+Math.sin(ang)*R}; }
    const p0=pt(start), p1=pt(end);
    const bg=document.createElementNS(NS,'path');
    bg.setAttribute('d',`M${p0.x} ${p0.y} A${R} ${R} 0 0 1 ${p1.x} ${p1.y}`);
    bg.setAttribute('fill','none'); bg.setAttribute('stroke','rgba(255,255,255,0.08)'); bg.setAttribute('stroke-width','14'); bg.setAttribute('stroke-linecap','round');
    g.appendChild(bg);
    const defs=document.createElementNS(NS,'defs');
    defs.innerHTML=`<linearGradient id="gg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="${C.green}"/><stop offset="0.5" stop-color="${C.amber}"/><stop offset="1" stop-color="${C.red}"/></linearGradient>`;
    g.appendChild(defs);
    const val=document.createElementNS(NS,'path');
    val.setAttribute('d',`M${p0.x} ${p0.y} A${R} ${R} 0 0 1 ${p1.x} ${p1.y}`);
    val.setAttribute('fill','none'); val.setAttribute('stroke','url(#gg)'); val.setAttribute('stroke-width','14'); val.setAttribute('stroke-linecap','round');
    const len=Math.PI*R;
    val.style.strokeDasharray=len; val.style.strokeDashoffset=len;
    val.style.transition='stroke-dashoffset 1.4s cubic-bezier(.2,.8,.2,1) .2s';
    g.appendChild(val);
    // number text (foreignObject for styled div)
    const fo=document.createElementNS(NS,'foreignObject');
    fo.setAttribute('x',0); fo.setAttribute('y',58); fo.setAttribute('width',240); fo.setAttribute('height',70);
    fo.innerHTML=`<div xmlns="http://www.w3.org/1999/xhtml" style="text-align:center"><div class="gauge-num" id="gnum" style="color:${C.amber}">0</div><div style="font-size:11px;color:rgba(236,236,239,0.4);margin-top:2px">满分 100 · 越低越健康</div></div>`;
    g.appendChild(fo);
    // animate
    const target=72;
    requestAnimationFrame(()=>{ val.style.strokeDashoffset=len*(1-target/100); });
    const gnum=document.getElementById('gnum');
    const t0=performance.now();
    (function tick(now){
      const pr=Math.min(1,(now-t0)/1400);
      const v=Math.round((1-Math.pow(1-pr,3))*target);
      gnum.textContent=v;
      gnum.style.color = v<40?C.green:v<70?'#fb923c':C.red;
      if(pr<1) requestAnimationFrame(tick);
    })(t0);
  }

  // ---------- list ----------
  const F={ src:'all', dim:'all' };
  function scoreRing(score,col){
    const R=22, len=2*Math.PI*R, pct=Math.min(1,score/1000);
    return `<div class="score-ring"><svg width="52" height="52" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="${R}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="4"/>
      <circle cx="26" cy="26" r="${R}" fill="none" stroke="${col}" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="${len}" stroke-dashoffset="${len*(1-pct)}"/></svg>
      <div class="sn" style="color:${col}">${score}</div></div>`;
  }
  function statusEl(p){
    if(p.status==='todo') return `<span class="status s-todo">待处理</span>`;
    if(p.status==='defect') return `<span class="status s-defect">${p.statusInfo}</span>`;
    if(p.status==='fixing') return `<span class="status s-fixing">${p.statusInfo||'修复中'}</span>`;
    return `<span class="status s-fixed">已修复</span>`;
  }
  function actsEl(p){
    if(p.status==='todo') return `<div class="acts"><button class="primary">转为缺陷</button><button>指派</button><button>忽略</button></div>`;
    return `<div class="acts"><button>查看缺陷</button><button>标记修复</button></div>`;
  }
  const trendTxt={ up:'仍在上涨', down:'已回落', flat:'持平' };
  function renderList(){
    let list=PAINS.filter(p=>{
      if(F.src!=='all' && p.src!==F.src && p.src2!==F.src) return false;
      if(F.dim!=='all' && p.dim!==F.dim) return false;
      return true;
    }).sort((a,b)=>b.score-a.score);
    document.getElementById('cnt').textContent=`共 ${list.length} 条`;
    document.getElementById('painList').innerHTML=list.map(p=>`
      <div class="pain ${p.sev}${p.corro?' corro':''}" data-id="${p.id}">
        ${scoreRing(p.score, p.sev==='hot'?C.red:C.amber)}
        <div class="pmain">
          <div class="prow1">
            <span class="ptitle">${p.title}</span>
            ${p.corro?`<span class="badge b-corro">说做互证</span>`:''}
            <span class="badge ${p.src==='user'?'b-user':'b-behavior'}">${p.src==='user'?'用户之声':'行为之声'}</span>
            <span class="badge ${CH_CLASS[p.channel]}">${CH_LABEL[p.channel]}</span>
          </div>
          <div class="psub">${p.sub}</div>
          <div class="pmeta">${p.meta} · <b>${p.people}</b> 人受影响</div>
        </div>
        <div class="ptrend">${spark(p.spark, p.trend==='up'?C.red:p.trend==='down'?C.green:'#7a7a82')}
          <span class="tl ${p.trend}">${p.trend==='up'?'▲':p.trend==='down'?'▼':'—'} ${trendTxt[p.trend]}</span></div>
        <div class="pright">${statusEl(p)}${actsEl(p)}</div>
      </div>`).join('');
  }
  function renderLoop(){
    document.getElementById('loop').innerHTML=CLOSED.map(c=>`
      <div class="loop-item">
        <div><div class="lt">${c.title}</div><div class="ls">${c.detail}</div></div>
        <div class="ba"><span class="b-before">${c.before}</span><span class="arrow">→</span><span class="b-after">${c.after}</span><span class="drop">${c.drop}</span></div>
      </div>`).join('');
  }
  function renderKpis(){
    document.getElementById('mkOpen').textContent=PAINS.filter(p=>p.status==='todo').length;
    document.getElementById('mkClosed').textContent=CLOSED.length;
    document.getElementById('mkUsers').textContent=PAINS.reduce((s,p)=>s+p.people,0);
  }

  document.getElementById('filters').addEventListener('click',e=>{
    const c=e.target.closest('.chip'); if(!c) return;
    F[c.dataset.f]=c.dataset.v;
    document.querySelectorAll(`.chip[data-f="${c.dataset.f}"]`).forEach(x=>x.classList.toggle('active',x===c));
    renderList();
  });

  buildRadar(); buildGauge(); renderKpis(); renderList(); renderLoop();
})();
</script>
</body>
</html>
