version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: prdagent-mongodb
    ports:
      - "18081:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: prdagent
    networks:
      - prdagent-network

  redis:
    image: redis:7-alpine
    container_name: prdagent-redis
    ports:
      - "18082:6379"
    volumes:
      - redis_data:/data
    networks:
      - prdagent-network

  web:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: prdagent-web:dev
    container_name: prdagent-web
    ports:
      - "5500:80"
    depends_on:
      - api
    networks:
      - prdagent-network

  api:
    build:
      context: ./prd-api
      dockerfile: Dockerfile
    image: prdagent-api:dev
    container_name: prdagent-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__DatabaseName=prdagent
      - Redis__ConnectionString=redis:6379
      - Jwt__Secret=${JWT_SECRET:-YourSuperSecretKeyForJwtTokenGeneration2024!}
      - Jwt__Issuer=prdagent
      - Session__TimeoutMinutes=30
      # 资产存储：tencentCos / cloudflareR2
      # - 强制”绝不落盘”时：选择对象存储 provider
      - ASSETS_PROVIDER=${ASSETS_PROVIDER:-tencentCos}
      # Tencent COS（密钥禁止写死到仓库；本机调试请在环境变量中注入）
      - TENCENT_COS_BUCKET=${TENCENT_COS_BUCKET}
      - TENCENT_COS_REGION=${TENCENT_COS_REGION}
      - TENCENT_COS_SECRET_ID=${TENCENT_COS_SECRET_ID}
      - TENCENT_COS_SECRET_KEY=${TENCENT_COS_SECRET_KEY}
      - TENCENT_COS_PUBLIC_BASE_URL=${TENCENT_COS_PUBLIC_BASE_URL}
      - TENCENT_COS_PREFIX=${TENCENT_COS_PREFIX:-data}
      # Cloudflare R2（与 Tencent COS 二选一，由 ASSETS_PROVIDER 决定）
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL:-}
      - R2_PREFIX=${R2_PREFIX:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      # Webhook 通知中「查看详情」链接的前端基地址
      - App__FrontendBaseUrl=${FRONTEND_BASE_URL:-http://localhost:5500}
      # GitHub OAuth Device Flow（PR Review Agent 使用）
      # 与生产 docker-compose.yml 保持一致：宿主机 export 或写入同目录 .env 即可。
      - GitHubOAuth__ClientId=${GitHubOAuth__ClientId:-}
      - GitHubOAuth__ClientSecret=${GitHubOAuth__ClientSecret:-}
      - GitHubOAuth__Scopes=${GitHubOAuth__Scopes:-}
    # 重要：此 API 容器建议只读，避免任何本地落盘（你这种”可写层 1MB”环境必开）
    read_only: true
    # 允许少量临时写入到内存（tmpfs），避免 .NET/HTTP 栈因无 /tmp 可写而异常；不会落到磁盘
    tmpfs:
      - /tmp
    volumes:
      # ffmpeg 静态编译版（转录工作台 ASR 音频格式转换 + 知识库字幕生成用）
      # 与生产 docker-compose.yml 保持一致
      - ${FFMPEG_PATH:-/opt/ffmpeg-static/ffmpeg}:/usr/local/bin/ffmpeg:ro
      - ${FFPROBE_PATH:-/opt/ffmpeg-static/ffprobe}:/usr/local/bin/ffprobe:ro
    depends_on:
      - mongodb
      - redis
    networks:
      - prdagent-network

volumes:
  mongodb_data:
  redis_data:

networks:
  prdagent-network:
    driver: bridge


