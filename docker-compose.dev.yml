version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: prdagent-mongodb
    ports:
      - "18081:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: prdagent
    networks:
      - prdagent-network

  redis:
    image: redis:7-alpine
    container_name: prdagent-redis
    ports:
      - "18082:6379"
    volumes:
      - redis_data:/data
    networks:
      - prdagent-network

  web:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: prdagent-web:dev
    container_name: prdagent-web
    ports:
      - "5500:80"
    depends_on:
      - api
    networks:
      - prdagent-network

  claude-sidecar:
    build:
      context: ./claude-sdk-sidecar
      dockerfile: Dockerfile
    image: prdagent-claude-sidecar:dev
    container_name: prdagent-claude-sidecar
    # 默认不暴露端口到宿主，仅 compose 内网访问；本地需要 curl 调试时再打开 7400:7400
    expose:
      - "7400"
    environment:
      # 没有 ANTHROPIC_API_KEY 时容器仍会启动，但 /readyz 返回 503，prd-api 路由器探不通
      # 自动跳过 claude-sdk 执行器。所以"零配置启动"是安全的。
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # 上游切换：如果想全局走 DeepSeek / Kimi / GLM / cc-switch，设这个 env 即可。
      # per-node 切换可在节点 JSON 写 baseUrl/apiKey/profile（详见 doc/guide.claude-sdk-quickstart.md）
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      # 多上游 profile 文件路径（容器内）；映射到宿主的 profiles.yaml（gitignored）
      - PROFILES_PATH=/app/profiles.yaml
      # 把宿主额外的供应商 key 透传，profile yaml 的 ${VAR} 占位符就能替换
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - CC_SWITCH_TOKEN=${CC_SWITCH_TOKEN:-}
      - SIDECAR_TOKEN=${CLAUDE_SIDECAR_TOKEN:-dev-skip}
      - SIDECAR_VERSION=dev
      - SIDECAR_LOG_LEVEL=${CLAUDE_SIDECAR_LOG_LEVEL:-INFO}
    # 想用命名 profile（cc-switch 风格切换上游）：
    #   1. cp claude-sdk-sidecar/profiles.example.yaml claude-sdk-sidecar/profiles.yaml
    #   2. 编辑 profiles.yaml 填上真实上游
    #   3. 取消下面 volumes 注释，重启 docker compose
    # volumes:
    #   - ./claude-sdk-sidecar/profiles.yaml:/app/profiles.yaml:ro
    # cc-switch 跑在宿主机时需要靠 host.docker.internal 回到宿主；linux 默认无此别名，显式映射
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - prdagent-network

  api:
    build:
      context: ./prd-api
      dockerfile: Dockerfile
    image: prdagent-api:dev
    container_name: prdagent-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # claude-sdk 零配置自启：只要 ANTHROPIC_API_KEY 非空，prd-api 启动时
      # PostConfigure 会自动注入 default sidecar + 打开 Enabled。
      # 这里把 ANTHROPIC_API_KEY 透传到 prd-api 进程是触发自动注入的开关。
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_SIDECAR_TOKEN=${CLAUDE_SIDECAR_TOKEN:-dev-skip}
      - CLAUDE_SIDECAR_BASE_URL=http://claude-sidecar:7400
      - ClaudeSdkExecutor__CallbackBaseUrl=http://api:8080
      - MongoDB__ConnectionString=mongodb://mongodb:27017
      - MongoDB__DatabaseName=prdagent
      - Redis__ConnectionString=redis:6379
      - Jwt__Secret=${JWT_SECRET:-YourSuperSecretKeyForJwtTokenGeneration2024!}
      - Jwt__Issuer=prdagent
      - Session__TimeoutMinutes=30
      # 资产存储：tencentCos / cloudflareR2
      # - 强制”绝不落盘”时：选择对象存储 provider
      - ASSETS_PROVIDER=${ASSETS_PROVIDER:-tencentCos}
      # Tencent COS（密钥禁止写死到仓库；本机调试请在环境变量中注入）
      - TENCENT_COS_BUCKET=${TENCENT_COS_BUCKET}
      - TENCENT_COS_REGION=${TENCENT_COS_REGION}
      - TENCENT_COS_SECRET_ID=${TENCENT_COS_SECRET_ID}
      - TENCENT_COS_SECRET_KEY=${TENCENT_COS_SECRET_KEY}
      - TENCENT_COS_PUBLIC_BASE_URL=${TENCENT_COS_PUBLIC_BASE_URL}
      - TENCENT_COS_PREFIX=${TENCENT_COS_PREFIX:-data}
      # Cloudflare R2（与 Tencent COS 二选一，由 ASSETS_PROVIDER 决定）
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL:-}
      - R2_PREFIX=${R2_PREFIX:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      # Webhook 通知中「查看详情」链接的前端基地址
      - App__FrontendBaseUrl=${FRONTEND_BASE_URL:-http://localhost:5500}
      # GitHub OAuth Device Flow（PR Review Agent 使用）
      # 与生产 docker-compose.yml 保持一致：宿主机 export 或写入同目录 .env 即可。
      - GitHubOAuth__ClientId=${GitHubOAuth__ClientId:-}
      - GitHubOAuth__ClientSecret=${GitHubOAuth__ClientSecret:-}
      - GitHubOAuth__Scopes=${GitHubOAuth__Scopes:-}
      # OpenRouter 视频生成 API（Seedance / Wan / Veo / Sora 统一入口）
      - OpenRouter__ApiKey=${OPENROUTER_API_KEY:-}
      - OpenRouter__BaseUrl=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      # 视频生成：纯 OpenRouter 直出（2026-04-27 砍掉 Remotion 拆分镜）
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # ffmpeg 静态编译版（转录工作台 ASR 音频格式转换 + 知识库字幕生成用）
      - ${FFMPEG_PATH:-/opt/ffmpeg-static/ffmpeg}:/usr/local/bin/ffmpeg:ro
      - ${FFPROBE_PATH:-/opt/ffmpeg-static/ffprobe}:/usr/local/bin/ffprobe:ro
    depends_on:
      - mongodb
      - redis
    networks:
      - prdagent-network

volumes:
  mongodb_data:
  redis_data:

networks:
  prdagent-network:
    driver: bridge


