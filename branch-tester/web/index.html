<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Branch Tester</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>Branch Tester</h1>
        <span class="header-subtitle" id="branchCount"></span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleDomainSettings()" title="域名配置">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 0113 0h-2.1a8.3 8.3 0 00-.4-2.2 9 9 0 00-1-1.9A4.5 4.5 0 017 7.5H4.5A8.3 8.3 0 001.5 8zm5.5 5.5a6.5 6.5 0 01-5.4-3h2.3c.3 1.2.8 2.2 1.5 3H7zm1-5.5a7.8 7.8 0 014-3.8c.5.6.9 1.2 1.2 1.8H8zm0 1h5.4a8.3 8.3 0 01-.3 2H8.9 8V9zm0 3h3.8c-.6 1.3-1.5 2.4-2.8 3A6.5 6.5 0 018 9z"/></svg>
        </button>
        <button id="cleanupBtn" class="icon-btn danger-icon" onclick="cleanupAll()" disabled title="没有可清理的分支">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6.5 1.75a.25.25 0 01.25-.25h2.5a.25.25 0 01.25.25V3h-3V1.75zM11 3V1.75A1.75 1.75 0 009.25 0h-2.5A1.75 1.75 0 005 1.75V3H2.75a.75.75 0 000 1.5h.3l.8 8.2A1.75 1.75 0 005.6 14.5h4.8a1.75 1.75 0 001.75-1.8l.8-8.2h.3a.75.75 0 000-1.5H11z"/></svg>
        </button>
      </div>
    </header>

    <!-- Gateway bar -->
    <div class="gateway-bar">
      <div class="gateway-left">
        <span class="gateway-dot" id="gatewayDot"></span>
        <span class="gateway-label">Gateway :5500</span>
      </div>
      <div class="gateway-right">
        <select id="activeSwitcher" disabled>
          <option value="">未连接</option>
        </select>
        <a id="activeLink" href="#" target="_blank" class="gateway-open hidden">打开</a>
        <button class="icon-btn sm" onclick="viewNginxConfig()" title="查看 Nginx 配置">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0114.25 16H1.75A1.75 1.75 0 010 14.25V1.75zM1.5 6v8.25c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V6h-13zm13-1.5V1.75a.25.25 0 00-.25-.25H1.75a.25.25 0 00-.25.25V4.5h13z"/></svg>
        </button>
      </div>
    </div>

    <!-- Domain settings panel (collapsible) -->
    <div id="domainSettings" class="domain-settings hidden">
      <div class="domain-settings-header">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zM1.5 8a6.5 6.5 0 0113 0h-2.1a8.3 8.3 0 00-.4-2.2 9 9 0 00-1-1.9A4.5 4.5 0 017 7.5H4.5A8.3 8.3 0 001.5 8zm5.5 5.5a6.5 6.5 0 01-5.4-3h2.3c.3 1.2.8 2.2 1.5 3H7zm1-5.5a7.8 7.8 0 014-3.8c.5.6.9 1.2 1.2 1.8H8zm0 1h5.4a8.3 8.3 0 01-.3 2H8.9 8V9zm0 3h3.8c-.6 1.3-1.5 2.4-2.8 3A6.5 6.5 0 018 9z"/></svg>
        <span>泛域名预览</span>
      </div>
      <p class="domain-settings-desc">配置泛域名后，分支可通过 <code>{分支名}.{域名}</code> 直接访问。需配合 DNS 泛解析。</p>
      <div class="domain-input-row">
        <input id="domainInput" type="text" placeholder="例如: miduo.org" autocomplete="off">
        <button onclick="saveDomain()" class="primary sm">保存</button>
      </div>
      <div id="domainPreview" class="domain-preview"></div>
    </div>

    <!-- Branch picker -->
    <section class="branch-picker-section">
      <div class="branch-picker">
        <div class="branch-picker-input-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 7a4.499 4.499 0 11-8.998 0A4.499 4.499 0 0111.5 7zm-.82 4.74a6 6 0 111.06-1.06l3.04 3.04a.75.75 0 11-1.06 1.06l-3.04-3.04z"/></svg>
          <input id="branchSearch" type="text" placeholder="搜索远程分支..." autocomplete="off">
          <button id="refreshRemoteBtn" class="icon-btn sm" onclick="refreshRemoteBranches()" title="刷新远程分支">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2.5a5.487 5.487 0 00-4.131 1.869l1.204 1.204A.25.25 0 014.896 6H1.25A.25.25 0 011 5.75V2.104a.25.25 0 01.427-.177l1.38 1.38A7.002 7.002 0 0115 8a.75.75 0 01-1.5 0A5.5 5.5 0 008 2.5zM2.5 8a.75.75 0 00-1.5 0 7.002 7.002 0 0012.023 4.87l1.38 1.38a.25.25 0 00.427-.177V10.5a.25.25 0 00-.25-.25h-3.646a.25.25 0 00-.177.427l1.204 1.204A5.5 5.5 0 012.5 8z"/></svg>
          </button>
        </div>
        <div id="branchDropdown" class="branch-dropdown hidden"></div>
      </div>
    </section>

    <!-- Legend -->
    <section class="legend-bar">
      <span class="legend-item"><span class="legend-dot run-dot"></span> 运行</span>
      <span class="legend-item"><span class="legend-dot deploy-dot"></span> 部署</span>
      <span class="legend-item"><span class="legend-dot preview-dot"></span> 预览</span>
    </section>

    <!-- Branch list -->
    <section id="branchList" class="branch-list">
      <div class="empty-state">暂无分支，请从搜索框添加</div>
    </section>

    <!-- History -->
    <section class="history-section">
      <div class="history-header">
        <h2>切换历史</h2>
        <button id="rollbackBtn" onclick="doRollback()" disabled class="sm">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-1px"><path d="M2.5 8a.75.75 0 00-1.5 0 7.002 7.002 0 0012.023 4.87l1.38 1.38a.25.25 0 00.427-.177V10.5a.25.25 0 00-.25-.25h-3.646a.25.25 0 00-.177.427l1.204 1.204A5.5 5.5 0 012.5 8z"/></svg>
          回滚
        </button>
      </div>
      <div id="historyList" class="history-list">-</div>
    </section>

    <div id="toast" class="toast hidden"></div>
  </div>

  <!-- Unified log modal -->
  <div id="logModal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeLogModal()"></div>
    <div class="modal-dialog">
      <div class="modal-header">
        <h2 id="logModalTitle">操作日志</h2>
        <div class="log-tabs hidden" id="logTabs">
          <button class="log-tab active" data-tab="live" onclick="switchLogTab('live')">实时</button>
          <button class="log-tab" data-tab="history" onclick="switchLogTab('history')">历史</button>
        </div>
        <button class="modal-close" onclick="closeLogModal()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
        </button>
      </div>
      <div id="logModalBody" class="modal-body"></div>
    </div>
  </div>

  <!-- Branch action sheet (mobile) -->
  <div id="actionSheet" class="action-sheet hidden">
    <div class="action-sheet-backdrop" onclick="closeActionSheet()"></div>
    <div class="action-sheet-content">
      <div class="action-sheet-header">
        <h3 id="actionSheetTitle">操作</h3>
        <button class="modal-close" onclick="closeActionSheet()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
        </button>
      </div>
      <div id="actionSheetBody" class="action-sheet-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
