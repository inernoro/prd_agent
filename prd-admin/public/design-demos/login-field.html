<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAP · 白昼流体 — 未登录页 Demo D</title>
<style>
  :root {
    --bg: #f4f4f8;
    --ink: #17171c;
    --ink-2: rgba(23,23,28,0.66);
    --ink-3: rgba(23,23,28,0.42);
    --line: rgba(23,23,28,0.10);
    --indigo: #5b5bf0;
    --font-d: "Space Grotesk", "Avenir Next", "Helvetica Neue", "PingFang SC", "HarmonyOS Sans SC", sans-serif;
    --font-b: -apple-system, "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", sans-serif;
    --font-m: "SF Mono", "JetBrains Mono", Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--ink); font-family: var(--font-b);
    -webkit-font-smoothing: antialiased; overflow: hidden;
  }

  /* ══ 流体色场 ══ */
  .field { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
  .blob {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.65;
    animation: float 22s ease-in-out infinite alternate;
  }
  .blob.b1 { width: 54vw; height: 54vw; left: -16vw; top: -22vw;
    background: radial-gradient(circle at 40% 40%, #c7d2fe, #818cf8 55%, transparent 75%); }
  .blob.b2 { width: 46vw; height: 46vw; right: -14vw; top: -8vw;
    background: radial-gradient(circle at 60% 40%, #fbcfe8, #f0abfc 55%, transparent 75%);
    animation-delay: -7s; animation-duration: 28s; }
  .blob.b3 { width: 42vw; height: 42vw; left: 18vw; bottom: -22vw;
    background: radial-gradient(circle at 50% 50%, #a5f3fc, #67e8f9 50%, transparent 75%);
    animation-delay: -14s; animation-duration: 26s; opacity: 0.5; }
  .blob.b4 { width: 30vw; height: 30vw; right: 6vw; bottom: -10vw;
    background: radial-gradient(circle at 50% 50%, #fde68a, #fcd34d 45%, transparent 75%);
    animation-delay: -4s; animation-duration: 32s; opacity: 0.4; }
  @keyframes float {
    from { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
    to   { transform: translate3d(5vw, 4vh, 0) scale(1.14) rotate(10deg); }
  }
  /* 磨砂罩：把色块统一进奶白雾里 */
  .frost { position: fixed; inset: 0; z-index: 0; backdrop-filter: blur(34px) saturate(1.25); background: rgba(248,248,251,0.28); }
  .grain { position: fixed; inset: 0; z-index: 0; opacity: 0.05; mix-blend-mode: multiply; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
    background-size: 170px; }

  /* 背景巨字 */
  .giant {
    position: fixed; left: 50%; bottom: -4vw; transform: translateX(-50%);
    font-family: var(--font-d); font-weight: 700; letter-spacing: 0.06em;
    font-size: 30vw; line-height: 0.8; z-index: 0; pointer-events: none; user-select: none;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(23,23,28,0.10);
  }

  /* ══ 前景 ══ */
  .stage {
    position: relative; z-index: 1; height: 100vh;
    display: grid; grid-template-rows: auto 1fr auto;
  }

  .nav {
    display: flex; align-items: center; gap: 30px;
    padding: 26px 46px;
  }
  .nav .brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-d); font-weight: 700; font-size: 15px; letter-spacing: 0.14em; }
  .nav .brand i {
    width: 24px; height: 24px; border-radius: 8px; font-style: normal;
    background: linear-gradient(135deg, #6366f1, #d946ef);
    box-shadow: 0 4px 16px rgba(99,102,241,0.35);
  }
  .nav .links { margin-left: auto; display: flex; gap: 4px; }
  .nav .links a {
    color: var(--ink-2); text-decoration: none; font-size: 13px;
    padding: 8px 14px; border-radius: 99px; transition: all 0.2s;
  }
  .nav .links a:hover { background: rgba(23,23,28,0.06); color: var(--ink); }
  @media (max-width: 720px) { .nav { padding: 20px 22px; } .nav .links { display: none; } }

  .center {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 0 24px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--ink-2);
    border: 1px solid var(--line); border-radius: 99px; padding: 7px 16px;
    background: rgba(255,255,255,0.55); backdrop-filter: blur(10px);
    animation: up 0.7s cubic-bezier(0.22,1,0.36,1) backwards 0.05s;
  }
  .badge i { width: 6px; height: 6px; border-radius: 50%; background: #34d399; font-style: normal; }
  h1 {
    margin-top: 26px;
    font-family: var(--font-d); font-weight: 600;
    font-size: clamp(38px, 6vw, 76px); line-height: 1.08; letter-spacing: -0.025em;
    animation: up 0.7s cubic-bezier(0.22,1,0.36,1) backwards 0.14s;
  }
  h1 .soft {
    background: linear-gradient(100deg, #6366f1, #c026d3 55%, #0891b2);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .lede {
    margin-top: 20px; font-size: 15.5px; color: var(--ink-2); line-height: 1.85; max-width: 34em;
    animation: up 0.7s cubic-bezier(0.22,1,0.36,1) backwards 0.22s;
  }

  /* 登录胶囊 */
  .cap-form {
    margin-top: 40px; width: min(520px, 92vw);
    animation: up 0.7s cubic-bezier(0.22,1,0.36,1) backwards 0.3s;
  }
  .cap-shell {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.72); backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 99px; padding: 7px 7px 7px 22px;
    box-shadow: 0 22px 60px rgba(23,23,28,0.13), inset 0 1px 0 rgba(255,255,255,0.9);
    transition: box-shadow 0.25s, transform 0.25s;
  }
  .cap-shell:focus-within { transform: translateY(-2px); box-shadow: 0 30px 74px rgba(91,91,240,0.20), inset 0 1px 0 rgba(255,255,255,0.9); }
  .cap-shell input {
    flex: 1; min-width: 0; border: none; outline: none; background: none;
    font-size: 14.5px; font-family: var(--font-b); color: var(--ink); height: 44px;
  }
  .cap-shell input::placeholder { color: var(--ink-3); }
  .cap-shell .div { width: 1px; height: 26px; background: var(--line); }
  .cap-shell button {
    flex-shrink: 0; height: 44px; padding: 0 26px; border: none; border-radius: 99px;
    font-size: 14px; font-weight: 650; color: #fff; cursor: pointer; font-family: var(--font-b);
    background: linear-gradient(120deg, #6366f1, #a855f7);
    box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .cap-shell button:hover { transform: scale(1.03); box-shadow: 0 12px 32px rgba(99,102,241,0.55); }
  .cap-meta {
    display: flex; justify-content: center; gap: 26px; margin-top: 18px; font-size: 12.5px;
  }
  .cap-meta a { color: var(--ink-3); text-decoration: none; transition: color 0.2s; }
  .cap-meta a:hover { color: var(--indigo); }

  /* 底部智能体薄橱窗 */
  .shelf {
    display: flex; justify-content: center; gap: 12px; padding: 0 24px 30px; flex-wrap: wrap;
    animation: up 0.7s cubic-bezier(0.22,1,0.36,1) backwards 0.42s;
  }
  .s-chip {
    display: flex; align-items: center; gap: 9px;
    background: rgba(255,255,255,0.6); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.85); border-radius: 14px;
    padding: 9px 16px; font-size: 12.5px; color: var(--ink-2); cursor: pointer;
    box-shadow: 0 8px 22px rgba(23,23,28,0.07);
    transition: transform 0.2s, box-shadow 0.2s, color 0.2s;
  }
  .s-chip:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(23,23,28,0.12); color: var(--ink); }
  .s-chip svg { color: var(--hue, var(--indigo)); }

  @keyframes up { from { opacity: 0; transform: translateY(18px);} to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  @media (max-height: 620px) { .giant { display: none; } }
</style>
</head>
<body>

<div class="field">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div>
</div>
<div class="frost"></div>
<div class="grain"></div>
<div class="giant">MAP</div>

<div class="stage">

  <nav class="nav">
    <div class="brand"><i></i>MAP</div>
    <div class="links">
      <a href="#">智能体</a><a href="#">作品广场</a><a href="#">海鲜市场</a><a href="#">桌面版</a><a href="#">文档</a>
    </div>
  </nav>

  <main class="center">
    <span class="badge"><i></i>14 位智能体在线 · 模型池 6/6 正常</span>
    <h1>想法进来，<br><span class="soft">作品出去。</span></h1>
    <p class="lede">
      MAP 是米多的智能体平台——画图、写作、修缺陷、剪视频、写周报，
      每件重复的事都有专人代劳。你只需要说清楚要什么。
    </p>

    <form class="cap-form" onsubmit="return false">
      <div class="cap-shell">
        <input placeholder="用户名或邮箱" autocomplete="username">
        <span class="div"></span>
        <input type="password" placeholder="密码" autocomplete="current-password" style="max-width:130px">
        <button>进入</button>
      </div>
      <div class="cap-meta">
        <a href="#">忘记密码</a>
        <a href="#">邀请码注册</a>
        <a href="#">先逛逛作品广场</a>
      </div>
    </form>
  </main>

  <footer class="shelf">
    <span class="s-chip" style="--hue:#a855f7">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
      视觉创作
    </span>
    <span class="s-chip" style="--hue:#f43f5e">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
      文学创作
    </span>
    <span class="s-chip" style="--hue:#10b981">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="8" height="14" rx="4"/><path d="M19 7l-3 2M5 7l3 2M19 19l-3-2M5 19l3-2M12 20v2"/></svg>
      缺陷管理
    </span>
    <span class="s-chip" style="--hue:#0ea5e9">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="14" height="14" rx="3"/><path d="M22 8l-6 4 6 4V8z"/></svg>
      视频创作
    </span>
    <span class="s-chip" style="--hue:#f59e0b">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="10" width="3" height="7" rx="1"/><rect x="13" y="6" width="3" height="11" rx="1"/></svg>
      周报智能体
    </span>
    <span class="s-chip" style="--hue:#84cc16">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 009 9"/></svg>
      PR 审查
    </span>
    <span class="s-chip" style="--hue:#6366f1">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      全部 14 位
    </span>
  </footer>
</div>

</body>
</html>
