<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>团队动态 · 系统健康（热力树图 / 状态墙）</title>
<style>
  :root {
    --bg-primary:#0e0f10; --bg-card:#1a1b1d; --bg-card-2:#202123; --bg-elevated:#26282b;
    --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.13);
    --text-1:#ececef; --text-2:rgba(236,236,239,0.62); --text-3:rgba(236,236,239,0.40);
    --teal:#2dd4bf; --red:#f8717a; --amber:#fbbf24; --green:#34d399; --violet:#a78bfa;
    --shadow:0 8px 30px rgba(0,0,0,0.4);
    --ok-fill:rgba(52,211,153,0.10); --ok-line:rgba(52,211,153,0.30);
    --slow-fill:rgba(251,191,36,0.16); --slow-line:rgba(251,191,36,0.55);
    --err-fill:rgba(248,113,122,0.18); --err-line:rgba(248,113,122,0.65);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,rgba(167,139,250,0.06),transparent 60%),
      radial-gradient(900px 500px at -5% 10%,rgba(45,212,191,0.05),transparent 55%),var(--bg-primary);
    color:var(--text-1); padding:26px 30px 50px; min-height:100%; -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:1320px; margin:0 auto; }
  .page-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .page-head .titles { display:flex; align-items:baseline; gap:14px; }
  .page-head h1 { font-size:19px; font-weight:650; }
  .page-head .sub { font-size:12.5px; color:var(--text-3); }
  .seg { display:inline-flex; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:3px; gap:2px; }
  .seg button { border:0; background:transparent; color:var(--text-2); font-size:12.5px; padding:7px 16px; border-radius:7px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:all .18s; }
  .seg button.active { background:rgba(45,212,191,0.14); color:var(--teal); }

  .toolbar { display:flex; align-items:center; gap:14px; margin-bottom:14px; flex-wrap:wrap; }
  .scan-tag { font-size:12px; color:var(--text-2); display:inline-flex; align-items:center; gap:8px; }
  .scan-tag .blip { width:8px; height:8px; border-radius:50%; background:var(--teal); animation:blip 1.4s ease-in-out infinite; }
  @keyframes blip { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.3)} }
  .hint { font-size:12px; color:var(--text-3); }
  .legend { display:inline-flex; gap:16px; margin-left:auto; }
  .legend span { font-size:12px; color:var(--text-2); display:inline-flex; align-items:center; gap:7px; }
  .legend i { width:9px; height:9px; border-radius:3px; }

  .stage { background:linear-gradient(180deg,var(--bg-card),#161718); border:1px solid var(--border);
    border-radius:18px; box-shadow:var(--shadow); padding:14px; }

  /* ---------- TREEMAP ---------- */
  #treemap { display:flex; flex-direction:column; gap:8px; }
  .tm-layer { display:flex; gap:8px; }
  .tm-layer .layer-tag { writing-mode:vertical-rl; text-orientation:mixed; font-size:10px; letter-spacing:2px;
    color:var(--text-3); display:flex; align-items:center; justify-content:center; flex:0 0 18px; font-weight:600; }
  .tm-row { display:flex; gap:8px; flex:1; }
  .tm-cell { flex-basis:0; border-radius:12px; padding:12px 14px; cursor:pointer; position:relative;
    display:flex; flex-direction:column; justify-content:space-between; overflow:hidden;
    border:1px solid var(--ok-line); background:var(--ok-fill); transition:transform .15s, filter .15s, outline .15s;
    outline:2px solid transparent; outline-offset:-2px; min-width:0; }
  .tm-cell:hover { transform:translateY(-2px); filter:brightness(1.12); }
  .tm-cell.sel { outline-color:var(--violet); }
  .tm-cell.slow { border-color:var(--slow-line); background:var(--slow-fill); }
  .tm-cell.error { border-color:var(--err-line); background:var(--err-fill); }
  .tm-cell.error, .tm-cell.slow { animation:cellPulse 2.8s ease-in-out infinite; }
  @keyframes cellPulse { 0%,100%{ box-shadow:0 0 0 0 rgba(0,0,0,0) } 50%{ box-shadow:0 0 18px var(--glow) } }
  .tm-cell .c-name { font-size:13px; font-weight:650; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tm-cell .c-stat { font-size:11px; margin-top:3px; }
  .tm-cell.ok .c-stat { color:var(--text-3); }
  .tm-cell.slow .c-stat { color:var(--amber); }
  .tm-cell.error .c-stat { color:var(--red); }
  .tm-cell .c-vol { font-size:10.5px; color:var(--text-3); margin-top:6px; }
  .tm-cell .c-badge { position:absolute; top:8px; right:9px; min-width:20px; height:20px; border-radius:11px;
    padding:0 6px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#0e0f10; }

  /* ---------- STATUS WALL ---------- */
  #wall { display:none; flex-direction:column; gap:16px; }
  .wall-sec .sec-h { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .wall-sec .sec-h .t { font-size:12px; letter-spacing:1.5px; color:var(--text-3); font-weight:600; }
  .wall-sec .sec-h .ln { flex:1; height:1px; background:var(--border); }
  .wall-sec .sec-h .cnt { font-size:11px; color:var(--text-3); }
  .wall-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(196px,1fr)); gap:10px; }
  .wcard { background:var(--bg-card-2); border:1px solid var(--border); border-radius:13px; padding:13px 14px;
    cursor:pointer; position:relative; transition:transform .15s, border-color .15s; display:flex; flex-direction:column; gap:8px;
    outline:2px solid transparent; outline-offset:-2px; }
  .wcard:hover { transform:translateY(-2px); border-color:var(--border-strong); }
  .wcard.sel { outline-color:var(--violet); }
  .wcard .top { display:flex; align-items:center; gap:9px; }
  .wcard .ic { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); flex:0 0 auto; }
  .wcard .ic svg { width:16px; height:16px; }
  .wcard .nm { font-size:13px; font-weight:600; }
  .wcard .st { font-size:11px; }
  .wcard .dot { width:9px; height:9px; border-radius:50%; margin-left:auto; flex:0 0 auto; }
  .wcard .foot { display:flex; align-items:center; justify-content:space-between; }
  .wcard .big { font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; }
  .wcard .lbl2 { font-size:10.5px; color:var(--text-3); }
  .wcard.error { border-color:var(--err-line); background:linear-gradient(180deg,var(--err-fill),var(--bg-card-2)); animation:cellPulse 2.8s ease-in-out infinite; }
  .wcard.slow { border-color:var(--slow-line); background:linear-gradient(180deg,var(--slow-fill),var(--bg-card-2)); animation:cellPulse 2.8s ease-in-out infinite; }
  .wcard.ok .big { color:var(--green); }
  .wcard.error .big { color:var(--red); } .wcard.slow .big { color:var(--amber); }
  .wcard.error .st { color:var(--red); } .wcard.slow .st { color:var(--amber); } .wcard.ok .st { color:var(--text-3); }

  /* ---------- detail ---------- */
  .detail { margin-top:16px; background:linear-gradient(180deg,var(--bg-card),var(--bg-card-2));
    border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow); overflow:hidden; }
  .detail-head { display:flex; align-items:center; gap:12px; padding:16px 20px; border-bottom:1px solid var(--border); }
  .detail-head .dot-lg { width:11px; height:11px; border-radius:50%; flex:0 0 auto; }
  .detail-head h3 { font-size:15px; font-weight:650; }
  .detail-head .badge-pill { font-size:11.5px; padding:4px 10px; border-radius:7px; }
  .detail-head .spacer { flex:1; }
  .detail-head .ai-hint { font-size:12px; color:var(--text-3); max-width:560px; text-align:right; line-height:1.45; }
  .detail-body { padding:8px 12px 14px; }
  .sig { display:grid; grid-template-columns:4px 1fr auto; gap:14px; align-items:center; padding:12px 12px 12px 0; }
  .sig + .sig { border-top:1px solid var(--border); }
  .sig .rail { width:4px; height:38px; border-radius:4px; }
  .sig.err .rail { background:var(--red); } .sig.slow .rail { background:var(--amber); }
  .sig-row1 { display:flex; align-items:center; gap:9px; margin-bottom:4px; flex-wrap:wrap; }
  .tag { font-size:11px; padding:2px 8px; border-radius:6px; font-weight:600; }
  .tag.err { background:rgba(248,113,122,0.13); color:var(--red); } .tag.slow { background:rgba(251,191,36,0.13); color:var(--amber); }
  .ep { font-family:ui-monospace,Menlo,monospace; font-size:12.5px; color:var(--text-1); }
  .ep .m { color:var(--teal); }
  .sig-desc { font-size:12px; color:var(--text-2); line-height:1.4; }
  .sig-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
  .sig-stat { font-size:11.5px; color:var(--text-3); white-space:nowrap; } .sig-stat b { color:var(--text-1); }
  .sig-acts { display:flex; gap:6px; }
  .sig-acts button { font-size:11px; padding:4px 9px; border-radius:6px; cursor:pointer; border:1px solid var(--border); background:var(--bg-card-2); color:var(--text-2); transition:all .15s; }
  .sig-acts button.primary { background:rgba(251,191,36,0.13); border-color:rgba(251,191,36,0.35); color:var(--amber); }
  .sig-acts button:hover { color:var(--text-1); border-color:var(--border-strong); }
  .empty { padding:24px 16px; color:var(--text-3); font-size:13px; display:flex; align-items:center; gap:10px; }
  .empty .ok-dot { width:10px; height:10px; border-radius:50%; background:var(--green); box-shadow:0 0 0 4px rgba(52,211,153,0.15); }
</style>
</head>
<body>
<div class="wrap">

  <div class="page-head">
    <div class="titles">
      <h1>团队动态</h1>
      <span class="sub">系统健康 · 看颜色和面积，谁都看得懂</span>
    </div>
    <div class="seg" id="viewSeg">
      <button class="active" data-v="treemap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="9" height="11"/><rect x="13" y="3" width="8" height="6"/><rect x="13" y="10" width="8" height="11"/><rect x="3" y="15" width="9" height="6"/></svg>
        热力树图
      </button>
      <button data-v="wall">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        状态墙
      </button>
    </div>
  </div>

  <div class="toolbar">
    <span class="scan-tag"><span class="blip"></span>实时扫描 · 本月 817 条信号</span>
    <span class="hint" id="modeHint">面积 = 访问量，颜色 = 健康。哪块大又红，就是最该看的地方。</span>
    <div class="legend">
      <span><i style="background:var(--green)"></i>健康</span>
      <span><i style="background:var(--amber)"></i>等待过久</span>
      <span><i style="background:var(--red)"></i>频繁报错</span>
    </div>
  </div>

  <div class="stage">
    <div id="treemap"></div>
    <div id="wall"></div>
  </div>

  <div class="detail">
    <div class="detail-head" id="dHead"></div>
    <div class="detail-body" id="dBody"></div>
  </div>

</div>

<script>
(function(){
  const css=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  const C={ ok:css('--green'), slow:css('--amber'), error:css('--red') };
  const ICONS={
    web:'M3 5h18v12H3zM3 17l4 2h10l4-2', desktop:'M4 4h16v11H4zM9 19h6M12 15v4',
    image:'M4 5h16v14H4zM8 11l3 3 5-6', book:'M5 4h11a3 3 0 013 3v13H8a3 3 0 01-3-3z',
    bug:'M9 7h6M8 11h8M9 15h6M12 5v2M6 11H4M20 11h-2', poster:'M6 3h12v18l-6-3-6 3z',
    kb:'M6 4h9l3 3v13H6zM9 12h6M9 16h4', pages:'M3 5h18v14H3zM3 9h18',
    news:'M4 5h12v14H4zM7 9h6M7 12h6M16 8h4v9a2 2 0 01-2 2', changelog:'M12 7v5l3 2M12 3a9 9 0 100 18 9 9 0 000-18',
    channel:'M3 12h4l3-7 4 14 3-7h4', api:'M8 5l-4 7 4 7M16 5l4 7-4 7',
    gateway:'M4 9h16v9H4zM8 9V6a4 4 0 018 0v3', pool:'M4 8c0-2 4-3 8-3s8 1 8 3-4 3-8 3-8-1-8-3zM4 8v8c0 2 4 3 8 3s8-1 8-3V8',
    worker:'M12 9v6M9 12h6M12 3a9 9 0 100 18 9 9 0 000-18', rbac:'M12 3l8 4v5c0 5-4 8-8 9-4-1-8-4-8-9V7z',
    mongo:'M12 3c3 4 4 8 0 18-4-10-3-14 0-18z', redis:'M4 7l8-3 8 3-8 3zM4 12l8 3 8-3M4 17l8 3 8-3',
    cds:'M6 16a4 4 0 010-8 5 5 0 019-1 4 4 0 011 9z'
  };

  // module data (vol = 访问量, drives treemap size)
  const LAYERS=[
    { key:'entry', label:'用户入口', mods:[
      { id:'web', name:'Web 管理后台', icon:'web', st:'ok', vol:2200 },
      { id:'desktop', name:'桌面客户端', icon:'desktop', st:'ok', vol:600 },
    ]},
    { key:'bizA', label:'业务智能体', mods:[
      { id:'visual', name:'视觉创作', icon:'image', st:'error', count:507, vol:1800,
        sigs:[{t:'err',ep:['PATCH','/api/visual-agent/.../article/markers/:id','HTTP 400 × 507'],
          desc:'高频失败，最常见 INVALID_FORMAT。建议把格式校验前移到前端并给可行动提示。',people:7,n:507}] },
      { id:'weekly', name:'周报管理', icon:'poster', st:'error', count:357, vol:1400,
        sigs:[{t:'err',ep:['POST','/api/weekly-posters/:id/mark-seen','HTTP 403 × 316'],
          desc:'高频 PERMISSION_DENIED，疑似权限校验过严或前端在无权时仍发请求。',people:28,n:316},
          {t:'slow',ep:['POST','/api/report-agent/reports/:id/generate','慢请求均值 35.5s'],
          desc:'生成耗时偏长且无流式反馈，建议改 SSE 流式推送阶段进度。',people:6,n:41}] },
      { id:'defect', name:'缺陷管理', icon:'bug', st:'ok', vol:1200 },
      { id:'kb', name:'知识库', icon:'kb', st:'ok', vol:1000 },
      { id:'literary', name:'文学创作', icon:'book', st:'ok', vol:900 },
    ]},
    { key:'bizB', label:'业务智能体', mods:[
      { id:'changelog', name:'更新中心', icon:'changelog', st:'slow', count:99, vol:1100,
        sigs:[{t:'slow',ep:['GET','/api/changelog/github-logs','慢请求均值 36.1s'],
          desc:'拉取 GitHub 日志阻塞，建议后台同步入库 + 前端读快照。',people:10,n:99}] },
      { id:'pages', name:'网页托管', icon:'pages', st:'ok', vol:700 },
      { id:'openapi', name:'开放平台', icon:'api', st:'ok', vol:600 },
      { id:'ainews', name:'AI 资讯', icon:'news', st:'slow', count:146, vol:500,
        sigs:[{t:'slow',ep:['GET','/api/ai-news/latest','慢请求均值 63.6s'],
          desc:'等待超 3 秒且无流式反馈。建议做缓存 + 分页 + 异步预取。',people:1,n:146}] },
      { id:'channel', name:'渠道溯源', icon:'channel', st:'slow', count:6, vol:300,
        sigs:[{t:'slow',ep:['POST','/api/ccas-agent/equipment/generate','慢请求均值 62.5s'],
          desc:'设备清单生成耗时长，建议拆分阶段并推送进度事件。',people:2,n:6}] },
    ]},
    { key:'core', label:'核心服务', mods:[
      { id:'gateway', name:'LLM Gateway', icon:'gateway', st:'ok', vol:3000 },
      { id:'worker', name:'会话 Run/Worker', icon:'worker', st:'ok', vol:2000 },
      { id:'pool', name:'模型池', icon:'pool', st:'ok', vol:1500 },
      { id:'rbac', name:'权限 RBAC', icon:'rbac', st:'slow', count:1, vol:1300,
        sigs:[{t:'slow',ep:['—','关联：周报 mark-seen 403','1 处上游关联'],
          desc:'周报板块的权限报错回溯到此，建议核对该资源的角色授权矩阵。',people:28,n:1}] },
    ]},
    { key:'infra', label:'基础设施', mods:[
      { id:'mongo', name:'MongoDB', icon:'mongo', st:'ok', vol:4000 },
      { id:'redis', name:'Redis', icon:'redis', st:'ok', vol:2500 },
      { id:'cds', name:'CDS', icon:'cds', st:'ok', vol:800 },
    ]},
  ];
  const ALL={}; LAYERS.forEach(l=>l.mods.forEach(m=>{ m.layer=l.label; ALL[m.id]=m; }));
  let selId='visual';

  // layer strip height proportional to total volume
  const layerTotals=LAYERS.map(l=>l.mods.reduce((s,m)=>s+m.vol,0));
  const grandH=540, sumTot=layerTotals.reduce((a,b)=>a+b,0);

  // ---------- TREEMAP ----------
  const tmEl=document.getElementById('treemap');
  function buildTreemap(){
    tmEl.innerHTML='';
    LAYERS.forEach((l,li)=>{
      const h=Math.max(72, layerTotals[li]/sumTot*grandH);
      const layer=document.createElement('div');
      layer.className='tm-layer'; layer.style.height=h+'px';
      const tag=document.createElement('div'); tag.className='layer-tag'; tag.textContent=l.label;
      layer.appendChild(tag);
      const row=document.createElement('div'); row.className='tm-row';
      l.mods.forEach(m=>{
        const cell=document.createElement('div');
        cell.className='tm-cell '+m.st+(m.id===selId?' sel':'');
        cell.style.flexGrow=m.vol;
        cell.style.setProperty('--glow', m.st==='error'?'rgba(248,113,122,0.4)':m.st==='slow'?'rgba(251,191,36,0.35)':'transparent');
        const statTxt=m.st==='ok'?'健康':(m.st==='error'?m.count+' 次报错':m.count+' 次等待过久');
        cell.innerHTML=
          `<div><div class="c-name">${m.name}</div><div class="c-stat">${statTxt}</div></div>`+
          `<div class="c-vol">访问量 ${m.vol.toLocaleString()}</div>`+
          (m.st!=='ok'?`<div class="c-badge" style="background:${C[m.st]}">${m.count>99?'99+':m.count}</div>`:'');
        cell.addEventListener('click',()=>{ selId=m.id; refresh(); });
        row.appendChild(cell);
      });
      layer.appendChild(row); tmEl.appendChild(layer);
    });
  }

  // ---------- STATUS WALL ----------
  const wallEl=document.getElementById('wall');
  const sev={ error:0, slow:1, ok:2 };
  function buildWall(){
    wallEl.innerHTML='';
    // merge bizA+bizB under one section for the wall
    const sections=[
      { label:'用户入口', mods:LAYERS[0].mods },
      { label:'业务智能体', mods:[...LAYERS[1].mods,...LAYERS[2].mods] },
      { label:'核心服务', mods:LAYERS[3].mods },
      { label:'基础设施', mods:LAYERS[4].mods },
    ];
    sections.forEach(sec=>{
      const mods=[...sec.mods].sort((a,b)=> sev[a.st]-sev[b.st] || b.vol-a.vol);
      const problems=mods.filter(m=>m.st!=='ok').length;
      const s=document.createElement('div'); s.className='wall-sec';
      const h=document.createElement('div'); h.className='sec-h';
      h.innerHTML=`<span class="t">${sec.label}</span><span class="ln"></span>`+
        `<span class="cnt">${problems>0?`<span style="color:var(--red)">${problems} 处告警</span> · `:''}${mods.length} 个板块</span>`;
      s.appendChild(h);
      const g=document.createElement('div'); g.className='wall-grid';
      mods.forEach(m=>{
        const card=document.createElement('div');
        card.className='wcard '+m.st+(m.id===selId?' sel':'');
        const statTxt=m.st==='ok'?'运行健康':(m.st==='error'?'频繁报错':'等待过久');
        const big=m.st==='ok'?'OK':(m.count>99?'99+':m.count);
        const lbl2=m.st==='ok'?'无异常':(m.st==='error'?'次报错':'次等待');
        card.innerHTML=
          `<div class="top">
             <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="${m.st==='ok'?'var(--text-2)':C[m.st]}" stroke-width="1.8"><path d="${ICONS[m.icon]||ICONS.api}"/></svg></span>
             <span class="nm">${m.name}</span>
             <span class="dot" style="background:${C[m.st]};box-shadow:0 0 0 3px ${C[m.st]}22"></span>
           </div>
           <div class="foot">
             <div><div class="big">${big}</div><div class="st">${statTxt}</div></div>
             <div class="lbl2" style="text-align:right">${m.st==='ok'?'访问量':lbl2}<br>${m.st==='ok'?m.vol.toLocaleString():''}</div>
           </div>`;
        card.addEventListener('click',()=>{ selId=m.id; refresh(); });
        g.appendChild(card);
      });
      s.appendChild(g); wallEl.appendChild(s);
    });
  }

  // ---------- detail ----------
  const dHead=document.getElementById('dHead'), dBody=document.getElementById('dBody');
  function renderDetail(){
    const m=ALL[selId], col=C[m.st];
    const stTxt=m.st==='ok'?'健康':(m.st==='error'?'频繁报错':'等待过久');
    const pill=m.st==='ok'?`background:rgba(52,211,153,0.13);color:${C.ok}`
      :(m.st==='error'?`background:rgba(248,113,122,0.13);color:${C.error}`:`background:rgba(251,191,36,0.13);color:${C.slow}`);
    dHead.innerHTML=
      `<span class="dot-lg" style="background:${col};box-shadow:0 0 0 4px ${col}22"></span>`+
      `<h3>${m.name}</h3>`+
      `<span class="badge-pill" style="${pill}">${stTxt}</span>`+
      `<span class="spacer"></span>`+
      (m.st!=='ok'?`<span class="ai-hint">AI 建议：${m.sigs[0].desc}</span>`
        :`<span class="ai-hint">所属层：${m.layer} · 本月访问量 ${m.vol.toLocaleString()}</span>`);
    if(m.st==='ok'||!m.sigs){
      dBody.innerHTML=`<div class="empty"><span class="ok-dot"></span>运行健康，本月没有采集到报错或等待过久的信号。</div>`;
      return;
    }
    dBody.innerHTML=m.sigs.map(s=>`
      <div class="sig ${s.t}">
        <span class="rail"></span>
        <div>
          <div class="sig-row1">
            <span class="tag ${s.t}">${s.t==='err'?'频繁报错':'等待过久'}</span>
            <span class="ep"><span class="m">${s.ep[0]}</span> ${s.ep[1]} <span style="color:${s.t==='err'?C.error:C.slow}">${s.ep[2]}</span></span>
          </div>
          <div class="sig-desc">${s.desc}</div>
        </div>
        <div class="sig-right">
          <span class="sig-stat"><b>${s.people}</b> 人 · <b>${s.n}</b> 次</span>
          <div class="sig-acts">
            <button class="primary">转为缺陷</button><button>确认待改</button><button>已修复</button><button>忽略</button>
          </div>
        </div>
      </div>`).join('');
  }

  function refresh(){ buildTreemap(); buildWall(); renderDetail(); }
  refresh();

  // view toggle
  const seg=document.getElementById('viewSeg');
  const hint=document.getElementById('modeHint');
  seg.addEventListener('click',e=>{
    const btn=e.target.closest('button'); if(!btn) return;
    seg.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b===btn));
    const v=btn.dataset.v;
    tmEl.style.display = v==='treemap'?'flex':'none';
    wallEl.style.display = v==='wall'?'flex':'none';
    hint.textContent = v==='treemap'
      ? '面积 = 访问量，颜色 = 健康。哪块大又红，就是最该看的地方。'
      : '按层分组的状态墙，有告警的板块自动排到前面并发色，像机房监控大屏。';
  });
})();
</script>
</body>
</html>
