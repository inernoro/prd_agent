# doc/index.yml
# 文档元数据 — 供外部同步工具（语雀、Confluence 等）消费
# 命名规范见 doc/rule.doc.naming.md
# 排序原则：先理解产品 → 再了解架构 → 然后动手操作 → 参考规范 → 未来计划 → 历史记录

# 文件夹定义：按阅读优先级排列
folders:
  - prefix: spec
    name: 一、产品规格
  - prefix: design
    name: 二、设计文档
  - prefix: guide
    name: 三、指南
  - prefix: rule
    name: 四、规范与规则
  - prefix: plan
    name: 五、计划与方案
  - prefix: debt
    name: 六、技术债务台账
  - prefix: report
    name: 七、周报

# 文档映射：文件名（不含 .md）→ 中文标题
# 各分类内按重要性/阅读优先级排序，非字母序
