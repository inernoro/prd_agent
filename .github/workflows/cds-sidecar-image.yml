name: CDS Sidecar Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish. Defaults to the short commit SHA."
        required: false
        default: ""
      docker_platforms:
        description: "Docker platforms. Use linux/amd64,linux/arm64 only when the remote host needs multi-arch."
        required: false
        default: "linux/amd64"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}/claude-sidecar
  DOCKER_PLATFORMS: ${{ inputs.docker_platforms || 'linux/amd64' }}

jobs:
  build-and-push:
    name: Build & Push CDS Agent Sidecar
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.image_tag }}"
          if [[ -z "$tag" ]]; then
            tag="$(git rev-parse --short=12 HEAD)"
          fi
          if [[ ! "$tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid image tag: $tag" >&2
            exit 1
          fi
          image="${REGISTRY}/${IMAGE_NAME}:${tag}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "CDS_AGENT_SIDECAR_IMAGE=$image" >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup QEMU
        if: ${{ contains(env.DOCKER_PLATFORMS, 'arm64') }}
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sidecar image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./claude-sdk-sidecar
          file: ./claude-sdk-sidecar/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=cds-agent-sidecar
          cache-to: type=gha,mode=max,scope=cds-agent-sidecar
          platforms: ${{ env.DOCKER_PLATFORMS }}

      - name: Publish result
        shell: bash
        run: |
          {
            echo "## CDS Agent sidecar image"
            echo ""
            echo "- image: \`${{ steps.image.outputs.image }}\`"
            echo "- digest: \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "Use this as \`CDS_AGENT_SIDECAR_IMAGE\` only after the target remote host can pull it."
          } >> "$GITHUB_STEP_SUMMARY"
