name: PR Review Prism Publish

on:
  workflow_run:
    workflows: ["PR Review Prism Check"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  pr-architect-publish:
    name: PR审查棱镜 决策卡发布
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Download review-run artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: pr-architect-check.yml
          run_id: ${{ github.event.workflow_run.id }}
          name: pr-architect-review-run
          path: artifacts/pr-architect

      - name: Publish decision card comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_RUN_PATH: artifacts/pr-architect/review_run.json
        run: python .github/scripts/pr_architect_publish.py
