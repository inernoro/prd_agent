name: Server Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      docker_platforms:
        description: "Docker platforms (default: linux/amd64). Use 'linux/amd64,linux/arm64' only if you really need multi-arch."
        required: false
        default: "linux/amd64"
      release_tag:
        description: "Optional immutable release tag, for example prod-20260702-1. The workflow always also publishes sha-<commit>."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/prdagent-server
  DOCKER_PLATFORMS: ${{ inputs.docker_platforms || 'linux/amd64' }}

jobs:
  # 构建并推送 Docker 镜像
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 仅在需要 arm64 时启用 QEMU（否则会额外耗时）
      - name: Setup QEMU
        if: ${{ contains(env.DOCKER_PLATFORMS, 'arm64') }}
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 兼容现有一键部署路径，同时产出不可变 commit tag 供生产热修使用。
            type=raw,value=latest
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=${{ inputs.release_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}

      - name: Build metadata
        id: build_meta
        shell: bash
        run: |
          echo "build_time_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./prd-api
          file: ./prd-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME_UTC=${{ steps.build_meta.outputs.build_time_utc }}
          # 关闭额外产物生成可减少构建与上传时间
          provenance: false
          sbom: false
          # 更稳定的缓存隔离，避免不同 workflow/镜像互相挤占 cache
          cache-from: type=gha,scope=prd-api
          cache-to: type=gha,mode=max,scope=prd-api
          platforms: ${{ env.DOCKER_PLATFORMS }}
