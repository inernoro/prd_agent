name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # 检测变更的路径
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      admin: ${{ steps.filter.outputs.admin }}
      desktop: ${{ steps.filter.outputs.desktop }}
      cds: ${{ steps.filter.outputs.cds }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'prd-api/**'
              - '.github/workflows/ci.yml'
            admin:
              - 'prd-admin/**'
              - '.github/workflows/ci.yml'
            desktop:
              - 'prd-desktop/**'
              - '.github/workflows/ci.yml'
            cds:
              - 'cds/**'
              - '.github/workflows/ci.yml'

  # 后端服务构建和测试
  server-build:
    name: Server Build & Test
    needs: changes
    if: needs.changes.outputs.server == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prd-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/**.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore PrdAgent.sln

      - name: Build
        run: dotnet build PrdAgent.sln -c Release --no-restore

      - name: Run tests (exclude integration and manual tests)
        run: |
          set -o pipefail
          dotnet test PrdAgent.sln -c Release --no-build --verbosity detailed \
            --filter "Category!=Integration&Category!=Manual" \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=detailed" \
            --results-directory ./TestResults 2>&1 | tee dotnet-test.log
        shell: bash

      # 失败兜底诊断 —— xunit 失败默认不上 annotation panel,WebFetch 读 HTML 也看不到 raw log,
      # 用 grep 提取 [FAIL] 行并显式 ::error:: 上 annotation,annotation 是公开 HTML 可读的.
      - name: Surface test failures (on failure)
        if: failure()
        run: |
          echo "===== ALWAYS-ON DIAGNOSTIC RAN ====="
          ls -la
          echo "----- find trx -----"
          find . -name "*.trx" -mmin -30 2>/dev/null || echo "(no trx)"
          if [ ! -f dotnet-test.log ]; then
            echo "::warning::dotnet-test.log not found - Build step likely failed BEFORE test step ran"
            exit 0
          fi
          echo "----- last 300 lines of dotnet-test.log -----"
          tail -300 dotnet-test.log
          echo "----- grep [FAIL] / Assert / error markers -----"
          grep -nE "\[FAIL\]|Assert\.|error CS|Failed!|Build FAILED" dotnet-test.log | head -80 || true

          # xunit detailed verbosity 会输出形如:
          #   [xUnit.net 00:00:00.05]   PrdAgent.Api.Tests.Services.ReportImportMarkdownTests.X [FAIL]
          # 把这些行直接转成 annotation,人眼+WebFetch 都能看见.
          echo "----- emitting [FAIL] annotations -----"
          grep -E "\[FAIL\]" dotnet-test.log | sed 's/^[[:space:]]*//' | while IFS= read -r line; do
            echo "::error title=Test FAIL::${line}"
          done || true

          # trx 路线作为补充
          echo "----- emitting trx annotations -----"
          for trx in $(find . -name "test-results.trx" 2>/dev/null); do
            python3 -c "
          import re, sys, xml.etree.ElementTree as ET
          ns = {'t': 'http://microsoft.com/schemas/VisualStudio/TeamTest/2010'}
          root = ET.parse(sys.argv[1]).getroot()
          for r in root.findall('.//t:UnitTestResult[@outcome=\"Failed\"]', ns):
              name = r.get('testName', '?')
              msg_el = r.find('./t:Output/t:ErrorInfo/t:Message', ns)
              msg = (msg_el.text or '').strip() if msg_el is not None else ''
              msg_one = re.sub(r'\s+', ' ', msg)[:500]
              print(f'::error title=Test FAIL: {name}::{msg_one}')
          " "$trx" || echo "(failed to parse $trx)"
          done
        shell: bash

  # Web 管理后台构建
  admin-build:
    name: Admin Dashboard Build
    needs: changes
    # main 分支发布不能只依赖本次 push 的路径变更:
    # 如果上一轮某个模块构建失败,后续只改其他模块会导致失败模块永久 skipped。
    # PR/develop 仍按路径过滤节省资源。
    if: needs.changes.outputs.admin == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prd-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm_store
        shell: bash
        run: |
          echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: ${{ runner.os }}-pnpm-admin-${{ hashFiles('prd-admin/pnpm-lock.yaml', 'prd-admin/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-admin-

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # 桌面客户端构建检查（不打包）
  desktop-check:
    name: Desktop Client Check
    needs: changes
    if: needs.changes.outputs.desktop == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: prd-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm_store
        shell: bash
        run: |
          echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: ${{ runner.os }}-pnpm-desktop-${{ hashFiles('prd-desktop/pnpm-lock.yaml', 'prd-desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-desktop-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust toolchain fingerprint
        id: rustc
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            FP="$(rustc -Vv | sha256sum | awk '{print $1}')"
          else
            FP="$(rustc -Vv | shasum -a 256 | awk '{print $1}')"
          fi
          echo "fingerprint=$FP" >> "$GITHUB_OUTPUT"

      - name: glibc fingerprint (Linux)
        id: glibc
        run: |
          GLIBC_VER="$(getconf GNU_LIBC_VERSION 2>/dev/null || (ldd --version | head -n1))"
          GLIBC_FP="$(printf '%s' "$GLIBC_VER" | sha256sum | cut -d ' ' -f1)"
          echo "fingerprint=$GLIBC_FP" >> $GITHUB_OUTPUT

      - name: Cache Cargo registry/git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/src/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
          key: ${{ runner.os }}-cargo-registry-${{ steps.rustc.outputs.fingerprint }}-${{ hashFiles('prd-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-${{ steps.rustc.outputs.fingerprint }}-
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo target (platform specific)
        uses: actions/cache@v4
        with:
          path: |
            prd-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-target-${{ steps.rustc.outputs.fingerprint }}-${{ steps.glibc.outputs.fingerprint }}-${{ hashFiles('prd-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ steps.rustc.outputs.fingerprint }}-${{ steps.glibc.outputs.fingerprint }}-
            ${{ runner.os }}-cargo-target-${{ steps.rustc.outputs.fingerprint }}-
            ${{ runner.os }}-cargo-target-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6
      
      - name: Enable sccache (best effort)
        shell: bash
        run: |
          set +e
          SCCACHE_GHA_ENABLED=true sccache --start-server
          if [ $? -eq 0 ]; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "sccache unavailable (likely GH cache transient issue), fallback to plain rustc"
          fi
          set -e

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Type check frontend
        run: pnpm tsc --noEmit

      - name: Build frontend
        run: pnpm build

      - name: Generate Tauri icons
        run: pnpm tauri:icons

      - name: Check Rust (dev)
        working-directory: prd-desktop/src-tauri
        run: cargo check

      - name: Check Rust (release)
        working-directory: prd-desktop/src-tauri
        run: cargo check --release

      - name: Rust format check
        working-directory: prd-desktop/src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: prd-desktop/src-tauri
        run: cargo clippy -- -D warnings

      - name: sccache stats
        if: always()
        shell: bash
        run: |
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  # CDS dashboard (Node/Express) — tsc + vitest (738 tests baseline).
  # Mirrors the dedicated `cds.yml` workflow so every aggregate `ci.yml`
  # run reports a unified ci-status for branch protection, even though
  # cds.yml still exists for operator familiarity. The jobs are
  # path-filtered so a PR that only touches cds/** doesn't pay the
  # full admin+desktop+server price here.
  cds-build:
    name: CDS Build & Test
    needs: changes
    if: needs.changes.outputs.cds == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cds

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm_store
        shell: bash
        run: |
          echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: ${{ runner.os }}-pnpm-cds-${{ hashFiles('cds/pnpm-lock.yaml', 'cds/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-cds-

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test

  # CI 状态汇总（用于 branch protection）
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [changes, server-build, admin-build, desktop-check, cds-build]
    if: always()
    steps:
      - name: Check CI status
        run: |
          echo "Changes detected:"
          echo "  Server: ${{ needs.changes.outputs.server }}"
          echo "  Admin: ${{ needs.changes.outputs.admin }}"
          echo "  Desktop: ${{ needs.changes.outputs.desktop }}"
          echo "  CDS: ${{ needs.changes.outputs.cds }}"

          # main push 是发布线,所有关键 job 都必须成功。
          # PR/develop 仍只要求本次改动涉及的模块成功。
          main_push="${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}"
          server_required="${{ needs.changes.outputs.server == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}"
          admin_required="${{ needs.changes.outputs.admin == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}"
          desktop_required="${{ needs.changes.outputs.desktop == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}"
          cds_required="${{ needs.changes.outputs.cds == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}"

          echo "Main push: $main_push"
          echo "Required jobs:"
          echo "  Server: $server_required"
          echo "  Admin: $admin_required"
          echo "  Desktop: $desktop_required"
          echo "  CDS: $cds_required"

          server_ok="$([[ "$server_required" != "true" || "${{ needs.server-build.result }}" == "success" ]] && echo true || echo false)"
          admin_ok="$([[ "$admin_required" != "true" || "${{ needs.admin-build.result }}" == "success" ]] && echo true || echo false)"
          desktop_ok="$([[ "$desktop_required" != "true" || "${{ needs.desktop-check.result }}" == "success" ]] && echo true || echo false)"
          cds_ok="$([[ "$cds_required" != "true" || "${{ needs.cds-build.result }}" == "success" ]] && echo true || echo false)"

          if [[ "$server_ok" == "true" && "$admin_ok" == "true" && "$desktop_ok" == "true" && "$cds_ok" == "true" ]]; then
            echo "All required checks passed!"
            exit 0
          else
            echo "Some checks failed"
            echo "  Server: ${{ needs.server-build.result }}"
            echo "  Admin: ${{ needs.admin-build.result }}"
            echo "  Desktop: ${{ needs.desktop-check.result }}"
            echo "  CDS: ${{ needs.cds-build.result }}"
            exit 1
          fi
