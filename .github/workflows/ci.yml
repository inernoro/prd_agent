name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      smoke_host:
        description: '冒烟测试目标 URL (例 https://my-branch.miduo.org)'
        required: false
        default: ''
      smoke_skip:
        description: '跳过的冒烟项 (逗号分隔, e.g. report,defect)'
        required: false
        default: ''
      e2e_base_url:
        description: 'Playwright E2E 目标 URL (例 https://my-branch.miduo.org); 留空则跳过 e2e job'
        required: false
        default: ''

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # 检测变更的路径
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      admin: ${{ steps.filter.outputs.admin }}
      desktop: ${{ steps.filter.outputs.desktop }}
      cds: ${{ steps.filter.outputs.cds }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'prd-api/**'
              - '.github/workflows/ci.yml'
            admin:
              - 'prd-admin/**'
              - '.github/workflows/ci.yml'
            desktop:
              - 'prd-desktop/**'
              - '.github/workflows/ci.yml'
            cds:
              - 'cds/**'
              - '.github/workflows/ci.yml'

  # 后端服务构建和测试
  server-build:
    name: Server Build & Test
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prd-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/**.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore PrdAgent.sln

      - name: Build
        run: dotnet build PrdAgent.sln -c Release --no-restore

      - name: Run tests (exclude integration and manual tests)
        run: dotnet test PrdAgent.sln -c Release --no-build --verbosity normal --filter "Category!=Integration&Category!=Manual"

  # Web 管理后台构建
  admin-build:
    name: Admin Dashboard Build
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prd-admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm_store
        shell: bash
        run: |
          echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: ${{ runner.os }}-pnpm-admin-${{ hashFiles('prd-admin/pnpm-lock.yaml', 'prd-admin/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-admin-

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # 桌面客户端构建检查（不打包）
  desktop-check:
    name: Desktop Client Check
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: prd-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm_store
        shell: bash
        run: |
          echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: ${{ runner.os }}-pnpm-desktop-${{ hashFiles('prd-desktop/pnpm-lock.yaml', 'prd-desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-desktop-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust toolchain fingerprint
        id: rustc
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            FP="$(rustc -Vv | sha256sum | awk '{print $1}')"
          else
            FP="$(rustc -Vv | shasum -a 256 | awk '{print $1}')"
          fi
          echo "fingerprint=$FP" >> "$GITHUB_OUTPUT"

      - name: glibc fingerprint (Linux)
        id: glibc
        run: |
          GLIBC_VER="$(getconf GNU_LIBC_VERSION 2>/dev/null || (ldd --version | head -n1))"
          GLIBC_FP="$(printf '%s' "$GLIBC_VER" | sha256sum | cut -d ' ' -f1)"
          echo "fingerprint=$GLIBC_FP" >> $GITHUB_OUTPUT

      - name: Cache Cargo registry/git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/registry/src/
            ~/.cargo/git/db/
            ~/.cargo/git/checkouts/
          key: ${{ runner.os }}-cargo-registry-${{ steps.rustc.outputs.fingerprint }}-${{ hashFiles('prd-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-${{ steps.rustc.outputs.fingerprint }}-
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo target (platform specific)
        uses: actions/cache@v4
        with:
          path: |
            prd-desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-target-${{ steps.rustc.outputs.fingerprint }}-${{ steps.glibc.outputs.fingerprint }}-${{ hashFiles('prd-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ steps.rustc.outputs.fingerprint }}-${{ steps.glibc.outputs.fingerprint }}-
            ${{ runner.os }}-cargo-target-${{ steps.rustc.outputs.fingerprint }}-
            ${{ runner.os }}-cargo-target-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6
      
      - name: Enable sccache (best effort)
        shell: bash
        run: |
          set +e
          SCCACHE_GHA_ENABLED=true sccache --start-server
          if [ $? -eq 0 ]; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "sccache unavailable (likely GH cache transient issue), fallback to plain rustc"
          fi
          set -e

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Type check frontend
        run: pnpm tsc --noEmit

      - name: Build frontend
        run: pnpm build

      - name: Generate Tauri icons
        run: pnpm tauri:icons

      - name: Check Rust (dev)
        working-directory: prd-desktop/src-tauri
        run: cargo check

      - name: Check Rust (release)
        working-directory: prd-desktop/src-tauri
        run: cargo check --release

      - name: Rust format check
        working-directory: prd-desktop/src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: prd-desktop/src-tauri
        run: cargo clippy -- -D warnings

      - name: sccache stats
        if: always()
        shell: bash
        run: |
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          fi

  # CDS dashboard (Node/Express) — tsc + vitest (738 tests baseline).
  # Mirrors the dedicated `cds.yml` workflow so every aggregate `ci.yml`
  # run reports a unified ci-status for branch protection, even though
  # cds.yml still exists for operator familiarity. The jobs are
  # path-filtered so a PR that only touches cds/** doesn't pay the
  # full admin+desktop+server price here.
  cds-build:
    name: CDS Build & Test
    needs: changes
    if: needs.changes.outputs.cds == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cds

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm_store
        shell: bash
        run: |
          echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: ${{ runner.os }}-pnpm-cds-${{ hashFiles('cds/pnpm-lock.yaml', 'cds/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-cds-

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test

  # Phase 2 冒烟测试 — 仅在 workflow_dispatch 手动触发时跑
  #
  # 为什么不每 PR 自动跑: 冒烟需要一个已部署的 CDS 预览环境 (有 LLM Gateway
  # 可用、MongoDB 可连、真实 /api/xxx 端点可达),而 ci.yml 只负责编译+单测,
  # 没有部署能力。让使用者先 /cds-deploy 到灰度,再手动 Run workflow 填入
  # smoke_host 即可。
  #
  # 目标是 Phase 3 把这一步挪到 /cds-deploy 完成后的 hook (cds/src/routes
  # 里新增 SSE 末尾 callback) 而非 GitHub Actions。当前版本作为过渡手动闸门。
  smoke-preview:
    name: Smoke (Preview Branch)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.smoke_host != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq (should already be on ubuntu-latest but defensive)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Run smoke-all.sh against preview
        env:
          SMOKE_TEST_HOST: ${{ github.event.inputs.smoke_host }}
          AI_ACCESS_KEY: ${{ secrets.AI_ACCESS_KEY }}
          SMOKE_USER: ${{ vars.SMOKE_USER || 'admin' }}
          SMOKE_SKIP: ${{ github.event.inputs.smoke_skip }}
          SMOKE_FAIL_FAST: '1'
        run: |
          if [[ -z "$AI_ACCESS_KEY" ]]; then
            echo "::error::缺少 repo secret AI_ACCESS_KEY, 无法跑冒烟"
            echo "请在 Settings → Secrets and variables → Actions 添加 AI_ACCESS_KEY"
            exit 2
          fi
          bash scripts/smoke-all.sh

  # Phase 6 浏览器 E2E — workflow_dispatch 手动触发,跑 Playwright 针对
  # 已部署 CDS 预览域名的 golden-path specs。目标 URL 来自入参
  # e2e_base_url,留空即跳过(避免每个 workflow_dispatch 都强制填)。
  #
  # 为什么和 smoke-preview 分开 job:
  #   - smoke 是 HTTP API 层、Playwright 是浏览器渲染层,关注点不同
  #   - Playwright 装浏览器比较重(首次 ~150MB),单独 job 便于缓存
  #   - 失败也分开定位,"API 挂" vs "UI 挂" 对排障效率差别很大
  e2e-preview:
    name: Playwright E2E (Preview)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.e2e_base_url != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: pnpm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: ${{ github.event.inputs.e2e_base_url }}
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: pnpm test

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload JSON results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-json
          path: e2e/results.json
          retention-days: 14

  # CI 状态汇总（用于 branch protection）
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [changes, server-build, admin-build, desktop-check, cds-build]
    if: always()
    steps:
      - name: Check CI status
        run: |
          echo "Changes detected:"
          echo "  Server: ${{ needs.changes.outputs.server }}"
          echo "  Admin: ${{ needs.changes.outputs.admin }}"
          echo "  Desktop: ${{ needs.changes.outputs.desktop }}"
          echo "  CDS: ${{ needs.changes.outputs.cds }}"

          # 检查需要运行的 job 是否成功
          server_ok="${{ needs.changes.outputs.server != 'true' || needs.server-build.result == 'success' }}"
          admin_ok="${{ needs.changes.outputs.admin != 'true' || needs.admin-build.result == 'success' }}"
          desktop_ok="${{ needs.changes.outputs.desktop != 'true' || needs.desktop-check.result == 'success' }}"
          cds_ok="${{ needs.changes.outputs.cds != 'true' || needs.cds-build.result == 'success' }}"

          if [[ "$server_ok" == "true" && "$admin_ok" == "true" && "$desktop_ok" == "true" && "$cds_ok" == "true" ]]; then
            echo "All required checks passed!"
            exit 0
          else
            echo "Some checks failed"
            echo "  Server: ${{ needs.server-build.result }}"
            echo "  Admin: ${{ needs.admin-build.result }}"
            echo "  Desktop: ${{ needs.desktop-check.result }}"
            echo "  CDS: ${{ needs.cds-build.result }}"
            exit 1
          fi
