name: LLM Gateway Production Stage

# GitHub only exposes workflow_dispatch entries from the default branch.
# Merge this workflow to the default branch before treating it as a clickable production rollout entry.

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Rollout stage to run."
        required: true
        type: choice
        options:
          - shadow-start
          - rollback-rehearsal
          - config-authority
          - canary-intent-text
          - canary-chat
          - canary-streaming
          - canary-vision
          - canary-image
          - canary-asr
          - canary-video-asr
          - http-full
          - rollback-inproc
      commit:
        description: "40-char release commit. Required for every non-rollback-inproc stage."
        required: false
        default: ""
      execute:
        description: "Actually execute fast.sh/exec_dep.sh or rollback. Leave false for dry-run."
        required: true
        default: false
        type: boolean
      repo:
        description: "GitHub owner/repo passed to fast.sh and exec_dep.sh."
        required: false
        default: "inernoro/prd_agent"
      map_base:
        description: "MAP/API production base URL. Defaults to vars.PRD_AGENT_PROD_BASE."
        required: false
        default: ""
      gw_base:
        description: "Gateway serving production base URL. Defaults to vars.LLMGW_PROD_GATE_BASE."
        required: false
        default: ""
      runner_labels_json:
        description: "Self-hosted production runner labels JSON."
        required: false
        default: "[\"self-hosted\",\"prd-agent-prod\"]"
      sample_percent:
        description: "Shadow full sample percent for shadow/canary stages."
        required: false
        default: "1"
      min_observation_hours:
        description: "Minimum observation hours required before advancing stages."
        required: false
        default: "24"
      main_ref:
        description: "Mainline ref that the release commit must include."
        required: false
        default: "origin/main"
      maintenance_from_commit:
        description: "Full-http maintenance only: audited prior http-full commit whose shadow evidence may be inherited."
        required: false
        default: ""
      allow_out_of_order:
        description: "Allow stage order override. Requires allow_out_of_order_reason."
        required: true
        default: false
        type: boolean
      allow_out_of_order_reason:
        description: "Required reason when allow_out_of_order is true."
        required: false
        default: ""
      allow_release_tree_mismatch:
        description: "Emergency only: allow production runner files to differ from release commit."
        required: true
        default: false
        type: boolean
      allow_missing_map_logs:
        description: "Operator waiver: allow canary/http-full preflight to skip MAP LLM logs scan when logs:read key is unavailable."
        required: true
        default: false
        type: boolean
      rollout_evidence_run_id:
        description: "Previous llmgw-prod-stage run id to restore .llmgw-release-evidence before continuing."
        required: false
        default: ""
      rollout_evidence_artifact:
        description: "Previous evidence artifact name. Defaults to llmgw-prod-stage-<rollout_evidence_run_id>."
        required: false
        default: ""
      route_matrix:
        description: "Run gw-smoke /resolve auto/pool/pinned route matrix evidence."
        required: true
        default: false
        type: boolean
      route_app_caller:
        description: "appCallerCode for route matrix /resolve evidence."
        required: false
        default: "report-agent.generate::chat"
      route_model_type:
        description: "modelType for route matrix /resolve evidence."
        required: false
        default: "chat"
      route_pool_id:
        description: "GW model pool id required when route_matrix is true."
        required: false
        default: ""
      route_pinned_platform_id:
        description: "Pinned platform id required when route_matrix is true."
        required: false
        default: ""
      route_pinned_model_id:
        description: "Pinned model id required when route_matrix is true."
        required: false
        default: ""

permissions:
  contents: read
  actions: read

concurrency:
  group: llmgw-prod-stage
  cancel-in-progress: false

jobs:
  runner-precheck:
    runs-on: ubuntu-latest
    env:
      INPUT_RUNNER_LABELS_JSON: ${{ github.event.inputs.runner_labels_json || '["self-hosted","prd-agent-prod"]' }}
      RUNNER_ADMIN_TOKEN_CONFIGURED: ${{ secrets.PRD_AGENT_PROD_GITHUB_TOKEN != '' && '1' || '0' }}
      GITHUB_TOKEN: ${{ secrets.PRD_AGENT_PROD_GITHUB_TOKEN || github.token }}
    steps:
      - name: Checkout release scripts
        uses: actions/checkout@v4

      - name: Check production runner availability
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .llmgw-release-evidence
          args=(
            --repo "${{ github.repository }}"
            --labels-json "$INPUT_RUNNER_LABELS_JSON"
            --json-out .llmgw-release-evidence/runner-precheck.json
          )
          if [ "$RUNNER_ADMIN_TOKEN_CONFIGURED" != "1" ]; then
            args+=(--allow-api-unavailable)
          fi
          python3 scripts/llmgw-prod-runner-precheck.py "${args[@]}"

      - name: Upload runner precheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llmgw-prod-stage-runner-precheck-${{ github.run_id }}
          path: .llmgw-release-evidence/runner-precheck.json
          if-no-files-found: ignore

  stage:
    needs: runner-precheck
    runs-on: ${{ fromJSON(github.event.inputs.runner_labels_json || '["self-hosted","prd-agent-prod"]') }}
    timeout-minutes: 30
    environment: production
    env:
      INPUT_STAGE: ${{ github.event.inputs.stage || '' }}
      INPUT_COMMIT: ${{ github.event.inputs.commit || '' }}
      INPUT_EXECUTE: ${{ github.event.inputs.execute || 'false' }}
      INPUT_REPO: ${{ github.event.inputs.repo || 'inernoro/prd_agent' }}
      INPUT_MAP_BASE: ${{ github.event.inputs.map_base || '' }}
      DEFAULT_MAP_BASE: ${{ vars.PRD_AGENT_PROD_BASE || '' }}
      INPUT_GW_BASE: ${{ github.event.inputs.gw_base || '' }}
      DEFAULT_GW_BASE: ${{ vars.LLMGW_PROD_GATE_BASE || '' }}
      DEFAULT_CONSOLE_BASE: ${{ vars.LLMGW_PROD_CONSOLE_BASE || '' }}
      INPUT_SAMPLE_PERCENT: ${{ github.event.inputs.sample_percent || '1' }}
      INPUT_MIN_OBSERVATION_HOURS: ${{ github.event.inputs.min_observation_hours || '24' }}
      INPUT_MAIN_REF: ${{ github.event.inputs.main_ref || 'origin/main' }}
      INPUT_MAINTENANCE_FROM_COMMIT: ${{ github.event.inputs.maintenance_from_commit || '' }}
      INPUT_ALLOW_OUT_OF_ORDER: ${{ github.event.inputs.allow_out_of_order || 'false' }}
      INPUT_ALLOW_OUT_OF_ORDER_REASON: ${{ github.event.inputs.allow_out_of_order_reason || '' }}
      INPUT_ALLOW_RELEASE_TREE_MISMATCH: ${{ github.event.inputs.allow_release_tree_mismatch || 'false' }}
      INPUT_ALLOW_MISSING_MAP_LOGS: ${{ github.event.inputs.allow_missing_map_logs || 'false' }}
      INPUT_ROLLOUT_EVIDENCE_RUN_ID: ${{ github.event.inputs.rollout_evidence_run_id || '' }}
      INPUT_ROLLOUT_EVIDENCE_ARTIFACT: ${{ github.event.inputs.rollout_evidence_artifact || '' }}
      INPUT_ROUTE_MATRIX: ${{ github.event.inputs.route_matrix || 'false' }}
      INPUT_ROUTE_APP_CALLER: ${{ github.event.inputs.route_app_caller || 'report-agent.generate::chat' }}
      INPUT_ROUTE_MODEL_TYPE: ${{ github.event.inputs.route_model_type || 'chat' }}
      INPUT_ROUTE_POOL_ID: ${{ github.event.inputs.route_pool_id || '' }}
      INPUT_ROUTE_PINNED_PLATFORM_ID: ${{ github.event.inputs.route_pinned_platform_id || '' }}
      INPUT_ROUTE_PINNED_MODEL_ID: ${{ github.event.inputs.route_pinned_model_id || '' }}
      PRD_AGENT_API_KEY: ${{ secrets.PRD_AGENT_PROD_API_KEY }}
      LLMGW_GATE_KEY: ${{ secrets.LLMGW_PROD_GATE_KEY }}
      LLMGW_CONSOLE_TOKEN: ${{ secrets.LLMGW_PROD_CONSOLE_TOKEN }}
      LLMGW_CONSOLE_USER: ${{ secrets.LLMGW_PROD_CONSOLE_USER }}
      LLMGW_CONSOLE_PASSWORD: ${{ secrets.LLMGW_PROD_CONSOLE_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.PRD_AGENT_PROD_GITHUB_TOKEN || github.token }}
      PRODUCTION_EVIDENCE_SOURCE: /root/inernoro/prd_agent/.llmgw-release-evidence

    steps:
      - name: Checkout release scripts
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore previous rollout evidence
        if: ${{ github.event.inputs.rollout_evidence_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.inputs.rollout_evidence_run_id }}
          name: ${{ github.event.inputs.rollout_evidence_artifact != '' && github.event.inputs.rollout_evidence_artifact || format('llmgw-prod-stage-{0}', github.event.inputs.rollout_evidence_run_id) }}
          path: .llmgw-release-evidence/
          github-token: ${{ secrets.PRD_AGENT_PROD_GITHUB_TOKEN || github.token }}

      - name: Restore trusted production maintenance evidence
        if: ${{ github.event.inputs.maintenance_from_commit != '' }}
        shell: bash
        run: |
          set -euo pipefail
          target=".llmgw-release-evidence"
          ledger="$target/rollout-ledger.jsonl"
          mkdir -p "$target"
          if [ ! -s "$ledger" ]; then
            python3 scripts/llmgw-prod-evidence-restore.py \
              --source "$PRODUCTION_EVIDENCE_SOURCE" \
              --target "$target" \
              --commit "${{ github.event.inputs.maintenance_from_commit }}" \
              --require-owner-uid 0 \
              --json-out "$target/production-evidence-restore.json"
          else
            echo "Rollout ledger restored from the requested GitHub Actions artifact."
          fi
          python3 scripts/llmgw-rollout-ledger.py maintenance-baseline \
            --ledger "$ledger" \
            --commit "${{ github.event.inputs.maintenance_from_commit }}" \
            --json-out "$target/production-evidence-baseline-audit.json"

      - name: Run production stage
        shell: bash
        run: |
          set -euo pipefail

          stage="$(printf '%s' "$INPUT_STAGE" | xargs)"
          commit="$(printf '%s' "$INPUT_COMMIT" | xargs)"
          execute="$(printf '%s' "$INPUT_EXECUTE" | xargs)"
          repo="$(printf '%s' "$INPUT_REPO" | xargs)"
          map_base="$(printf '%s' "${INPUT_MAP_BASE:-$DEFAULT_MAP_BASE}" | xargs)"
          gw_base="$(printf '%s' "${INPUT_GW_BASE:-$DEFAULT_GW_BASE}" | xargs)"
          console_base="$(printf '%s' "${DEFAULT_CONSOLE_BASE:-}" | xargs)"
          if [ -z "$console_base" ] && [ -n "$map_base" ]; then
            console_base="${map_base%/}/gw"
          fi
          sample_percent="$(printf '%s' "$INPUT_SAMPLE_PERCENT" | xargs)"
          min_observation_hours="$(printf '%s' "$INPUT_MIN_OBSERVATION_HOURS" | xargs)"
          main_ref="$(printf '%s' "$INPUT_MAIN_REF" | xargs)"
          maintenance_from_commit="$(printf '%s' "$INPUT_MAINTENANCE_FROM_COMMIT" | xargs)"
          allow_out_of_order="$(printf '%s' "$INPUT_ALLOW_OUT_OF_ORDER" | xargs)"
          allow_out_of_order_reason="$(printf '%s' "$INPUT_ALLOW_OUT_OF_ORDER_REASON" | xargs)"
          allow_release_tree_mismatch="$(printf '%s' "$INPUT_ALLOW_RELEASE_TREE_MISMATCH" | xargs)"
          allow_missing_map_logs="$(printf '%s' "$INPUT_ALLOW_MISSING_MAP_LOGS" | xargs)"
          rollout_evidence_run_id="$(printf '%s' "$INPUT_ROLLOUT_EVIDENCE_RUN_ID" | xargs)"
          route_matrix="$(printf '%s' "$INPUT_ROUTE_MATRIX" | xargs)"
          route_app_caller="$(printf '%s' "$INPUT_ROUTE_APP_CALLER" | xargs)"
          route_model_type="$(printf '%s' "$INPUT_ROUTE_MODEL_TYPE" | xargs)"
          route_pool_id="$(printf '%s' "$INPUT_ROUTE_POOL_ID" | xargs)"
          route_pinned_platform_id="$(printf '%s' "$INPUT_ROUTE_PINNED_PLATFORM_ID" | xargs)"
          route_pinned_model_id="$(printf '%s' "$INPUT_ROUTE_PINNED_MODEL_ID" | xargs)"

          if [ -z "$stage" ]; then
            echo "ERROR: missing rollout stage." >&2
            exit 1
          fi
          if [ "$stage" != "rollback-inproc" ] && ! printf '%s' "$commit" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            echo "ERROR: non-rollback stages require a full 40-char commit." >&2
            exit 1
          fi
          if [ "$stage" != "rollback-inproc" ] && [ "$stage" != "rollback-rehearsal" ] && [ "$stage" != "config-authority" ] && [ -z "$map_base" ]; then
            echo "ERROR: missing MAP base URL. Set vars.PRD_AGENT_PROD_BASE or workflow input map_base." >&2
            exit 1
          fi
          if [ "$stage" != "rollback-inproc" ] && [ "$stage" != "rollback-rehearsal" ] && [ "$stage" != "config-authority" ] && [ -z "$gw_base" ]; then
            echo "ERROR: missing gateway base URL. Set vars.LLMGW_PROD_GATE_BASE or workflow input gw_base." >&2
            exit 1
          fi
          if [ "$stage" != "rollback-inproc" ] && [ "$stage" != "rollback-rehearsal" ] && [ "$stage" != "config-authority" ] && [ "$allow_missing_map_logs" != "true" ] && [ -z "$(printf '%s' "${PRD_AGENT_API_KEY:-}" | xargs)" ]; then
            echo "ERROR: missing MAP API key. Set secrets.PRD_AGENT_PROD_API_KEY with logs:read access." >&2
            exit 1
          fi
          if [ "$stage" != "rollback-inproc" ] && [ "$stage" != "rollback-rehearsal" ] && [ "$stage" != "config-authority" ] && [ -z "$(printf '%s' "${LLMGW_GATE_KEY:-}" | xargs)" ]; then
            echo "ERROR: missing gateway key. Set secrets.LLMGW_PROD_GATE_KEY." >&2
            exit 1
          fi
          if [ "$stage" = "config-authority" ] || [ "$stage" = "http-full" ]; then
            if [ -z "$console_base" ]; then
              echo "ERROR: $stage requires vars.LLMGW_PROD_CONSOLE_BASE or map_base to derive /gw." >&2
              exit 1
            fi
            if [ -z "$(printf '%s' "${LLMGW_CONSOLE_TOKEN:-}" | xargs)" ] && { [ -z "$(printf '%s' "${LLMGW_CONSOLE_USER:-}" | xargs)" ] || [ -z "$(printf '%s' "${LLMGW_CONSOLE_PASSWORD:-}" | xargs)" ]; }; then
              echo "ERROR: $stage requires secrets.LLMGW_PROD_CONSOLE_TOKEN or LLMGW_PROD_CONSOLE_USER/PASSWORD." >&2
              exit 1
            fi
          fi
          if [ "$allow_out_of_order" = "true" ] && [ -z "$allow_out_of_order_reason" ]; then
            echo "ERROR: allow_out_of_order requires allow_out_of_order_reason." >&2
            exit 1
          fi
          if [ -n "$maintenance_from_commit" ]; then
            if [ "$stage" != "http-full" ]; then
              echo "ERROR: maintenance_from_commit is only valid for stage http-full." >&2
              exit 1
            fi
            if ! printf '%s' "$maintenance_from_commit" | grep -Eq '^[0-9a-fA-F]{40}$'; then
              echo "ERROR: maintenance_from_commit requires a full 40-char commit." >&2
              exit 1
            fi
          fi
          if [ "$stage" != "shadow-start" ] && [ "$stage" != "rollback-inproc" ] && [ -z "$rollout_evidence_run_id" ]; then
            echo "ERROR: stage $stage requires rollout_evidence_run_id so prior rollout ledger evidence is restored." >&2
            exit 1
          fi

          export PRD_AGENT_BASE="$map_base"
          export LLMGW_GATE_BASE="$gw_base"
          export LLMGW_CONSOLE_BASE="$console_base"
          export LLMGW_STAGE_EVIDENCE_DIR=".llmgw-release-evidence"
          export LLMGW_GATE_SMOKE_ROUTE_MATRIX="$route_matrix"
          export LLMGW_GATE_SMOKE_ROUTE_APP_CALLER="$route_app_caller"
          export LLMGW_GATE_SMOKE_ROUTE_MODEL_TYPE="$route_model_type"
          export LLMGW_GATE_SMOKE_ROUTE_POOL_ID="$route_pool_id"
          export LLMGW_GATE_SMOKE_ROUTE_PINNED_PLATFORM_ID="$route_pinned_platform_id"
          export LLMGW_GATE_SMOKE_ROUTE_PINNED_MODEL_ID="$route_pinned_model_id"
          if [ "$allow_release_tree_mismatch" = "true" ]; then
            export LLMGW_STAGE_ALLOW_RELEASE_TREE_MISMATCH=1
          fi
          if [ "$allow_missing_map_logs" = "true" ]; then
            export LLMGW_STAGE_ALLOW_MISSING_MAP_LOGS=1
          fi
          release_tree_mismatch_bypass="${LLMGW_STAGE_ALLOW_RELEASE_TREE_MISMATCH:-${LLMGW_STAGE_ALLOW_SCRIPT_TREE_MISMATCH:-0}}"

          args=(
            --stage "$stage"
            --commit "$commit"
            --repo "$repo"
            --sample-percent "$sample_percent"
            --min-observation-hours "$min_observation_hours"
            --main-ref "$main_ref"
            --evidence-dir ".llmgw-release-evidence"
          )
          if [ "$execute" = "true" ]; then
            args+=(--execute)
          else
            args+=(--dry-run)
          fi
          if [ "$allow_out_of_order" = "true" ]; then
            args+=(--allow-out-of-order --allow-out-of-order-reason "$allow_out_of_order_reason")
          fi
          if [ -n "$maintenance_from_commit" ]; then
            args+=(--maintenance-from-commit "$maintenance_from_commit")
          fi

          if [ "$execute" = "true" ] && [ "$stage" != "rollback-inproc" ]; then
            tree_precheck_args=(
              --commit "$commit"
              --main-ref "$main_ref"
              --json-out ".llmgw-release-evidence/tree-precheck.json"
              --report-md ".llmgw-release-evidence/tree-precheck.md"
            )
            if [ "$release_tree_mismatch_bypass" = "1" ] || [ "$release_tree_mismatch_bypass" = "true" ]; then
              tree_precheck_args+=(--allow-mismatch)
            fi
            if ! python3 scripts/llmgw-prod-tree-precheck.py "${tree_precheck_args[@]}"; then
              if [ "$release_tree_mismatch_bypass" = "1" ] || [ "$release_tree_mismatch_bypass" = "true" ]; then
                echo "WARN: release tree mismatch precheck failed but emergency bypass is enabled; continuing to stage runner."
              else
                exit 1
              fi
            fi
          fi

          scripts/llmgw-prod-stage.sh "${args[@]}"

      - name: Audit recorded rollout stage
        if: ${{ github.event.inputs.execute == 'true' && github.event.inputs.stage != 'rollback-inproc' && github.event.inputs.maintenance_from_commit == '' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/llmgw-rollout-ledger.py audit \
            --ledger .llmgw-release-evidence/rollout-ledger.jsonl \
            --commit "${{ github.event.inputs.commit }}" \
            --target-stage "${{ github.event.inputs.stage }}" \
            --require-target-success \
            --min-observation-hours "${{ github.event.inputs.min_observation_hours || '24' }}" \
            --json-out .llmgw-release-evidence/stage-audit.json \
            --report-md .llmgw-release-evidence/stage-audit.md

      - name: Audit recorded maintenance release
        if: ${{ github.event.inputs.execute == 'true' && github.event.inputs.stage == 'http-full' && github.event.inputs.maintenance_from_commit != '' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/llmgw-rollout-ledger.py maintenance-baseline \
            --ledger .llmgw-release-evidence/rollout-ledger.jsonl \
            --commit "${{ github.event.inputs.commit }}" \
            --json-out .llmgw-release-evidence/stage-audit.json

      - name: Upload rollout evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llmgw-prod-stage-${{ github.run_id }}
          path: .llmgw-release-evidence/
          include-hidden-files: true
          if-no-files-found: ignore
