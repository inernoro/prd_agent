name: CDS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      cds: ${{ steps.filter.outputs.cds }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cds:
              - 'cds/**'
              - '.github/workflows/cds.yml'

  build-and-test:
    name: Build & Test
    needs: changes
    if: needs.changes.outputs.cds == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cds

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get pnpm store directory
        id: pnpm_store
        shell: bash
        run: |
          echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: ${{ runner.os }}-pnpm-bt-${{ hashFiles('cds/pnpm-lock.yaml', 'cds/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-bt-

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm build

      - name: CDS UI regression audit
        run: pnpm run audit:ui

      - name: Run tests
        run: pnpm test

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [changes, build-and-test]
    if: needs.changes.outputs.cds == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f cds/Dockerfile \
            -t cds:ci-${{ github.sha }} \
            cds/

      - name: Verify image
        run: |
          docker run --rm cds:ci-${{ github.sha }} node --version
