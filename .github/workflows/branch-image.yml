name: Branch Image

# 极速版（CI 预构建）—— 每个分支 push 时，把 prd-api / prd-admin 编译成 ghcr 镜像，
# 按 commit SHA 打 tag（`sha-<40hex>`，不可变）+ `branch-<slug>` 移动 tag。
# CDS 收到本工作流的 workflow_run.completed 后，按 SHA docker pull + run，
# 不再在 CDS 服务器本机编译（省算力）。镜像 tag 公式与 cds-compose.yml 的
# x-cds-deploy-modes.*.express.image / CDS slugifyBranchForImage 保持一致（SSOT）。
#
# 触发：所有分支 push。**按 path-filter 只构建改动的组件，不重复构建**（用户 2026-06-23
# 决策）：只改了 prd-api/ 就只构建 api 镜像，只改了 prd-admin/ 就只构建 admin，仅改 cds/ 或
# docs 则两者都不构建。某个 commit 缺某组件镜像时，CDS 侧 runService 会**逐组件回退到固定
# 主分支镜像**（`:branch-main`，由 main 分支构建经 `type=ref,event=branch,prefix=branch-`
# 维护），保证预览总能起来、不硬失败。tag push 不会命中（用 branches 过滤；tag 走 desktop-release.yml）。
#
# 例外（2026-06-23 修复 main 部署 404）：**默认分支 main 无论改了什么都构建两镜像**，不走
# path-filter 跳过。原因有二：① `:branch-main` 是所有 feature 分支缺组件时的**回退镜像源**，
# 必须随 main 保持新鲜；② main 自身极速版部署只认 `sha-<commit>`，若某次 main 推送只改了
# cds/docs 而跳过构建，该 `sha-<commit>` 镜像不存在 → CDS docker pull 404、分支显示「部署出现
# 异常 / 无法构建」（旧版 CDS 无回退链时直接硬失败）。让 main 永远产出自身 sha 镜像，从 CI 侧
# 根治此问题，且不依赖 CDS 服务版本。feature 分支保留 path-filter 优化（缺组件回退 `:branch-main`）。
#
# 手动触发(workflow_dispatch)用于正式环境热修前补齐不可变镜像组，必须全组件构建；否则
# exec_dep.sh --commit 会把 api/llmgw/llmgw-serve/llmgw-web 全部钉到同一 sha，但其中某个
# 镜像可能因 path-filter 跳过而不存在。

on:
  push:
    branches: ["**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ${{ github.repository }}/prdagent-server
  ADMIN_IMAGE: ${{ github.repository }}/prdagent-admin
  # 独立 LLM 网关 llmgw（当前占位复用 prd-api 同源镜像）+ 网关前端站 llmgw-web
  LLMGW_IMAGE: ${{ github.repository }}/prdagent-llmgw
  LLMGW_WEB_IMAGE: ${{ github.repository }}/prdagent-llmgw-web
  # 独立 LLM 网关承载服务镜像（PrdAgent.LlmGateway，源码在 prd-api/ 下，故随 api 触发）
  LLMGW_SERVE_IMAGE: ${{ github.repository }}/prdagent-llmgw-serve

jobs:
  changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      admin: ${{ steps.filter.outputs.admin }}
      llmgw: ${{ steps.filter.outputs.llmgw }}
      llmgw_web: ${{ steps.filter.outputs.llmgw_web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # 按改动路径判定构建哪些组件（不重复构建）。新分支(before=0000…)或拉取基线缺失时
      # dorny 退化为「全部视为改动」→ 两者都构建，安全兜底。
      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'prd-api/**'
              - '.github/workflows/branch-image.yml'
            admin:
              - 'prd-admin/**'
              - '.github/workflows/branch-image.yml'
            llmgw:
              - 'prd-llmgw/**'
              - '.github/workflows/branch-image.yml'
            llmgw_web:
              - 'prd-llmgw-web/**'
              - '.github/workflows/branch-image.yml'

  api-image:
    name: Build prd-api image
    needs: changes
    # main 始终构建（回退镜像源 + 自身 sha 镜像必须存在，见文件头注释）；其它分支按 path-filter。
    if: ${{ needs.changes.outputs.api == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch,prefix=branch-

      - name: Build metadata
        id: build_meta
        shell: bash
        run: echo "build_time_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./prd-api
          file: ./prd-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME_UTC=${{ steps.build_meta.outputs.build_time_utc }}
          provenance: false
          sbom: false
          platforms: linux/amd64
          cache-from: type=gha,scope=branch-prd-api
          cache-to: type=gha,mode=max,scope=branch-prd-api

  admin-image:
    name: Build prd-admin image
    needs: changes
    # main 始终构建（回退镜像源 + 自身 sha 镜像必须存在，见文件头注释）；其它分支按 path-filter。
    if: ${{ needs.changes.outputs.admin == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch,prefix=branch-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./prd-admin
          file: ./prd-admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          platforms: linux/amd64
          cache-from: type=gha,scope=branch-prd-admin
          cache-to: type=gha,mode=max,scope=branch-prd-admin

  # 独立 LLM 网关后端 llmgw 镜像（占位：prd-llmgw 项目拆出后构建独立镜像，tag 规则同 api）。
  # 仅当 prd-llmgw/ 真实存在 Dockerfile 时才构建，避免对尚未落地的项目硬失败。
  llmgw-image:
    name: Build prd-llmgw image
    needs: changes
    if: ${{ needs.changes.outputs.llmgw == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check llmgw project exists
        id: probe
        shell: bash
        run: |
          if [ -f ./prd-llmgw/Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "prd-llmgw/Dockerfile 不存在，跳过 llmgw 镜像构建（项目尚未拆出，占位配置）。"
          fi

      - name: Setup Docker Buildx
        if: ${{ steps.probe.outputs.present == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ steps.probe.outputs.present == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: ${{ steps.probe.outputs.present == 'true' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.LLMGW_IMAGE }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch,prefix=branch-

      - name: Build metadata
        if: ${{ steps.probe.outputs.present == 'true' }}
        id: build_meta
        shell: bash
        run: echo "build_time_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: ${{ steps.probe.outputs.present == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./prd-llmgw
          file: ./prd-llmgw/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME_UTC=${{ steps.build_meta.outputs.build_time_utc }}
          provenance: false
          sbom: false
          platforms: linux/amd64
          cache-from: type=gha,scope=branch-prd-llmgw
          cache-to: type=gha,mode=max,scope=branch-prd-llmgw

  # 独立 LLM 网关前端站 llmgw-web 镜像（占位：prd-llmgw-web 项目拆出后构建，tag 规则同 admin）。
  llmgw-web-image:
    name: Build prd-llmgw-web image
    needs: changes
    if: ${{ needs.changes.outputs.llmgw_web == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check llmgw-web project exists
        id: probe
        shell: bash
        run: |
          if [ -f ./prd-llmgw-web/Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "prd-llmgw-web/Dockerfile 不存在，跳过 llmgw-web 镜像构建（项目尚未拆出，占位配置）。"
          fi

      - name: Setup Docker Buildx
        if: ${{ steps.probe.outputs.present == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ steps.probe.outputs.present == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: ${{ steps.probe.outputs.present == 'true' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.LLMGW_WEB_IMAGE }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch,prefix=branch-

      - name: Build and push
        if: ${{ steps.probe.outputs.present == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ./prd-llmgw-web
          file: ./prd-llmgw-web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          platforms: linux/amd64
          cache-from: type=gha,scope=branch-prd-llmgw-web
          cache-to: type=gha,mode=max,scope=branch-prd-llmgw-web

  # 独立 LLM 网关承载服务镜像 llmgw-serve（PrdAgent.LlmGateway）。源码在 prd-api/ 下，
  # 故触发条件同 api（path-filter api == true 或 main）。镜像 tag 规则同 api。
  llmgw-serve-image:
    name: Build prd-llmgw-serve image
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.LLMGW_SERVE_IMAGE }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch,prefix=branch-

      - name: Build metadata
        id: build_meta
        shell: bash
        run: echo "build_time_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./prd-api
          file: ./prd-api/Dockerfile.llmgw-serve
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME_UTC=${{ steps.build_meta.outputs.build_time_utc }}
          provenance: false
          sbom: false
          platforms: linux/amd64
          cache-from: type=gha,scope=branch-prd-llmgw-serve
          cache-to: type=gha,mode=max,scope=branch-prd-llmgw-serve
