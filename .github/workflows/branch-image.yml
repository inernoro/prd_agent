name: Branch Image

# 极速版（CI 预构建）—— 每个分支 push 时，把 prd-api / prd-admin 编译成 ghcr 镜像，
# 按 commit SHA 打 tag（`sha-<40hex>`，不可变）+ `branch-<slug>` 移动 tag。
# CDS 收到本工作流的 workflow_run.completed 后，按 SHA docker pull + run，
# 不再在 CDS 服务器本机编译（省算力）。镜像 tag 公式与 cds-compose.yml 的
# x-cds-deploy-modes.*.express.image / CDS slugifyBranchForImage 保持一致（SSOT）。
#
# 触发：所有分支 push。**按 path-filter 只构建改动的组件，不重复构建**（用户 2026-06-23
# 决策）：只改了 prd-api/ 就只构建 api 镜像，只改了 prd-admin/ 就只构建 admin，仅改 cds/ 或
# docs 则两者都不构建。某个 commit 缺某组件镜像时，CDS 侧 runService 会**逐组件回退到固定
# 主分支镜像**（`:branch-main`，由 main 分支构建经 `type=ref,event=branch,prefix=branch-`
# 维护），保证预览总能起来、不硬失败。tag push 不会命中（用 branches 过滤；tag 走 desktop-release.yml）。
#
# 例外（2026-06-23 修复 main 部署 404）：**默认分支 main 无论改了什么都构建两镜像**，不走
# path-filter 跳过。原因有二：① `:branch-main` 是所有 feature 分支缺组件时的**回退镜像源**，
# 必须随 main 保持新鲜；② main 自身极速版部署只认 `sha-<commit>`，若某次 main 推送只改了
# cds/docs 而跳过构建，该 `sha-<commit>` 镜像不存在 → CDS docker pull 404、分支显示「部署出现
# 异常 / 无法构建」（旧版 CDS 无回退链时直接硬失败）。让 main 永远产出自身 sha 镜像，从 CI 侧
# 根治此问题，且不依赖 CDS 服务版本。feature 分支保留 path-filter 优化（缺组件回退 `:branch-main`）。

on:
  push:
    branches: ["**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ${{ github.repository }}/prdagent-server
  ADMIN_IMAGE: ${{ github.repository }}/prdagent-admin

jobs:
  changes:
    name: Detect changed components
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # 按改动路径判定构建哪些组件（不重复构建）。新分支(before=0000…)或拉取基线缺失时
      # dorny 退化为「全部视为改动」→ 两者都构建，安全兜底。
      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'prd-api/**'
              - '.github/workflows/branch-image.yml'
            admin:
              - 'prd-admin/**'
              - '.github/workflows/branch-image.yml'

  api-image:
    name: Build prd-api image
    needs: changes
    # main 始终构建（回退镜像源 + 自身 sha 镜像必须存在，见文件头注释）；其它分支按 path-filter。
    if: ${{ needs.changes.outputs.api == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch,prefix=branch-

      - name: Build metadata
        id: build_meta
        shell: bash
        run: echo "build_time_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./prd-api
          file: ./prd-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME_UTC=${{ steps.build_meta.outputs.build_time_utc }}
          provenance: false
          sbom: false
          platforms: linux/amd64
          cache-from: type=gha,scope=branch-prd-api
          cache-to: type=gha,mode=max,scope=branch-prd-api

  admin-image:
    name: Build prd-admin image
    needs: changes
    # main 始终构建（回退镜像源 + 自身 sha 镜像必须存在，见文件头注释）；其它分支按 path-filter。
    if: ${{ needs.changes.outputs.admin == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch,prefix=branch-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./prd-admin
          file: ./prd-admin/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          platforms: linux/amd64
          cache-from: type=gha,scope=branch-prd-admin
          cache-to: type=gha,mode=max,scope=branch-prd-admin
