name: PR Review Prism Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, edited, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  pr-architect-check:
    name: PR审查棱镜 L1 Gate
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Run PR architect gate check
        env:
          PR_ARCHITECT_RESULT_PATH: artifacts/pr-architect/review_run.json
        run: python .github/scripts/pr_architect_check.py

      - name: Upload PR architect result JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-architect-review-run
          path: artifacts/pr-architect/review_run.json
