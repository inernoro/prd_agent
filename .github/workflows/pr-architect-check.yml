name: PR Architect Check

on:
  pull_request:
    branches: [main, develop]
    types: [opened, reopened, edited, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-architect-check:
    name: PR Architect L1 Gate
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Run PR architect gate check
        run: python .github/scripts/pr_architect_check.py
