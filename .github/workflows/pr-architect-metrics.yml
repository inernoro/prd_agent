name: PR Architect Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1"

permissions:
  contents: write
  pull-requests: read

jobs:
  pr-architect-metrics:
    name: PR Architect Metrics Export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Export metrics summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/pr_architect_metrics.py

      - name: Commit metrics snapshot if changed
        run: |
          if git diff --quiet -- artifacts/pr-architect/metrics.json; then
            echo "No metrics changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/pr-architect/metrics.json
          git commit -m "chore: update pr-architect metrics snapshot"
          git push
