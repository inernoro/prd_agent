name: PR Review Prism Comment Actions

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-architect-comment-actions:
    name: PR审查棱镜 Type A/B/C 退回助手
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request != null
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run comment action helper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/pr_architect_comment_actions.py
