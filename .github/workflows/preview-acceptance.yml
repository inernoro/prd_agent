name: Preview Acceptance

on:
  workflow_dispatch:
    inputs:
      smoke_host:
        description: '冒烟测试目标 URL, 例如 https://my-branch.miduo.org; 留空则跳过 smoke'
        required: false
        default: ''
      smoke_skip:
        description: '跳过的冒烟项, 逗号分隔, 例如 report,defect'
        required: false
        default: ''
      e2e_base_url:
        description: 'Playwright E2E 目标 URL, 例如 https://my-branch.miduo.org; 留空则跳过 e2e'
        required: false
        default: ''

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  smoke-preview:
    name: Smoke (Preview Branch)
    if: github.event.inputs.smoke_host != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Run smoke-all.sh against preview
        env:
          SMOKE_TEST_HOST: ${{ github.event.inputs.smoke_host }}
          AI_ACCESS_KEY: ${{ secrets.AI_ACCESS_KEY }}
          SMOKE_USER: ${{ vars.SMOKE_USER || 'admin' }}
          SMOKE_SKIP: ${{ github.event.inputs.smoke_skip }}
          SMOKE_FAIL_FAST: '1'
        run: |
          if [[ -z "$AI_ACCESS_KEY" ]]; then
            echo "::error::缺少 repo secret AI_ACCESS_KEY, 无法跑冒烟"
            echo "请在 Settings -> Secrets and variables -> Actions 添加 AI_ACCESS_KEY"
            exit 2
          fi
          bash scripts/smoke-all.sh

  e2e-preview:
    name: Playwright E2E (Preview)
    if: github.event.inputs.e2e_base_url != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install deps
        run: pnpm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: ${{ github.event.inputs.e2e_base_url }}
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: pnpm test

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload JSON results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-json
          path: e2e/results.json
          retention-days: 14
