version: 1
profile: top-design-sources

defaults:
  active_source_id: "bootstrap-ddd-anchor"
  active_version: "v1.0.0"
  enforce_manifests: true

sources:
  - id: "bootstrap-ddd-anchor"
    type: "repo-file"
    location: ".github/pr-architect/top-design.bootstrap.md"
    version: "v1.0.0"
    checksum: "sha256:bootstrap-replace-after-first-upload"
    owner: "architect"
    description: "仓库内启动用顶层设计占位源，首次接入后请替换为真实设计包"
    manifests:
      anchors: ".github/pr-architect/manifests/anchors.yml"
      slices: ".github/pr-architect/manifests/slices.yml"
      contexts: ".github/pr-architect/manifests/contexts.yml"
