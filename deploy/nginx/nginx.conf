upstream llmgw_serving {
  server llmgw-serve:8091 max_fails=2 fail_timeout=10s;
  # 月预算原子预占完成前只做主备，不在两实例间扩大正常并发面。
  server llmgw-serve-b:8091 backup;
  keepalive 32;
}

server {
  listen 80;
  server_name _;
  # 允许较大的 JSON 请求体（如 dataURL/base64 图片、图生图首帧等）
  # 后端仍会按业务规则做尺寸限制并返回 DOCUMENT_TOO_LARGE
  client_max_body_size 30m;

  # 防止目录访问时使用绝对路径重定向（避免暴露内部 IP）
  absolute_redirect off;
  port_in_redirect off;

  # 静态站点根目录（prd-admin build 产物）
  root /usr/share/nginx/html;
  index index.html;

  # 发布预检和外部探针使用根级 /health；必须在 SPA fallback 前交给 API。
  location = /health {
    proxy_pass http://api:8080/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_read_timeout 10s;
  }

  # /api/* 反代到后端（后端路由为 /api/v1/...）
  location ^~ /api/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 3s;
    proxy_send_timeout 60s;
    # SSE/流式：避免缓存与缓冲导致“卡住”
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
  }

  location ^~ /gw/v1/ {
    proxy_pass http://llmgw_serving;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 3s;
    proxy_send_timeout 60s;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }

  # OpenAI-compatible / Claude-compatible / Gemini-compatible 入口同样属于 serving 网关。
  # 这些路径不是 MAP 前端路由，必须在 SPA fallback 前转发到 llmgw-serve。
  location ^~ /v1/ {
    proxy_pass http://llmgw_serving;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 3s;
    proxy_send_timeout 60s;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }

  location ^~ /v1beta/ {
    proxy_pass http://llmgw_serving;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 3s;
    proxy_send_timeout 60s;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }

  location ^~ /gemini/v1beta/ {
    proxy_pass http://llmgw_serving;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 3s;
    proxy_send_timeout 60s;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
  }

  # /assets/ 目录下的所有文件（静态资源）
  # 优先级高于 SPA fallback，避免前端路由冲突
  location ^~ /assets/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }

  # 其他静态资源（根目录下的 favicon、manifest 等）
  location ~* \.(?:js|css|map|png|jpg|jpeg|gif|webp|svg|ico|woff2?|json|txt)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
  }

  # SPA fallback：其余路径都交给前端路由
  # 移除 $uri/ 避免目录匹配导致 403，让前端路由接管
  location / {
    try_files $uri /index.html;
  }
}
