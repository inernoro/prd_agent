## exec_dep.sh 独立部署模式的 nginx 路由配置
##
## 激活方式：exec_dep.sh 把 default.conf symlink 重指到本文件
##   ln -sfn branches/_standalone.conf deploy/nginx/conf.d/default.conf
##
## 与 CDS 多分支模式互斥：CDS 模式下 default.conf 由 cds 动态重指到
## branches/<branch>.conf，exec_cds.sh 会先把本文件对应的 symlink 换掉。
##
## ⚠ 内容必须与 deploy/nginx/nginx.conf 保持一致（后者仅供 docker-compose.local.yml
## 的 Dockerfile COPY 到镜像里用，这两条独立部署路径共享同一份 nginx 配置语义）。
## 改动一处时请同步改另一处。
server {
    listen 80;
    server_name _;
    # 允许较大的 JSON 请求体（如 dataURL/base64 图片、图生图首帧等）
    # 后端仍会按业务规则做尺寸限制并返回 DOCUMENT_TOO_LARGE
    client_max_body_size 30m;

    # 防止目录访问时使用绝对路径重定向（避免暴露内部 IP）
    absolute_redirect off;
    port_in_redirect off;

    # 静态站点根目录（prd-admin build 产物，由 exec_dep.sh 从 GitHub Pages 下载并解压）
    root /usr/share/nginx/html;
    index index.html;

    # /api/* 反代到后端（后端路由为 /api/v1/...）
    location ^~ /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        # SSE/流式：避免缓存与缓冲导致"卡住"
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # /gw/v1/* 反代到独立 LLM serving 网关 llmgw-serve（端口 8091）。
    # 比 /gw/ 更具体（最长前缀匹配优先），承接跨进程 serving 调用 + SSE 流。
    location ^~ /gw/v1/ {
        proxy_pass http://llmgw-serve:8091;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # /gw/* 反代到独立 LLM 网关服务 llmgw（端口 8090，观测控制台）
    # 网关同样有 SSE 流式输出，必须关闭缓冲 + 长读超时，否则流式响应会被 nginx 攒齐再吐
    location ^~ /gw/ {
        proxy_pass http://llmgw:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        # SSE/流式：避免缓存与缓冲导致"卡住"
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # /assets/ 目录下的所有文件（静态资源）
    # 优先级高于 SPA fallback，避免前端路由冲突
    location ^~ /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # 其他静态资源（根目录下的 favicon、manifest 等）
    location ~* \.(?:js|css|map|png|jpg|jpeg|gif|webp|svg|ico|woff2?|json|txt)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # SPA fallback：其余路径都交给前端路由
    # 移除 $uri/ 避免目录匹配导致 403，让前端路由接管
    location / {
        try_files $uri /index.html;
    }
}

## 独立 LLM 网关前端站点（llmgw-web）
## 走独立 server 块 + 独立监听端口 8081，与主站（80）互不干扰。
## /gw-api/ 反代到 llmgw 后端（SSE 关闭缓冲 + 长超时）；其余走 llmgw-web 容器的静态站点。
## prd-llmgw-web 拆出独立项目前，该 server 块对应的容器静态目录可为空（404 兜底）。
server {
    listen 8081;
    server_name _;
    client_max_body_size 30m;

    absolute_redirect off;
    port_in_redirect off;

    # 网关前端站点的 API 调用走 /gw-api/ → llmgw:8090 的 /gw/（与主站 /gw/ 等价，前端站独立命名空间）。
    # proxy_pass 末尾带 /gw/ → nginx 用 /gw/ 替换匹配到的 location 前缀 /gw-api/，
    # 故 /gw-api/auth/login 到达后端为 /gw/auth/login（后端只认 /gw/*）。
    # 不能写成 proxy_pass http://llmgw:8090;（无 URI）——那会原样透传 /gw-api/...，后端 404（Cursor Bugbot）。
    location ^~ /gw-api/ {
        proxy_pass http://llmgw:8090/gw/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        # SSE/流式：避免缓存与缓冲导致"卡住"
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # 静态站点：反代到 llmgw-web 容器（nginx 托管 prd-llmgw-web 构建产物）
    location / {
        proxy_pass http://llmgw-web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }
}
